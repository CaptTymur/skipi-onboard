<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Skipi On Board — United Seafarers</title>
<style>
  /* Skipi On Board — desktop Apps-only shell.
     Visual family with Skipi Seafarer: light theme by default, petrol accent
     (#004564), top modules-bar, calm cards. This first slice is intentionally
     local/static — no server, no account, no personal data, no marketplace. */
  :root, [data-theme="light"] {
    --bg:#ffffff; --surface:#f6f6f6; --surface2:#eeeeee;
    --text:#1e1e1e; --text2:#6b7280; --border:#e2e4e8; --hover:#f0f1f3;
    --accent:#004564; --accent-rgb:0,69,100; --accent-strong:#00384f;
    --accent-bg:rgba(var(--accent-rgb),0.10); --accent-bg2:rgba(var(--accent-rgb),0.22);
    --green:#3f9d6a; --orange:#c9852f;
    --font-ui:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-ui);
    font-size:14px; display:flex; flex-direction:column; overflow:hidden; }
  ::selection { background:var(--accent-bg2); }

  /* ---- top modules bar (shell) ---- */
  .modules-bar { display:flex; align-items:center; height:46px; background:var(--surface);
    border-bottom:1px solid var(--border); padding:0 14px; gap:10px; flex-shrink:0; }
  .brand { display:flex; align-items:baseline; gap:8px; min-width:0; }
  .brand .mark { font-size:17px; font-weight:800; letter-spacing:-.01em; color:var(--text); white-space:nowrap; }
  .brand .tag { font-size:11.5px; color:var(--text2); white-space:nowrap; }
  .mod-tabs { display:flex; align-items:center; gap:4px; margin-left:14px; }
  .mod-tab { height:30px; display:flex; align-items:center; gap:7px; padding:0 14px; border-radius:7px;
    font-size:13px; font-weight:600; color:var(--text2); background:transparent; border:1px solid transparent; cursor:default; }
  .mod-tab.active { color:#fff; background:var(--accent); border-color:var(--accent); }
  .mod-tab.locked { color:var(--text2); background:transparent; border:1px dashed var(--border); cursor:pointer; }
  .mod-tab.locked:hover { color:var(--text); border-color:var(--accent); }
  .mod-tab.locked .lock { font-size:11px; opacity:.8; margin-right:1px; }
  .bar-spacer { flex:1; }
  .bar-note { font-size:11.5px; color:var(--text2); white-space:nowrap; }

  /* ---- scroll body ---- */
  main { flex:1; overflow-y:auto; }
  .apps-screen { padding:24px 28px 48px; max-width:940px; }

  .apps-head-title { font-size:24px; font-weight:800; color:var(--text); }
  .apps-head-sub { font-size:12.5px; color:var(--text2); margin-top:6px; line-height:1.5; max-width:660px; }

  .apps-cat-title { font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
    color:var(--text2); margin:26px 0 11px; }
  .apps-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(252px,1fr)); gap:13px; }
  .apps-tile { display:flex; gap:13px; text-align:left; align-items:flex-start; padding:15px;
    border:1px solid var(--border); border-radius:13px; background:var(--surface); color:var(--text);
    cursor:pointer; transition:border-color .12s, transform .05s, box-shadow .12s; }
  .apps-tile:hover { border-color:var(--accent); box-shadow:0 1px 6px rgba(0,0,0,.04); }
  .apps-tile:active { transform:translateY(1px); }
  .apps-tile.soon { opacity:.82; }
  .apps-tile-icon { width:48px; height:48px; flex:0 0 auto; border-radius:12px; background:var(--accent-bg);
    color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:25px; }
  .apps-tile-icon.big { width:60px; height:60px; font-size:32px; border-radius:15px; }
  .apps-tile-body { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .apps-tile-name { font-size:15px; font-weight:800; line-height:1.2; }
  .apps-tile-sub { font-size:12px; color:var(--text2); line-height:1.4; }
  .apps-badge { display:inline-block; align-self:flex-start; margin-top:6px; font-size:10px; font-weight:800;
    text-transform:uppercase; letter-spacing:.04em; padding:2px 8px; border-radius:999px; }
  .apps-badge.live { background:var(--accent-bg); color:var(--accent); }
  .apps-badge.soon { background:var(--hover); color:var(--text2); }

  /* ---- detail ---- */
  .apps-detail { max-width:660px; }
  .apps-back { background:transparent; border:none; color:var(--accent); font-size:13px; font-weight:700;
    cursor:pointer; padding:4px 0; margin-bottom:10px; }
  .apps-detail-head { display:flex; gap:15px; align-items:center; margin-bottom:8px; }
  .apps-detail-name { font-size:21px; font-weight:800; color:var(--text); }
  .apps-detail-cat { font-size:12px; color:var(--text2); margin-top:3px; }
  .apps-detail-desc { font-size:13.5px; color:var(--text); line-height:1.55; }
  .apps-note { font-size:12.5px; color:var(--text2); background:var(--surface); border:1px solid var(--border);
    border-radius:9px; padding:11px 13px; margin:12px 0; line-height:1.45; }
  .apps-safety { font-size:12.5px; color:var(--text); background:var(--accent-bg); border:1px solid var(--accent-bg2);
    border-radius:9px; padding:11px 13px; margin:12px 0; line-height:1.5; }
  .apps-hosts { display:flex; flex-wrap:wrap; gap:6px; margin:14px 0 4px; }
  .apps-host-chip { font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-bg);
    border:1px solid var(--accent-bg2); border-radius:999px; padding:3px 10px; }
  .apps-host-chip.self { color:#fff; background:var(--accent); border-color:var(--accent); }
  .apps-perm { border:1px solid var(--border); border-radius:11px; padding:13px 15px; margin:16px 0; background:var(--surface); }
  .apps-perm-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); margin-bottom:9px; }
  .apps-perm-row { display:flex; align-items:center; gap:9px; font-size:13px; padding:3px 0; color:var(--text); }
  .apps-perm-dot { width:18px; height:18px; flex:0 0 auto; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; line-height:1; }
  .apps-perm-row.clear .apps-perm-dot { background:rgba(63,157,106,.16); color:var(--green); }
  .apps-perm-row.used .apps-perm-dot { background:rgba(201,133,47,.18); color:var(--orange); }
  .apps-actions { margin-top:20px; }
  .btn { font-size:14px; font-weight:700; border-radius:9px; padding:11px 18px; border:1px solid var(--border); cursor:pointer; }
  .btn-outline { background:var(--surface); color:var(--text2); }
  .btn-outline[disabled] { cursor:not-allowed; opacity:.7; }
  .btn-accent { background:var(--accent); color:#fff; border:1px solid var(--accent); }
  .btn-accent:hover { background:var(--accent-strong); }
  .btn-sm { padding:5px 11px; font-size:12px; }

  /* ---- pairing panel ---- */
  .apps-head-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .pair-cta { font-size:13px; font-weight:700; color:#fff; background:var(--accent); border:1px solid var(--accent);
    border-radius:9px; padding:9px 14px; cursor:pointer; white-space:nowrap; }
  .pair-cta:hover { background:var(--accent-strong); }
  .pair-screen { max-width:900px; }
  .pair-grid { display:grid; grid-template-columns:300px 1fr; gap:26px; margin-top:18px; align-items:start; }
  .pair-qr-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px;
    display:flex; flex-direction:column; align-items:center; gap:13px; }
  .pair-qr-img { width:248px; height:248px; image-rendering:pixelated; border-radius:6px; background:#fff; }
  .pair-qr-missing { width:248px; height:248px; display:flex; align-items:center; justify-content:center;
    color:var(--text2); font-size:13px; text-align:center; border:1px dashed var(--border); border-radius:6px; padding:14px; }
  .pair-countdown { font-size:13px; font-weight:700; color:var(--text2); font-variant-numeric:tabular-nums; }
  .pair-expired { color:#b3402a; }
  .pair-side { min-width:0; }
  .pair-meta { display:flex; gap:10px; font-size:12.5px; padding:3px 0; }
  .pair-meta-k { color:var(--text2); width:56px; flex:0 0 auto; }
  .pair-meta-v { color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace; word-break:break-all; }
  .pair-scopes { margin:13px 0 4px; }
  .pair-scopes-t { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); margin-bottom:8px; }
  .pair-scope { display:inline-block; font-size:11.5px; color:var(--accent); background:var(--accent-bg);
    border:1px solid var(--accent-bg2); border-radius:999px; padding:3px 9px; margin:0 5px 5px 0; }
  .pair-payload-head { display:flex; align-items:center; justify-content:space-between; margin:16px 0 6px;
    font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); }
  .pair-payload { background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:12px;
    font-size:11.5px; line-height:1.45; color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace;
    white-space:pre-wrap; word-break:break-word; max-height:280px; overflow:auto; margin:0; }
  @media (max-width:780px){ .pair-grid { grid-template-columns:1fr; } }

  /* ---- crew module ---- */
  .crew-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:13px; margin:18px 0 26px; }
  .crew-stat { background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:15px 16px; }
  .crew-stat-k { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.04em; }
  .crew-stat-v { font-size:28px; font-weight:800; color:var(--text); line-height:1.1; margin-top:7px; }
  .crew-stat-s { font-size:11.5px; color:var(--text2); margin-top:3px; }
  .crew-section-t { font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--text2); margin:8px 0 12px; }
  .crew-empty { background:var(--surface); border:1px dashed var(--border); border-radius:13px; padding:34px 22px; text-align:center; }
  .crew-empty-icon { font-size:30px; }
  .crew-empty-t { font-size:15px; font-weight:800; color:var(--text); margin-top:8px; }
  .crew-empty-s { font-size:12.5px; color:var(--text2); margin-top:6px; line-height:1.5; max-width:440px; margin-left:auto; margin-right:auto; }
  .crew-empty .pair-cta { margin-top:16px; }

  /* ---- vessel documents module ---- */
  .vdoc-card { display:flex; gap:13px; align-items:flex-start; padding:15px; border:1px solid var(--border);
    border-radius:13px; background:var(--surface); }
  .vdoc-icon { width:48px; height:48px; flex:0 0 auto; border-radius:12px; background:var(--accent-bg); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:24px; }
  .vdoc-body { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .vdoc-name { font-size:15px; font-weight:800; line-height:1.2; }
  .vdoc-sub { font-size:12px; color:var(--text2); line-height:1.4; }

  /* ---- plugin host ---- */
  .apps-badge.avail { background:var(--accent-bg); color:var(--accent); }
  .apps-badge.installed { background:rgba(63,157,106,.16); color:var(--green); }
  .apps-badge.disabled { background:var(--hover); color:var(--text2); }
  .apps-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .plugin-host-head { display:flex; gap:15px; align-items:center; margin-bottom:6px; }
  .plugin-mount { margin-top:14px; border:1px solid var(--border); border-radius:13px; padding:18px; background:var(--bg); }

  /* ---- footer strip ---- */
  .plat-strip { flex-shrink:0; border-top:1px solid var(--border); background:var(--surface);
    padding:8px 16px; font-size:11px; color:var(--text2); display:flex; align-items:center; gap:8px; }
  .plat-strip b { color:var(--text); font-weight:700; }
  .plat-dot { opacity:.5; }

  /* ---- toast ---- */
  .toast { position:fixed; left:50%; bottom:46px; transform:translateX(-50%); background:var(--text); color:#fff;
    border-radius:9px; padding:10px 16px; font-size:13px; max-width:90%; opacity:0; pointer-events:none;
    transition:opacity .18s; z-index:50; }
  .toast.show { opacity:.96; }
</style>
</head>
<body>
  <div class="modules-bar">
    <div class="brand">
      <span class="mark">⚓ Skipi On&nbsp;Board</span>
      <span class="tag">United Seafarers</span>
    </div>
    <div class="mod-tabs">
      <div class="mod-tab" data-mod="crew" onclick="showModule('crew')">Crew</div>
      <div class="mod-tab" data-mod="apps" onclick="showModule('apps')">Apps</div>
      <div class="mod-tab" data-mod="vdocs" onclick="showModule('vdocs')">Vessel Documents</div>
    </div>
    <div class="bar-spacer"></div>
    <div class="bar-note">Local preview · no server · no account</div>
  </div>

  <main><div id="scr-content"></div></main>

  <div class="plat-strip">
    <b>Skipi platform</b><span class="plat-dot">·</span>
    <span>Seafarer</span><span class="plat-dot">·</span>
    <span>Crewing</span><span class="plat-dot">·</span>
    <span>Broker</span><span class="plat-dot">·</span>
    <b>On&nbsp;Board</b><span class="plat-dot">·</span>
    <span>Management</span>
    <div class="bar-spacer"></div>
    <span id="ver-tag"></span>
  </div>

  <div id="toast" class="toast"></div>

<!-- Local QR encoder (offline, no CDN). Provenance: dist/vendor/README.md -->
<script src="./vendor/qrcode-generator.js"></script>
<script>
var APP_VERSION = '0.1.0';

// ---------- helpers ----------
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._t); showToast._t=setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

// ===================== Apps / Plugins host =====================
// First-party Applications screen for the Skipi On Board home. This is NOT a
// marketplace and NOT a third-party plugin runtime — it is a static, local
// registry of official Skipi onboard tools surfaced as a tile shelf, the seed
// of a future applications/plugins layer shared across the Skipi homes.
// Refs (Obsidian): "Skipi Applications — приложения в домах Skipi",
//   "Skipi Onboard — продукт", "Skipi Device Pairing — QR sync and Onboard exchange".

var SKIPI_APP_CATEGORIES = [
  { key:'onboard',   label:'Onboard operations' },
  { key:'reports',   label:'Reports & signals' },
  { key:'safety',    label:'Safety / Watchkeeping' },
  { key:'utils',     label:'Utils' }
];

// host labels for the "lives in" chips
var HOST_LABELS = { seafarer:'Seafarer', crewing:'Crewing', broker:'Broker', onboard:'On Board', management:'Management' };

// Local/static manifest-like registry. Every tile is a seed: it has a clear
// detail screen explaining its future onboard role, but no runtime yet.
var SKIPI_APPS = [
  {
    id:'app.skipi.applications.watch-schedule',
    name:'Watch Schedule', category:'onboard', icon:'⏰', status:'coming_soon',
    hosts:['onboard','seafarer','management'],
    short:'Duty rotation and watch schedule from the ship’s administration.',
    description:'The current watch rotation and duty schedule, published by the ship’s administration. Once a seafarer pairs their Skipi Seafarer with this On Board node by QR, the schedule appears in their device read-only — no more photographing the mess-room printout.',
    privacy_note:'Read-only from the ship. The seafarer’s personal vault is never shared back to the vessel.'
  },
  {
    id:'app.skipi.applications.announcements',
    name:'Announcements', category:'onboard', icon:'📢', status:'coming_soon',
    hosts:['onboard','seafarer'],
    short:'Notices and instructions from the master, chief officer or office.',
    description:'Onboard notices and instructions from the master, chief officer, company or onboard administration — drills, port calls, safety notices, working instructions. Delivered to paired crew devices so nothing important is lost on a notice board.',
    privacy_note:'One-way from ship administration to the crew. No personal data leaves the seafarer’s device.'
  },
  {
    id:'app.skipi.applications.checklists',
    name:'Checklists', category:'onboard', icon:'✅', status:'coming_soon',
    hosts:['onboard','seafarer','management'],
    short:'Onboard checklists with crew confirmations.',
    description:'Operational and safety checklists for the vessel. The crew confirms completion on their device; confirmations flow back as structured signals to the Skipi core and, where allowed, to shore management — an auditable trail without paper.',
    privacy_note:'Only the checklist workflow is shared — not the seafarer’s documents or location.'
  },
  {
    id:'app.skipi.applications.familiarization',
    name:'Familiarization', category:'onboard', icon:'🧭', status:'coming_soon',
    hosts:['onboard','seafarer'],
    short:'Joining and familiarization tasks for new crew.',
    description:'Joining instructions and familiarization tasks for newly joined crew, with confirmation when each item is completed. Turns the familiarization binder into a guided, confirmable onboarding flow tied to the specific vessel.',
    privacy_note:'Familiarization confirmation is a scoped signal. The ship node never receives the full personal vault.'
  },
  {
    id:'app.skipi.applications.photo-reports',
    name:'Photo Reports', category:'reports', icon:'📷', status:'coming_soon',
    hosts:['onboard','management'],
    short:'Work-completion photo reports (before / during / after) to the office.',
    description:'Capture work-completion reports by template — photos before/during/after, resources consumed, notes — and submit them to the office in one tap. This is the original On Board "Job Reporter" direction, returning here as a first-class onboard application alongside the shore-side Skipi Management app.',
    privacy_note:'Reports are tied to the vessel (IMO), not to a private seafarer profile.'
  },
  {
    id:'app.skipi.applications.safety-reports',
    name:'Safety Reports', category:'reports', icon:'🦺', status:'coming_soon',
    hosts:['onboard','seafarer','management'],
    short:'Safety, defect and incident reports with evidence.',
    description:'Safety, defect and incident reports — near-miss, defect, MLC-style complaint — with photo evidence and structured fields. Routed as privacy-preserving signals into the Skipi core so that ten weak signals can together reveal a real problem, supporting the United Seafarers manifest.',
    privacy_note:'The seafarer chooses what to send. Identity is privacy-preserving; the ship sees only the allowed part of the workflow.'
  },
  {
    id:'app.skipi.applications.bnwas',
    name:'BNWAS / Time Anchor', category:'safety', icon:'⏱️', status:'coming_soon',
    hosts:['seafarer','onboard','management'],
    short:'Personal watchkeeping timer and time-anchor. Offline, no account.',
    description:'A personal watchkeeping timer and time-anchor tool for mariners. Works fully offline with no account and no data upload. BNWAS already exists as a standalone App Store app; on the Skipi platform it will appear here as a first-party tile — open if installed, otherwise install — and later as an embedded onboard utility.',
    safety_note:'Not certified bridge equipment. Does not replace the vessel BNWAS, lookout duties, bridge procedures or the company SMS.',
    privacy_note:'No server, no account, no analytics, no access to documents.'
  },
  {
    id:'app.skipi.applications.distance-tables',
    name:'Distance Tables', category:'utils', icon:'📏', status:'coming_soon',
    hosts:['onboard','seafarer','broker','management'],
    short:'Port-to-port distances and voyage-time helper.',
    description:'Port-to-port distances with a speed / consumption and voyage-time helper, exportable into a voyage note. A horizontal application: the same tool is useful to a broker pricing a fixture, a seafarer planning a passage and the vessel itself.',
    privacy_note:'Pure calculation utility — no personal data, no server required.'
  },
  {
    id:'app.skipi.applications.draft-survey',
    name:'Draft Survey', category:'utils', icon:'⚖️', status:'coming_soon',
    hosts:['onboard','seafarer','management'],
    short:'Draft survey calculation, report and training mode.',
    description:'Draft survey calculation with a clean report output and a training mode for cadets and junior officers. Lives on board where the survey happens, and in Seafarer / Management as a shared maritime utility.',
    privacy_note:'Calculation and report tool — runs locally, no personal data shared.'
  }
];

var appsState = { selectedId:null };

function appsById(id){ for(var i=0;i<SKIPI_APPS.length;i++){ if(SKIPI_APPS[i].id===id) return SKIPI_APPS[i]; } return null; }
function appsCatLabel(key){ for(var i=0;i<SKIPI_APP_CATEGORIES.length;i++){ if(SKIPI_APP_CATEGORIES[i].key===key) return SKIPI_APP_CATEGORIES[i].label; } return key; }

function appsTileHtml(a){
  var soon = a.status==='coming_soon';
  var badge = soon ? '<span class="apps-badge soon">Coming soon</span>' : '<span class="apps-badge live">Available</span>';
  return '<button class="apps-tile'+(soon?' soon':'')+'" type="button" onclick="appsSelect(\''+a.id+'\')">'
    + '<span class="apps-tile-icon">'+(a.icon||'▢')+'</span>'
    + '<span class="apps-tile-body">'
    +   '<span class="apps-tile-name">'+esc(a.name)+'</span>'
    +   '<span class="apps-tile-sub">'+esc(a.short||'')+'</span>'
    +   badge
    + '</span></button>';
}

function appsListHtml(){
  var h = '<div class="apps-screen">';
  h += '<div class="apps-head"><div class="apps-head-title">Apps</div>'
     + '<div class="apps-head-sub">Onboard tools for this vessel — official Skipi applications, not a marketplace and no third-party code. '
     + 'Most are seeds of the onboard product and become active once device pairing and the ship node land. '
     + '(Crew pairing lives in the <b>Crew</b> module.)</div></div>';
  // Plugins section — bundled first-party plugins with real Install/Open/Disable state.
  var pluginIds = bundledPluginIds();
  if(pluginIds.length){
    h += '<div class="apps-cat-title">Plugins</div><div class="apps-grid">';
    for(var pi=0;pi<pluginIds.length;pi++){ h += pluginTileHtml(pluginIds[pi]); }
    h += '</div>';
  }
  for(var c=0;c<SKIPI_APP_CATEGORIES.length;c++){
    var cat = SKIPI_APP_CATEGORIES[c];
    var apps = SKIPI_APPS.filter(function(a){ return a.category===cat.key; });
    if(!apps.length) continue;
    h += '<div class="apps-cat-title">'+esc(cat.label)+'</div><div class="apps-grid">';
    for(var i=0;i<apps.length;i++){ h += appsTileHtml(apps[i]); }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function appsHostsHtml(app){
  if(!app.hosts || !app.hosts.length) return '';
  var h = '<div class="apps-hosts">';
  for(var i=0;i<app.hosts.length;i++){
    var key = app.hosts[i];

    h += '<span class="apps-host-chip'+(self?' self':'')+'">'+esc(HOST_LABELS[key]||key)+'</span>';
  }

  return h;
}

function appsDetailHtml(app){

// ===================== Module shell (Crew / Apps / Vessel Documents) =====================
// Three base modules. Crew = people + QR pairing; Apps = onboard tools;
// Vessel Documents = the ship's document vault (scaffold). All local-only.
var currentModule = 'crew'; // 'crew' | 'apps' | 'vdocs'
function setActiveTab(mod){
  var tabs = document.querySelectorAll('.mod-tab');
  for(var i=0;i<tabs.length;i++){ tabs[i].classList.toggle('active', tabs[i].getAttribute('data-mod')===mod); }
}
function setContent(html){
  var content = document.getElementById('scr-content');
  if(content) content.innerHTML = html;
  var m = document.querySelector('main'); if(m) m.scrollTop = 0;
}
function showModule(mod){
  stopPairingTimer();
  unmountActivePlugin();
  currentModule = mod;
  setActiveTab(mod);
  if(mod==='apps'){ renderApps(); }
  else if(mod==='vdocs'){ renderVesselDocs(); }
  else { renderCrew(); }
}

// ---------- Apps module ----------
function renderApps(){
  if(appsState.selectedId){
    if(isBundledPlugin(appsState.selectedId)) setContent(pluginDetailHtml(appsState.selectedId));
    else setContent(appsDetailHtml(appsById(appsState.selectedId)));
  } else setContent(appsListHtml());
}
function appsSelect(id){ appsState.selectedId = id; renderApps(); }
function appsBack(){ appsState.selectedId = null; renderApps(); }

// ===================== QR pairing (Stage 1 — On Board is the QR issuer) =====================
// On Board shows a one-time, expiring pairing invite as a QR. Crew scan it from
// Skipi Seafarer to connect to this vessel's onboard node. Stage 1 is local-only:
// no backend, no relay, no real handshake, no paired-device DB. The invite is a
// real structured payload v1 (forward-compatible with future keys/signatures).
// QR is rendered fully offline via the vendored encoder (dist/vendor/).
// Refs (Obsidian): "Skipi Device Pairing — QR sync and Onboard exchange",
//   "2026-06-23 — Skipi Onboard ↔ Seafarer QR pairing — coordination protocol".

var PAIRING_SCOPES = [
  'vessel_profile.read', 'watch_schedule.read', 'announcements.read',
  'checklists.read', 'familiarization.read', 'reports.submit', 'signals.submit'
];
var INVITE_TTL_MS = 10 * 60 * 1000; // 10 minutes
var pairing = { invite:null, timer:null };

function randHex(nbytes){
  var a = new Uint8Array(nbytes);
  (window.crypto || window.msCrypto).getRandomValues(a);
  var s = '';
  for(var i=0;i<a.length;i++){ s += ('0'+a[i].toString(16)).slice(-2); }
  return s;
}
// Stable per-install node id (no PII). Persists in localStorage for the MVP.
function onboardNodeId(){
  var k = 'skipi-onboard-node-id', v = null;
  try { v = localStorage.getItem(k); } catch(e){}
  if(!v){ v = 'onb_' + randHex(8); try { localStorage.setItem(k, v); } catch(e){} }
  return v;
}
function buildInvite(){
  var created = new Date();
  var expires = new Date(created.getTime() + INVITE_TTL_MS);
  return {
    v: 1,
    type: 'skipi.onboard.pairing.invite',
    product: 'skipi-onboard',
    node_type: 'onboard_node',
    node_id: onboardNodeId(),
    node_name: 'Skipi On Board',
    vessel: { name: null, imo: null, callsign: null },
    invite_id: 'inv_' + randHex(8),
    challenge: randHex(16),
    created_at: created.toISOString(),
    expires_at: expires.toISOString(),
    allowed_scopes: PAIRING_SCOPES.slice(),
    transport: { kind: 'local-preview', url: null }
  };
}
function qrDataUrl(text){
  if(typeof qrcode === 'undefined') return null;
  try {
    var q = qrcode(0, 'M'); // type 0 = auto-fit, EC level M
    q.addData(text);
    q.make();
    return q.createDataURL(6, 4); // cellSize, margin (rendered at high-res, scaled via CSS)
  } catch(e){ return null; }
}

// Pairing is a sub-view of the Crew module (opened from the Crew CTA).
function openPairing(){
  currentModule = 'crew';
  setActiveTab('crew');
  pairing.invite = buildInvite();
  renderPairing();
}
function regenerateInvite(){
  pairing.invite = buildInvite();
  renderPairing();
}
function closePairing(){ renderCrew(); }

function renderPairing(){
  var content = document.getElementById('scr-content');
  if(!content) return;
  var inv = pairing.invite;
  var pretty = JSON.stringify(inv, null, 2);
  var compact = JSON.stringify(inv);
  var durl = qrDataUrl(compact);
  var qrHtml = durl
    ? '<img class="pair-qr-img" alt="Pairing invite QR" src="'+durl+'">'
    : '<div class="pair-qr-missing">QR encoder failed to load. Use the payload preview below.</div>';

  var h = '<div class="apps-screen pair-screen">';
  h += '<button class="apps-back" type="button" onclick="closePairing()">← Crew</button>';
  h += '<div class="apps-head"><div class="apps-head-title">Pair a crew member</div>'
     + '<div class="apps-head-sub">Crew open <b>Skipi Seafarer</b> and scan this code to connect their device to this vessel’s On&nbsp;Board node. '
     + 'Their <b>Vessel / Onboard</b> module unlocks only after they confirm on their side.</div></div>';

  h += '<div class="pair-grid">';
  // left — QR + countdown + regenerate
  h += '<div class="pair-qr-card">' + qrHtml
     + '<div class="pair-countdown" id="pair-countdown"></div>'
     + '<button class="btn btn-accent" type="button" onclick="regenerateInvite()">↻ Regenerate invite</button>'
     + '</div>';
  // right — metadata, scopes, privacy, payload preview
  h += '<div class="pair-side">';
  h += '<div class="pair-meta"><span class="pair-meta-k">Node</span><span class="pair-meta-v">'+esc(inv.node_id)+'</span></div>';
  h += '<div class="pair-meta"><span class="pair-meta-k">Invite</span><span class="pair-meta-v">'+esc(inv.invite_id)+'</span></div>';
  h += '<div class="pair-scopes"><div class="pair-scopes-t">Allowed scopes</div>';
  for(var i=0;i<inv.allowed_scopes.length;i++){ h += '<span class="pair-scope">'+esc(inv.allowed_scopes[i])+'</span>'; }
  h += '</div>';
  h += '<div class="apps-note"><b>Privacy</b> — this QR contains <b>no personal data</b>. It is a one-time, expiring invite; '
     + 'it does <b>not</b> give On&nbsp;Board access to a seafarer’s vault. Data moves only later, scoped and with the seafarer’s explicit consent.</div>';
  h += '<div class="pair-payload-head"><span>Invite payload v1 (dev preview)</span>'
     + '<button class="btn btn-outline btn-sm" type="button" onclick="copyPayload()">Copy</button></div>';
  h += '<pre class="pair-payload" id="pair-payload">'+esc(pretty)+'</pre>';
  h += '</div>'; // pair-side
  h += '</div>'; // pair-grid
  h += '</div>';

  content.innerHTML = h;
  document.querySelector('main').scrollTop = 0;
  startPairingTimer();
}

function startPairingTimer(){
  stopPairingTimer();
  updateCountdown();
  pairing.timer = setInterval(updateCountdown, 1000);
}
function stopPairingTimer(){
  if(pairing && pairing.timer){ clearInterval(pairing.timer); pairing.timer = null; }
}
function updateCountdown(){
  var el = document.getElementById('pair-countdown');
  if(!el || !pairing.invite){ stopPairingTimer(); return; }
  var ms = new Date(pairing.invite.expires_at).getTime() - Date.now();
  if(ms <= 0){ el.innerHTML = '<span class="pair-expired">Invite expired — regenerate</span>'; stopPairingTimer(); return; }
  var total = Math.floor(ms/1000), m = Math.floor(total/60), s = total % 60;
  el.textContent = 'Expires in ' + m + ':' + ('0'+s).slice(-2);
}
function copyPayload(){
  if(!pairing.invite) return;
  var txt = JSON.stringify(pairing.invite, null, 2);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){ showToast('Payload copied'); }, function(){ fallbackCopy(txt); });
  } else { fallbackCopy(txt); }
}
function fallbackCopy(txt){
  try {
    var ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    showToast('Payload copied');
  } catch(e){ showToast('Copy not available'); }
}

// ===================== Plugin host (Apps → bundled first-party plugins) =====================
// On Board is a HOST for reviewed, bundled first-party plugins (no marketplace,
// no remote code, no unsigned auto-update). Plugin internals live in the plugin
// lab; here we only register a tile, manage local Install/Open/Disable state,
// mount/unmount the plugin, and hand it a NARROW host API. Guardrail: plugins
// get NO access by default to crew, paired-device identities, vessel documents,
// certificates, QR pairing secrets, admin/owner data or the network.
// Refs (Obsidian): "Skipi Plugin Update Mechanism — bundled first-party MVP",
//   "Skipi Plugin Lab", handoff "On Board plugin host readiness".

var SkipiPlugins = (window.SkipiPlugins = window.SkipiPlugins || {});
// Reviewed bundled artifacts shipped in dist/plugins/<id>/ (loaded at boot).
var BUNDLED_PLUGIN_DIRS = { 'onboard-host-check': './plugins/onboard-host-check' };
var activePlugin = null;   // { id, instance } while a plugin is mounted
var pluginCssEl = null;    // injected <link> for the active plugin's stylesheet

function bundledPluginIds(){ return Object.keys(BUNDLED_PLUGIN_DIRS).filter(function(id){ return !!SkipiPlugins[id]; }); }
function isBundledPlugin(id){ return !!(BUNDLED_PLUGIN_DIRS[id] && SkipiPlugins[id]); }

function loadBundledPlugins(){
  Object.keys(BUNDLED_PLUGIN_DIRS).forEach(function(id){
    var s = document.createElement('script');
    s.src = BUNDLED_PLUGIN_DIRS[id] + '/index.js';
    s.async = false;
    s.onload = function(){ if(currentModule==='apps' && !activePlugin && !appsState.selectedId) renderApps(); };
    s.onerror = function(){ /* missing/blocked artifact — host stays usable */ };
    document.head.appendChild(s);
  });
}

// Local install state (per install, not synced anywhere).
function pluginStore(){ try { return JSON.parse(localStorage.getItem('skipi-onboard-plugins')||'{}'); } catch(e){ return {}; } }
function pluginStoreSave(s){ try { localStorage.setItem('skipi-onboard-plugins', JSON.stringify(s)); } catch(e){} }
function pluginInfo(id){ var s=pluginStore(); return s[id]||{ installed:false, enabled:false }; }
function pluginUiState(id){ var i=pluginInfo(id); if(!i.installed) return 'available'; return i.enabled ? 'installed' : 'disabled'; }
function pluginName(id){ var p=SkipiPlugins[id]; return (p && p.manifest && p.manifest.name) || id; }

function pluginTileHtml(id){
  var p = SkipiPlugins[id]; if(!p) return '';
  var m = p.manifest || {};
  var st = pluginUiState(id);
  var badge = st==='installed' ? '<span class="apps-badge installed">Installed</span>'
            : st==='disabled'  ? '<span class="apps-badge disabled">Disabled</span>'
            :                    '<span class="apps-badge avail">Available</span>';
  return '<button class="apps-tile" type="button" onclick="appsSelect(\''+id+'\')">'
    + '<span class="apps-tile-icon">'+(m.icon||'🧩')+'</span>'
    + '<span class="apps-tile-body"><span class="apps-tile-name">'+esc(m.name||id)+'</span>'
    + '<span class="apps-tile-sub">'+esc(m.short||'')+'</span>'+badge+'</span></button>';
}

function pluginPermsHtml(m){
  var caps = m.capabilities || {}; var perms = m.permissions || [];
  var rows = [
    ['Local storage (sandboxed)', perms.indexOf('local_storage')>=0],
    ['Network', !!(caps.network && caps.network!=='none')],
    ['Documents', !!(caps.documents && caps.documents!=='none')],
    ['Account', !!(caps.account && caps.account!=='none')],
    ['Analytics', !!(caps.analytics && caps.analytics!=='none')],
    ['Server upload', !!caps.server_upload]
  ];
  var h = '<div class="apps-perm"><div class="apps-perm-title">Permissions &amp; capabilities</div>';
  rows.forEach(function(r){
    var used=!!r[1];
    h += '<div class="apps-perm-row '+(used?'used':'clear')+'"><span class="apps-perm-dot">'+(used?'●':'✓')+'</span>'
       + '<span>'+(used ? esc(r[0])+' — granted' : 'No '+esc(String(r[0]).toLowerCase()))+'</span></div>';
  });
  h += '</div>';
  return h;
}

function pluginActionsHtml(id, st){
  if(st==='available') return '<button class="btn btn-accent" type="button" onclick="pluginInstall(\''+id+'\')">Install</button>';
  if(st==='installed') return '<button class="btn btn-accent" type="button" onclick="pluginOpen(\''+id+'\')">Open</button>'
                            + '<button class="btn btn-outline" type="button" onclick="pluginDisable(\''+id+'\')">Disable</button>';
  return '<button class="btn btn-accent" type="button" onclick="pluginOpen(\''+id+'\')">Open</button>'
       + '<button class="btn btn-outline" type="button" onclick="pluginEnable(\''+id+'\')">Enable</button>';
}

function pluginDetailHtml(id){
  var p = SkipiPlugins[id]; if(!p) return appsListHtml();
  var m = p.manifest || {}; var st = pluginUiState(id);
  var stLabel = st==='installed' ? 'Installed' : st==='disabled' ? 'Disabled' : 'Available';
  var h = '<div class="apps-screen apps-detail">';
  h += '<button class="apps-back" type="button" onclick="appsBack()">← Apps</button>';
  h += '<div class="apps-detail-head"><span class="apps-tile-icon big">'+(m.icon||'🧩')+'</span>'
     + '<div><div class="apps-detail-name">'+esc(m.name||id)+'</div>'
     + '<div class="apps-detail-cat">Plugin · v'+esc(m.version||'0')+' · '+esc(stLabel)+'</div></div></div>';
  if(m.description) h += '<p class="apps-detail-desc">'+esc(m.description)+'</p>';
  h += pluginPermsHtml(m);
  h += '<div class="apps-note"><b>Sandbox</b> — this plugin runs in an isolated container with a narrow host API '
     + '(theme, its own scoped storage, navigation). It has <b>no access</b> to crew, paired devices, vessel documents, '
     + 'certificates, pairing secrets or the network. QR pairing is a trust bootstrap, not a plugin authorization layer.</div>';
  if(m.safety && m.safety.requires_disclaimer){
    h += '<div class="apps-safety"><b>Disclaimer</b> — '+esc(m.safety.disclaimer||'This plugin is not certified equipment.')+'</div>';
  }
  h += '<div class="apps-actions">'+pluginActionsHtml(id, st)+'</div>';
  h += '</div>';
  return h;
}

function pluginInstall(id){
  var p = SkipiPlugins[id]; if(!p) return;
  var s = pluginStore();
  s[id] = { installed:true, enabled:true, version:(p.manifest&&p.manifest.version)||null, installed_at:new Date().toISOString() };
  pluginStoreSave(s);
  showToast(pluginName(id)+' installed');
  renderApps(); // selectedId stays = id → detail now shows Open / Disable
}
function pluginEnable(id){ var s=pluginStore(); if(!s[id]) s[id]={installed:true}; s[id].enabled=true; pluginStoreSave(s); renderApps(); }
function pluginDisable(id){
  if(activePlugin && activePlugin.id===id) unmountActivePlugin();
  var s = pluginStore(); if(s[id]) s[id].enabled=false; pluginStoreSave(s);
  showToast(pluginName(id)+' disabled');
  appsState.selectedId = id; renderApps();
}
function pluginOpen(id){
  var p = SkipiPlugins[id];
  if(!p || typeof p.mount!=='function'){ showToast('Plugin unavailable'); return; }
  var s = pluginStore(); if(!s[id]) s[id]={installed:true};
  s[id].enabled=true; s[id].last_opened_at=new Date().toISOString(); pluginStoreSave(s);
  appsState.selectedId = id;
  renderPluginHost(id);
}

function injectPluginCss(id){
  removePluginCss();
  var l = document.createElement('link');
  l.rel='stylesheet'; l.href = BUNDLED_PLUGIN_DIRS[id] + '/index.css'; l.setAttribute('data-plugin-css', id);
  document.head.appendChild(l); pluginCssEl = l;
}
function removePluginCss(){ if(pluginCssEl){ try { pluginCssEl.remove(); } catch(e){} pluginCssEl=null; } }

function renderPluginHost(id){
  var p = SkipiPlugins[id]; var m = p.manifest || {};
  injectPluginCss(id);
  var h = '<div class="apps-screen plugin-host">';
  h += '<button class="apps-back" type="button" onclick="pluginClose()">← Apps</button>';
  h += '<div class="plugin-host-head"><span class="apps-tile-icon big">'+(m.icon||'🧩')+'</span>'
     + '<div><div class="apps-detail-name" id="plugin-title">'+esc(m.name||id)+'</div>'
     + '<div class="apps-detail-cat">Plugin · v'+esc(m.version||'0')+' · sandboxed</div></div></div>';
  h += '<div class="plugin-mount" id="plugin-mount"></div>';
  h += '</div>';
  setContent(h);
  var container = document.getElementById('plugin-mount');
  try {
    activePlugin = { id:id, instance:p };
    p.mount(container, makeHostApi(id));
  } catch(e){
    container.innerHTML = '<div class="apps-note">Plugin failed to mount: '+esc(''+e)+'</div>';
    activePlugin = null;
  }
}
function unmountActivePlugin(){
  if(activePlugin && activePlugin.instance && typeof activePlugin.instance.unmount==='function'){
    try { activePlugin.instance.unmount(); } catch(e){}
  }
  activePlugin = null; removePluginCss();
}
function pluginClose(){
  var id = activePlugin && activePlugin.id;
  unmountActivePlugin();
  appsState.selectedId = id || null; // back to the plugin's detail screen
  renderApps();
}

// Narrow host API handed to a mounted plugin. Storage is namespaced per plugin
// so a plugin cannot read host/crew/pairing keys. No crew/vessel-doc/pairing API.
function makeHostApi(pluginId){
  var ns = 'skipi-plugin:'+pluginId+':';
  var subs = [];
  return {
    theme: {
      get: function(){ return document.documentElement.getAttribute('data-theme') || 'light'; },
      subscribe: function(cb){ if(typeof cb==='function') subs.push(cb); return function(){ var i=subs.indexOf(cb); if(i>=0) subs.splice(i,1); }; }
    },
    storage: {
      get: function(k){ try { var v=localStorage.getItem(ns+k); return v==null?null:JSON.parse(v); } catch(e){ return null; } },
      set: function(k, val){ try { localStorage.setItem(ns+k, JSON.stringify(val)); } catch(e){} },
      remove: function(k){ try { localStorage.removeItem(ns+k); } catch(e){} }
    },
    audio: { playLoop: function(){}, stop: function(){} }, // no native audio bridge in the On Board host yet
    navigation: {
      closePlugin: function(){ pluginClose(); },
      setTitle: function(t){ var el=document.getElementById('plugin-title'); if(el) el.textContent = String(t); }
    },
    permissions: { listGranted: function(){ var p=SkipiPlugins[pluginId]; return (p&&p.manifest&&p.manifest.permissions)||[]; } }
  };
}

// ---------- boot ----------
document.getElementById('ver-tag').textContent = 'v'+APP_VERSION;
loadBundledPlugins();
showModule('crew');
</script>
