        SkipiPlugins[id] = { manifest: mani };
      } catch(e){
        pluginIntegrity[id] = { ok:false, reason:'bad manifest json: '+e };
        if(typeof console!=='undefined') console.warn('[plugin] bad plugin.json for '+id+': '+e);
      }
    });
  }).catch(function(e){
    pluginIntegrity[id] = { ok:false, reason:''+e };
    if(typeof console!=='undefined') console.warn('[plugin] failed to load '+id+': '+e);
  });
}

// Local install state (per install, not synced anywhere).
function pluginStore(){ try { return JSON.parse(localStorage.getItem('skipi-onboard-plugins')||'{}'); } catch(e){ return {}; } }
function pluginStoreSave(s){ try { localStorage.setItem('skipi-onboard-plugins', JSON.stringify(s)); } catch(e){} }
function pluginInfo(id){
  var s=pluginStore();
  var rec=s[id]||{};
  if(isBundledPlugin(id)) return { installed:rec.installed!==false, enabled:rec.enabled!==false };
  return s[id]||{ installed:false, enabled:false };
}
function pluginUiState(id){ var i=pluginInfo(id); if(!i.installed) return 'available'; return i.enabled ? 'installed' : 'disabled'; }
function pluginName(id){ var p=SkipiPlugins[id]; return (p && p.manifest && p.manifest.name) || id; }

function pluginTileHtml(id){
  var p = SkipiPlugins[id]; if(!p) return '';
  var m = p.manifest || {};
  var st = pluginUiState(id);
  var badge = st==='installed' ? '<span class="apps-badge installed">Installed</span>'
            : st==='disabled'  ? '<span class="apps-badge disabled">Disabled</span>'
            :                    '<span class="apps-badge avail">Available</span>';
  var devTag = m.dev_only ? ' <span class="apps-badge disabled">dev</span>' : '';
  return '<button class="apps-tile" type="button" data-qa="plugin-settings-'+esc(id)+'" onclick="appsSelect(\''+id+'\')">'
    + '<span class="apps-tile-icon">'+(m.icon||'🧩')+'</span>'
    + '<span class="apps-tile-body"><span class="apps-tile-name">'+esc(m.name||id)+devTag+'</span>'
    + '<span class="apps-tile-sub">'+esc(pluginSubLine(id))+'</span>'+badge+'</span></button>';
}

function manifestPermissions(m){
  var out = [];
  function addAll(list){ if(Array.isArray(list)) list.forEach(function(p){ if(out.indexOf(p)<0) out.push(p); }); }
  addAll(m && m.permissions);
  if(m && m.roles && m.roles.onboard) addAll(m.roles.onboard.capabilities);
  if(out.indexOf('vessel.current.read') >= 0 && out.indexOf('vessel.context') < 0) out.push('vessel.context');
  return out;
}
function pluginPermsHtml(m){
  var caps = m.capabilities || {}; var perms = manifestPermissions(m);
  var rows = [
    ['Local storage (sandboxed)', perms.indexOf('local_storage')>=0],
    ['Vessel context (imo / name)', perms.indexOf('vessel.context')>=0],
    ['Reports inbox — read (host-mediated)', perms.indexOf('inbox.read')>=0],
    ['Reports inbox — manage status (host-mediated)', perms.indexOf('inbox.manage')>=0],
    ['Network', !!(caps.network && caps.network!=='none')],
    ['Documents', !!(caps.documents && caps.documents!=='none')],
    ['Account', !!(caps.account && caps.account!=='none')],
    ['Analytics', !!(caps.analytics && caps.analytics!=='none')],
    ['Server upload', !!caps.server_upload]
  ];
  var h = '<div class="apps-perm"><div class="apps-perm-title">Permissions &amp; capabilities</div>';
  rows.forEach(function(r){
    var used=!!r[1];
    h += '<div class="apps-perm-row '+(used?'used':'clear')+'"><span class="apps-perm-dot">'+(used?'●':'✓')+'</span>'
       + '<span>'+(used ? esc(r[0])+' — granted' : 'No '+esc(String(r[0]).toLowerCase()))+'</span></div>';
  });
  h += '</div>';
  return h;
}

function pluginActionsHtml(id, st){
  if(st==='available') return '<button class="btn btn-accent" type="button" onclick="pluginInstall(\''+id+'\')">Install</button>';
  if(st==='installed') return '<button class="btn btn-accent" type="button" onclick="pluginOpen(\''+id+'\')">Open</button>'
                            + pluginUpdateActionHtml(id)
                            + '<button class="btn btn-outline" type="button" onclick="pluginDisable(\''+id+'\')">Disable</button>';
  return '<button class="btn btn-accent" type="button" onclick="pluginOpen(\''+id+'\')">Open</button>'
       + pluginUpdateActionHtml(id)
       + '<button class="btn btn-outline" type="button" onclick="pluginEnable(\''+id+'\')">Enable</button>';
}

function pluginDetailHtml(id){
  var p = SkipiPlugins[id]; if(!p) return appsListHtml();
  var m = p.manifest || {}; var st = pluginUiState(id);
  var stLabel = st==='installed' ? 'Installed' : st==='disabled' ? 'Disabled' : 'Available';
  var h = '<div class="apps-screen apps-detail">';
  h += '<button class="apps-back" type="button" onclick="appsBack()">← Apps</button>';
  h += '<div class="apps-detail-head"><span class="apps-tile-icon big">'+(m.icon||'🧩')+'</span>'
     + '<div><div class="apps-detail-name">'+esc(m.name||id)+'</div>'
     + '<div class="apps-detail-cat">'+esc(['Plugin'].concat(pluginMetaParts(id)).concat([stLabel]).join(' · '))+'</div></div></div>';
  if(m.description) h += '<p class="apps-detail-desc">'+esc(m.description)+'</p>';
  h += pluginPermsHtml(m);
  h += '<div class="apps-note"><b>Sandbox</b> — this plugin runs in an isolated container with a narrow host API '
     + '(theme, its own scoped storage, navigation). It has <b>no access</b> to crew links, vessel documents, '
     + 'certificates or pairing secrets. Any vessel context or reports-inbox access is host-mediated and appears '
     + '<b>only</b> when this plugin\'s manifest declares the matching permission — the vessel access token is '
     + 'never exposed to the plugin. QR pairing is a trust bootstrap, not a plugin authorization layer.</div>';
  if(m.safety && m.safety.requires_disclaimer){
    h += '<div class="apps-safety"><b>Disclaimer</b> — '+esc(m.safety.disclaimer||'This plugin is not certified equipment.')+'</div>';
  }
  h += '<div class="apps-actions">'+pluginActionsHtml(id, st)+'</div>';
  h += '</div>';
  return h;
}

function pluginInstall(id){
  var p = SkipiPlugins[id]; if(!p) return;
  var s = pluginStore();
  s[id] = { installed:true, enabled:true, version:(p.manifest&&p.manifest.version)||null, installed_at:new Date().toISOString() };
  pluginStoreSave(s);
  showToast(pluginName(id)+' installed');
  renderApps(); // selectedId stays = id → detail now shows Open / Disable
}
function pluginEnable(id){ var s=pluginStore(); if(!s[id]) s[id]={installed:true}; s[id].enabled=true; pluginStoreSave(s); renderApps(); }
function pluginDisable(id){
  if(activePlugin && activePlugin.id===id) unmountActivePlugin();
  var s = pluginStore(); if(s[id]) s[id].enabled=false; pluginStoreSave(s);
  showToast(pluginName(id)+' disabled');
  appsState.selectedId = id; renderApps();
}
function pluginOpen(id){
  var p = SkipiPlugins[id];
  var integ = pluginIntegrity[id];
  // mount/unmount no longer live in the host — they run in the isolated frame.
  // We only need a registered manifest + verified bytes to open it.
  if(!p || !integ || !integ.ok){ showToast('Plugin unavailable'); return; }
  var s = pluginStore(); if(!s[id]) s[id]={installed:true};
  s[id].enabled=true; s[id].last_opened_at=new Date().toISOString(); pluginStoreSave(s);
  appsState.selectedId = id;
  renderPluginHost(id);
}

function injectPluginCss(id){
  removePluginCss();
  var integ = pluginIntegrity[id];
  var el;
  if(integ && integ.ok && integ.cssText != null){
    // use the verified stylesheet bytes
    el = document.createElement('style'); el.setAttribute('data-plugin-css', id); el.textContent = integ.cssText;
  } else {
    el = document.createElement('link'); el.rel='stylesheet'; el.href = BUNDLED_PLUGIN_DIRS[id] + '/index.css'; el.setAttribute('data-plugin-css', id);
  }
  document.head.appendChild(el); pluginCssEl = el;
}
function removePluginCss(){ if(pluginCssEl){ try { pluginCssEl.remove(); } catch(e){} pluginCssEl=null; } }

function renderPluginHost(id){
  var p = SkipiPlugins[id]; var m = p.manifest || {}; var integ = pluginIntegrity[id] || {};
  var h = '<div class="apps-screen plugin-host">';
  h += '<button class="apps-back" type="button" onclick="pluginClose()">← Apps</button>';
  h += '<div class="plugin-host-head"><span class="apps-tile-icon big">'+(m.icon||'🧩')+'</span>'
     + '<div><div class="apps-detail-name" id="plugin-title">'+esc(m.name||id)+'</div>'
     + '<div class="apps-detail-cat">'+esc(['Plugin'].concat(pluginMetaParts(id)).concat(['isolated']).join(' · '))+'</div></div></div>';
  h += '<div class="plugin-mount" id="plugin-mount"></div>';
  h += '</div>';
  setContent(h);
  var container = document.getElementById('plugin-mount');
  activePlugin = { id:id };
  // The plugin runs inside the isolated frame; host API is the bridge proxy
  // backed by makeHostApi(id) (permission-enforcing). No host-side plugin code.
  try {
    onboardPluginRuntime.open(id, container, makeHostApi(id), { css:integ.cssText, js:integ.jsText })
      .then(function(res){
        if(!res || !res.ok){
          container.innerHTML = '<div class="apps-note">Plugin failed to start'+(res&&res.reason?(': '+esc(res.reason)):'')+'</div>';
        }
      });
  } catch(e){
    container.innerHTML = '<div class="apps-note">Plugin failed to start: '+esc(''+e)+'</div>';
    activePlugin = null;
  }
}
function unmountActivePlugin(){
  if(activePlugin){ try { onboardPluginRuntime.close(); } catch(e){} }
  activePlugin = null; removePluginCss();
}
function pluginClose(){
  var id = activePlugin && activePlugin.id;
  unmountActivePlugin();
  appsState.selectedId = id || null; // back to the plugin's detail screen
  renderApps();
}

// =========================================================================
// Receiver host bridge — host-mediated access to
// the work-completion photo reports backend, which already exists:
//   GET   /api/reports?imo=...        (the inbox)
//   GET   /api/reports/{id}           (report + photos[])
//   PATCH /api/reports/{id}/status    (received | reviewed | archived)
//   photos served static under /media/reports/...
//
// Guardrails (non-negotiable):
//  - The ONBOARD_TOKEN never leaves host scope. The bearer is injected here;
//    it is never placed in any object handed back to a plugin.
//  - imo is FORCED from crewConfig().vessel_imo on every call, so a plugin
//    cannot read or mutate another vessel's reports.
//  - Same dormant gating as crew: nothing happens unless crewBackendOn()
//    (committed CREW_API_CONNECTED, or a dev-mode override) AND a full config
//    (api_base + onboard_token + vessel_imo) is present — otherwise the plugin
//    gets an honest state, never fake reports/photos.
//  - Each surface needs an explicit manifest permission:
//      vessel.context -> vessel.getContext()
//      inbox.read     -> inbox.list / inbox.get / inbox.photoUrl
//      inbox.manage   -> inbox.setStatus
// =========================================================================
var INBOX_FORWARD_STATUSES = ['received','reviewed','archived']; // office never reverts to "submitted"

function inboxApiBase(){ return String(crewConfig().api_base||'').replace(/\/+$/,''); }
function pluginHasPerm(pluginId, perm){
  var p = SkipiPlugins[pluginId]; var perms = manifestPermissions((p && p.manifest) || {});
  return perms.indexOf(perm) >= 0;
}
// Shared precondition for every inbox call: an honest-state string, or null when
// it is safe to hit the live backend.
function inboxGateState(){
  if(!crewBackendOn()) return 'backend_off';   // dormant: flag off & no dev override
  if(!crewConfigReady()) return 'no_config';   // missing api_base / token / vessel_imo
  return null;
}
// Host-internal fetch. Reads the bearer from crewConfig, injects it, and
// normalizes the response into an envelope so callers can map honest states.
// The token is used here only — it is never returned.
function hostReportsFetch(method, path, body){
  var c = crewConfig();
  var opt = { method:method, headers:{ 'Authorization':'Bearer '+(c.onboard_token||'') } };
  if(body!=null){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  return fetch(inboxApiBase()+path, opt).then(function(r){
    if(r.status===401 || r.status===403) return { ok:false, status:r.status, state:'unauthorized' };
    if(r.status===404) return { ok:false, status:404, state:'not_found' };
    if(!r.ok) return r.text().then(function(t){ return { ok:false, status:r.status, state:'unavailable', message:'HTTP '+r.status+(t?(' '+t.slice(0,120)):'') }; });
    if(r.status===204) return { ok:true, status:204, data:null };
    return r.json().then(function(j){ return { ok:true, status:r.status, data:j }; });
  }).catch(function(e){ return { ok:false, status:0, state:'unavailable', message:''+e }; });
}
// Only /media/... paths are absolutized/handed out — never an API path, so a
// plugin cannot coax the host into building an authenticated-looking URL.
function inboxMediaUrl(u){
  if(!u) return null;
  u = String(u);
  if(/^https?:\/\//i.test(u)) return u;
  if(u.charAt(0)!=='/') u = '/'+u;
  if(u.indexOf('/media/')!==0) return null;
  return inboxApiBase()+u;
}
function inboxAbsolutizeReport(rep){
  if(!rep || typeof rep!=='object') return rep;
  if(rep.thumbnail_url){ var t=inboxMediaUrl(rep.thumbnail_url); if(t) rep.thumbnail_url=t; }
  if(Array.isArray(rep.photos)) rep.photos.forEach(function(p){ if(p && p.storage_url){ var u=inboxMediaUrl(p.storage_url); if(u) p.storage_url=u; } });
  return rep;
}
function inboxResolve(v){ return Promise.resolve(v); }

function hostInboxList(pluginId, opts){
  if(!pluginHasPerm(pluginId,'inbox.read')) return inboxResolve({ ok:false, state:'permission_denied', permission:'inbox.read' });
  var gate = inboxGateState(); if(gate) return inboxResolve({ ok:false, state:gate });
  opts = opts || {};
  var c = crewConfig();
  var qs = 'imo='+encodeURIComponent(c.vessel_imo); // FORCED — plugin cannot target another vessel
  if(opts.status) qs += '&status='+encodeURIComponent(opts.status);
  if(opts.q) qs += '&q='+encodeURIComponent(opts.q);
  var limit = Math.min(Math.max(parseInt(opts.limit,10)||50,1),200);
  var offset = Math.max(parseInt(opts.offset,10)||0,0);
  qs += '&limit='+limit+'&offset='+offset;
  return hostReportsFetch('GET','/api/reports?'+qs, null).then(function(r){
    if(!r.ok) return { ok:false, state:r.state||'unavailable', message:r.message };
    var d = r.data || {}; var items = (d.items||[]).map(inboxAbsolutizeReport);
    return { ok:true, state: items.length ? 'ok' : 'empty', items:items,
             total: (d.total!=null?d.total:items.length), limit:(d.limit||limit), offset:(d.offset||offset) };
  });
}
function hostInboxGet(pluginId, id){
  if(!pluginHasPerm(pluginId,'inbox.read')) return inboxResolve({ ok:false, state:'permission_denied', permission:'inbox.read' });
  var gate = inboxGateState(); if(gate) return inboxResolve({ ok:false, state:gate });
  if(!id) return inboxResolve({ ok:false, state:'bad_request', message:'missing report id' });
  return hostReportsFetch('GET','/api/reports/'+encodeURIComponent(id), null).then(function(r){
    if(!r.ok) return { ok:false, state:r.state||'unavailable', message:r.message };
    var rep = r.data || {};
    // defense in depth: get() is not imo-filtered server-side, so reject a
    // report that does not belong to the configured vessel.
    var imo = crewConfig().vessel_imo;
    if(rep.imo!=null && String(rep.imo)!==String(imo)) return { ok:false, state:'forbidden_vessel' };
    return { ok:true, state:'ok', report: inboxAbsolutizeReport(rep) };
  });
}
function hostInboxSetStatus(pluginId, id, status){
  if(!pluginHasPerm(pluginId,'inbox.manage')) return inboxResolve({ ok:false, state:'permission_denied', permission:'inbox.manage' });
  var gate = inboxGateState(); if(gate) return inboxResolve({ ok:false, state:gate });
  if(!id) return inboxResolve({ ok:false, state:'bad_request', message:'missing report id' });
  if(INBOX_FORWARD_STATUSES.indexOf(status)<0) return inboxResolve({ ok:false, state:'bad_request', message:'invalid status (allowed: '+INBOX_FORWARD_STATUSES.join(', ')+')' });
  return hostReportsFetch('PATCH','/api/reports/'+encodeURIComponent(id)+'/status', { status:status }).then(function(r){
    if(!r.ok) return { ok:false, state:r.state||'unavailable', message:r.message };
    return { ok:true, state:'ok', report: inboxAbsolutizeReport(r.data||{}) };
  });
}
function hostInboxPhotoUrl(pluginId, photo){
  if(!pluginHasPerm(pluginId,'inbox.read')) return null;
  var u = (photo && typeof photo==='object') ? (photo.storage_url || photo.thumbnail_url || photo.url) : photo;
  return inboxMediaUrl(u);
}

// Narrow host API handed to a mounted plugin. Storage is namespaced per plugin
// so a plugin cannot read host/crew/pairing keys. The receiver surfaces
// (vessel/inbox) appear ONLY when the manifest declares the matching permission
// and are host-mediated: the ONBOARD_TOKEN is never handed to the plugin.
function makeHostApi(pluginId){
  var ns = 'skipi-plugin:'+pluginId+':';
  var subs = [];
  return {
    host: { id:'onboard', version:APP_VERSION },
    role: 'vessel',
    theme: {
      get: function(){ return document.documentElement.getAttribute('data-theme') || 'light'; },
      subscribe: function(cb){ if(typeof cb==='function') subs.push(cb); return function(){ var i=subs.indexOf(cb); if(i>=0) subs.splice(i,1); }; }
    },
    storage: {
      get: function(k){ try { var v=localStorage.getItem(ns+k); return v==null?null:JSON.parse(v); } catch(e){ return null; } },
      set: function(k, val){ try { localStorage.setItem(ns+k, JSON.stringify(val)); } catch(e){} },
      remove: function(k){ try { localStorage.removeItem(ns+k); } catch(e){} }
    },
    audio: { playLoop: function(){}, stop: function(){} }, // no native audio bridge in the On Board host yet
    navigation: {
      closePlugin: function(){ pluginClose(); },
      setTitle: function(t){ var el=document.getElementById('plugin-title'); if(el) el.textContent = String(t); }
    },
    // Vessel context — only with the vessel.context permission. No token, no
    // crew roster, no documents; just which vessel this On Board represents.
    vessel: {
      getContext: function(){
        if(!pluginHasPerm(pluginId,'vessel.context')) return { ok:false, state:'permission_denied', permission:'vessel.context' };
        var c = crewConfig();
        return { ok:true, state:'ok',
                 vessel_imo: c.vessel_imo || null,
                 vessel_name: c.vessel_name || null,
                 configured: crewConfigReady(),
                 live: crewLive() };
      }
    },
    // Receiver inbox — host-mediated reports access (see bridge above). Every
    // method resolves to an envelope { ok, state, ... }; honest states:
    // permission_denied | backend_off | no_config | unauthorized | unavailable
    // | not_found | forbidden_vessel | bad_request | empty | ok.
    inbox: {
      list:      function(opts){ return hostInboxList(pluginId, opts); },
      get:       function(id){ return hostInboxGet(pluginId, id); },
      setStatus: function(id, status){ return hostInboxSetStatus(pluginId, id, status); },
      photoUrl:  function(photo){ return hostInboxPhotoUrl(pluginId, photo); }
    },
    permissions: { listGranted: function(){ var p=SkipiPlugins[pluginId]; return manifestPermissions((p&&p.manifest)||{}); } }
  };
}

// ---------- developer mode (hidden toggle: 5 clicks on the version tag) ----------
// Dev mode reveals internal fixtures in the Apps
// catalog. Off by default for normal users; no effect on real plugins.
function isDevMode(){ try { return localStorage.getItem('skipi-onboard-dev')==='1'; } catch(e){ return false; } }
function setDevMode(on){
  try { if(on) localStorage.setItem('skipi-onboard-dev','1'); else localStorage.removeItem('skipi-onboard-dev'); } catch(e){}
  updateVerTag();
  showToast('Developer mode '+(on?'on':'off'));
  if(currentModule==='apps' && !activePlugin){ appsState.selectedId=null; renderApps(); }
  else if(currentModule==='settings'){ renderSettings(); }
}
function updateVerTag(){ var el=document.getElementById('ver-tag'); if(el) el.textContent=appVersionLabel()+(isDevMode()?' · dev':''); }
var _verClicks=0, _verTimer=null;
function verTagClick(){
  _verClicks++;
  if(_verTimer) clearTimeout(_verTimer);
  _verTimer=setTimeout(function(){ _verClicks=0; }, 2500);
  if(_verClicks>=5){ _verClicks=0; setDevMode(!isDevMode()); }
}

// ---------- boot ----------
// Guarded so a headless harness can load the shipped host code (makeHostApi,
// inbox bridge, crew config) without a DOM. Never set in production.
if(!(typeof window!=='undefined' && window.__ONBOARD_NO_BOOT__)){
  loadBuildInfo();
  updateVerTag();
  (function(){ var v=document.getElementById('ver-tag'); if(v){ v.style.cursor='default'; v.addEventListener('click', verTagClick); } })();
  loadBundledPlugins();
  if(launchShouldEnterExistingShell()) launchEnterShell();
  else showLaunch('choice');
}
</script>
