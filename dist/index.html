<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Skipi On Board — United Seafarers</title>
<style>
  /* Skipi On Board — desktop Apps-only shell.
     Visual family with Skipi Seafarer: light theme by default, petrol accent
     (#004564), top modules-bar, calm cards. This first slice is intentionally
     local/static — no server, no account, no personal data, no marketplace. */
  :root, [data-theme="light"] {
    --bg:#ffffff; --surface:#f6f6f6; --surface2:#eeeeee;
    --text:#1e1e1e; --text2:#6b7280; --border:#e2e4e8; --hover:#f0f1f3;
    --accent:#004564; --accent-rgb:0,69,100; --accent-strong:#00384f;
    --accent-bg:rgba(var(--accent-rgb),0.10); --accent-bg2:rgba(var(--accent-rgb),0.22);
    --green:#3f9d6a; --orange:#c9852f;
    --font-ui:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-ui);
    font-size:14px; display:flex; flex-direction:column; overflow:hidden; }
  ::selection { background:var(--accent-bg2); }

  /* ---- top modules bar (shell) ---- */
  .modules-bar { display:flex; align-items:center; height:34px; background:var(--surface);
    border-bottom:1px solid var(--border); padding:0 8px; gap:2px; flex-shrink:0; }
  .brand { display:none; }
  .mod-tabs { display:flex; align-items:center; gap:2px; min-width:0; }
  .mod-tab { height:26px; min-width:90px; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:0 12px; border-radius:5px; font-size:12px; font-weight:500; color:var(--text2);
    background:transparent; border:1px solid transparent; cursor:pointer; white-space:nowrap; }
  .mod-tab:hover { color:var(--text); background:var(--hover); }
  .mod-tab.active { color:#fff; background:var(--accent); border-color:var(--accent); font-weight:600; box-shadow:0 1px 0 var(--accent); }
  .mod-tab.locked { color:var(--text2); background:transparent; border:1px dashed var(--border); cursor:pointer; }
  .mod-tab.locked:hover { color:var(--text); border-color:var(--accent); }
  .mod-tab.locked .lock { font-size:11px; opacity:.8; margin-right:1px; }
  .bar-spacer { flex:1; }
  .bar-note { font-size:11.5px; color:var(--text2); white-space:nowrap; margin-right:6px; }
  .mb-vessel { display:flex; align-items:center; gap:6px; height:26px; padding:0 10px; border-radius:5px;
    cursor:default; color:var(--text); font-size:12px; background:var(--bg); border:1px solid var(--border);
    max-width:240px; overflow:hidden; }
  .mb-vessel-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mb-caret { opacity:.6; font-size:10px; }

  /* ---- scroll body ---- */
  main { flex:1; overflow-y:auto; }
  .apps-screen { padding:24px 28px 48px; max-width:940px; }

  .apps-head-title { font-size:24px; font-weight:800; color:var(--text); }
  .apps-head-sub { font-size:12.5px; color:var(--text2); margin-top:6px; line-height:1.5; max-width:660px; }

  .apps-cat-title { font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
    color:var(--text2); margin:26px 0 11px; }
  .apps-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(252px,1fr)); gap:13px; }
  .apps-tile { display:flex; gap:13px; text-align:left; align-items:flex-start; padding:15px;
    border:1px solid var(--border); border-radius:13px; background:var(--surface); color:var(--text);
    cursor:pointer; transition:border-color .12s, transform .05s, box-shadow .12s; }
  .apps-tile:hover { border-color:var(--accent); box-shadow:0 1px 6px rgba(0,0,0,.04); }
  .apps-tile:active { transform:translateY(1px); }
  .apps-tile.soon { opacity:.82; }
  .apps-tile-icon { width:48px; height:48px; flex:0 0 auto; border-radius:12px; background:var(--accent-bg);
    color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:25px; }
  .apps-tile-icon.big { width:60px; height:60px; font-size:32px; border-radius:15px; }
  .apps-tile-body { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .apps-tile-name { font-size:15px; font-weight:800; line-height:1.2; }
  .apps-tile-sub { font-size:12px; color:var(--text2); line-height:1.4; }
  .apps-badge { display:inline-block; align-self:flex-start; margin-top:6px; font-size:10px; font-weight:800;
    text-transform:uppercase; letter-spacing:.04em; padding:2px 8px; border-radius:999px; }
  .apps-badge.live { background:var(--accent-bg); color:var(--accent); }
  .apps-badge.soon { background:var(--hover); color:var(--text2); }

  /* ---- detail ---- */
  .apps-detail { max-width:660px; }
  .apps-back { background:transparent; border:none; color:var(--accent); font-size:13px; font-weight:700;
    cursor:pointer; padding:4px 0; margin-bottom:10px; }
  .apps-detail-head { display:flex; gap:15px; align-items:center; margin-bottom:8px; }
  .apps-detail-name { font-size:21px; font-weight:800; color:var(--text); }
  .apps-detail-cat { font-size:12px; color:var(--text2); margin-top:3px; }
  .apps-detail-desc { font-size:13.5px; color:var(--text); line-height:1.55; }
  .apps-note { font-size:12.5px; color:var(--text2); background:var(--surface); border:1px solid var(--border);
    border-radius:9px; padding:11px 13px; margin:12px 0; line-height:1.45; }
  .apps-safety { font-size:12.5px; color:var(--text); background:var(--accent-bg); border:1px solid var(--accent-bg2);
    border-radius:9px; padding:11px 13px; margin:12px 0; line-height:1.5; }
  .apps-hosts { display:flex; flex-wrap:wrap; gap:6px; margin:14px 0 4px; }
  .apps-host-chip { font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-bg);
    border:1px solid var(--accent-bg2); border-radius:999px; padding:3px 10px; }
  .apps-host-chip.self { color:#fff; background:var(--accent); border-color:var(--accent); }
  .apps-perm { border:1px solid var(--border); border-radius:11px; padding:13px 15px; margin:16px 0; background:var(--surface); }
  .apps-perm-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); margin-bottom:9px; }
  .apps-perm-row { display:flex; align-items:center; gap:9px; font-size:13px; padding:3px 0; color:var(--text); }
  .apps-perm-dot { width:18px; height:18px; flex:0 0 auto; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; line-height:1; }
  .apps-perm-row.clear .apps-perm-dot { background:rgba(63,157,106,.16); color:var(--green); }
  .apps-perm-row.used .apps-perm-dot { background:rgba(201,133,47,.18); color:var(--orange); }
  .apps-actions { margin-top:20px; }
  /* ---- Apps compact plugin launcher v2 (UI Standard) ---- */
  .apps-launch-bar { display:flex; align-items:center; gap:10px; margin:2px 0 16px; }
  .apps-search { flex:1; display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border);
    border-radius:9px; padding:0 12px; height:38px; }
  .apps-search:focus-within { border-color:var(--accent); background:#fff; }
  .apps-search-ico { color:var(--text2); font-size:14px; }
  .apps-search input { flex:1; border:0; outline:0; background:transparent; font-size:14px; color:var(--text); font-family:var(--font-ui); }
  .apps-gear-btn { width:38px; height:38px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; border-radius:9px;
    border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; font-size:17px; }
  .apps-gear-btn:hover { color:var(--accent); border-color:var(--accent); background:var(--accent-bg); }
  .apps-sec-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); margin:4px 0 10px; }
  .apps-launch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:14px; }
  .apps-launch-tile-wrap { display:flex; }
  .apps-launch-tile { flex:1; display:flex; flex-direction:column; align-items:center; gap:9px; padding:15px 8px; border:1px solid var(--border);
    border-radius:12px; background:var(--surface); cursor:pointer; text-align:center; transition:border-color .12s, background .12s; }
  .apps-launch-tile:hover { border-color:var(--accent); background:var(--accent-bg); }
  .apps-launch-ico { width:50px; height:50px; display:flex; align-items:center; justify-content:center; font-size:27px;
    border-radius:13px; background:var(--accent-bg); color:var(--accent); }
  .apps-launch-name { font-size:12.5px; font-weight:700; color:var(--text); line-height:1.2; }
  .apps-launch-sub { font-size:10.5px; color:var(--text2); line-height:1.2; }
  .apps-state { text-align:center; padding:34px 16px; color:var(--text2); }
  .apps-state-ico { font-size:32px; opacity:.65; }
  .apps-state-t { font-weight:700; color:var(--text); margin-top:9px; font-size:14px; }
  .apps-state-s { font-size:13px; margin-top:5px; line-height:1.45; }
  .btn { font-size:14px; font-weight:700; border-radius:9px; padding:11px 18px; border:1px solid var(--border); cursor:pointer; }
  .btn-outline { background:var(--surface); color:var(--text2); }
  .btn-outline[disabled] { cursor:not-allowed; opacity:.7; }
  .btn-accent { background:var(--accent); color:#fff; border:1px solid var(--accent); }
  .btn-accent:hover { background:var(--accent-strong); }
  .btn-sm { padding:5px 11px; font-size:12px; }

  /* ---- pairing panel ---- */
  .apps-head-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .pair-cta { font-size:13px; font-weight:700; color:#fff; background:var(--accent); border:1px solid var(--accent);
    border-radius:9px; padding:9px 14px; cursor:pointer; white-space:nowrap; }
  .pair-cta:hover { background:var(--accent-strong); }
  .pair-screen { max-width:900px; }
  .pair-grid { display:grid; grid-template-columns:300px 1fr; gap:26px; margin-top:18px; align-items:start; }
  .pair-qr-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px;
    display:flex; flex-direction:column; align-items:center; gap:13px; }
  .pair-qr-img { width:248px; height:248px; image-rendering:pixelated; border-radius:6px; background:#fff; }
  .pair-qr-missing { width:248px; height:248px; display:flex; align-items:center; justify-content:center;
    color:var(--text2); font-size:13px; text-align:center; border:1px dashed var(--border); border-radius:6px; padding:14px; }
  .pair-countdown { font-size:13px; font-weight:700; color:var(--text2); font-variant-numeric:tabular-nums; }
  .pair-expired { color:#b3402a; }
  .pair-side { min-width:0; }
  .pair-meta { display:flex; gap:10px; font-size:12.5px; padding:3px 0; }
  .pair-meta-k { color:var(--text2); width:56px; flex:0 0 auto; }
  .pair-meta-v { color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace; word-break:break-all; }
  .pair-scopes { margin:13px 0 4px; }
  .pair-scopes-t { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); margin-bottom:8px; }
  .pair-scope { display:inline-block; font-size:11.5px; color:var(--accent); background:var(--accent-bg);
    border:1px solid var(--accent-bg2); border-radius:999px; padding:3px 9px; margin:0 5px 5px 0; }
  .pair-payload-head { display:flex; align-items:center; justify-content:space-between; margin:16px 0 6px;
    font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); }
  .pair-payload { background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:12px;
    font-size:11.5px; line-height:1.45; color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace;
    white-space:pre-wrap; word-break:break-word; max-height:280px; overflow:auto; margin:0; }
  .pair-code-card { margin:14px 0; border:1px solid var(--border); border-radius:12px; background:var(--surface); padding:14px; }
  .pair-code-label { color:var(--text2); font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.04em; margin-bottom:7px; }
  .pair-code-value { color:var(--text); font:900 24px/1.15 ui-monospace,Menlo,Consolas,monospace; letter-spacing:.08em; word-break:break-all; }
  .pair-code-help { color:var(--text2); font-size:12px; line-height:1.45; margin-top:7px; }
  .pair-code-warn { border-color:rgba(226,185,61,.45); background:rgba(226,185,61,.08); }
  @media (max-width:780px){ .pair-grid { grid-template-columns:1fr; } }

  /* ---- crew module ---- */
  .crew-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:13px; margin:18px 0 26px; }
  .crew-stat { background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:15px 16px; }
  .crew-stat-k { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.04em; }
  .crew-stat-v { font-size:28px; font-weight:800; color:var(--text); line-height:1.1; margin-top:7px; }
  .crew-stat-s { font-size:11.5px; color:var(--text2); margin-top:3px; }
  .crew-section-t { font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--text2); margin:8px 0 12px; }
  .crew-empty { background:var(--surface); border:1px dashed var(--border); border-radius:13px; padding:34px 22px; text-align:center; }
  .crew-empty-icon { font-size:30px; }
  .crew-empty-t { font-size:15px; font-weight:800; color:var(--text); margin-top:8px; }
  .crew-empty-s { font-size:12.5px; color:var(--text2); margin-top:6px; line-height:1.5; max-width:440px; margin-left:auto; margin-right:auto; }
  .crew-empty .pair-cta { margin-top:16px; }

  /* ---- vessel documents module (v0 vessel vault) ---- */
  .docs-screen { padding:24px 28px 48px; max-width:1360px; }
  .docs-pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .docs-offline { display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700;
    color:var(--text2); background:var(--hover); border:1px solid var(--border); border-radius:999px; padding:4px 10px; }
  .docs-wrap { display:grid; grid-template-columns:360px minmax(0,1fr); gap:24px; align-items:start; margin-top:18px; }
  .docs-left { min-width:0; }
  .docs-right { min-width:0; }
  .docs-left-head { display:flex; gap:8px; margin-bottom:12px; }
  .docs-search { flex:1; display:flex; align-items:center; gap:8px; background:var(--surface);
    border:1px solid var(--border); border-radius:9px; padding:0 11px; height:36px; }
  .docs-search:focus-within { border-color:var(--accent); background:#fff; }
  .docs-search input { flex:1; border:0; outline:0; background:transparent; font-size:13px; color:var(--text); font-family:var(--font-ui); min-width:0; }
  .docs-add-btn { height:36px; padding:0 12px; border-radius:9px; border:1px solid var(--accent); background:var(--accent);
    color:#fff; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .docs-add-btn:hover { background:var(--accent-strong); }
  .docs-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .docs-chip { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; color:var(--text2);
    background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:4px 10px; cursor:pointer; }
  .docs-chip:hover { color:var(--accent); border-color:var(--accent); }
  .docs-chip.active { color:#fff; background:var(--accent); border-color:var(--accent); }
  .docs-chip .n { font-weight:800; opacity:.75; }
  .docs-tree { display:flex; flex-direction:column; gap:8px; }
  .docs-cat { border:1px solid var(--border); border-radius:12px; background:var(--surface); overflow:hidden; }
  .docs-cat-head { display:flex; align-items:center; gap:9px; width:100%; padding:10px 12px; background:transparent;
    border:0; cursor:pointer; text-align:left; font:inherit; color:var(--text); }
  .docs-cat-head:hover { background:var(--hover); }
  .docs-cat-ico { font-size:16px; }
  .docs-cat-name { flex:1; font-size:13px; font-weight:800; min-width:0; }
  .docs-cat-n { font-size:11.5px; color:var(--text2); font-weight:700; }
  .docs-caret { font-size:10px; color:var(--text2); }
  .docs-rows { border-top:1px solid var(--border); background:#fff; }
  .docs-row { display:flex; align-items:center; gap:8px; width:100%; padding:9px 12px; border:0; border-top:1px solid var(--border);
    background:transparent; cursor:pointer; text-align:left; font:inherit; color:var(--text); }
  .docs-row:first-child { border-top:0; }
  .docs-row:hover { background:var(--hover); }
  .docs-row.sel { background:var(--accent-bg); }
  .docs-row-title { flex:1; font-size:12.5px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .docs-dot { width:9px; height:9px; flex:0 0 auto; border-radius:50%; background:#c3c8cf; }
  .docs-dot.st-red { background:#b3402a; } .docs-dot.st-orange { background:var(--orange); }
  .docs-dot.st-yellow { background:#d4a017; } .docs-dot.st-green { background:var(--green); }
  .docs-dot.st-muted { background:#c3c8cf; }
  .docs-kind { font-size:9.5px; font-weight:800; letter-spacing:.03em; padding:2px 6px; border-radius:6px;
    background:var(--hover); color:var(--text2); text-transform:uppercase; flex:0 0 auto; }
  .docs-kind.req { background:var(--accent-bg); color:var(--accent); }
  .docs-badge { display:inline-flex; align-items:center; font-size:11px; font-weight:800; border-radius:999px;
    padding:3px 10px; color:#fff; background:#8a919b; white-space:nowrap; }
  .docs-badge.st-red { background:#b3402a; } .docs-badge.st-orange { background:var(--orange); }
  .docs-badge.st-yellow { background:#b8860b; } .docs-badge.st-green { background:var(--green); }
  .docs-badge.st-muted { background:#8a919b; }
  .docs-days { font-size:11px; color:var(--text2); }
  .docs-detail-card { border:1px solid var(--border); border-radius:14px; background:var(--surface); padding:18px; }
  .docs-det-head { display:flex; align-items:center; gap:12px; }
  .docs-title-inp { flex:1; font-size:17px; font-weight:800; color:var(--text); background:#fff; border:1px solid var(--border);
    border-radius:9px; padding:9px 12px; min-width:0; font-family:var(--font-ui); }
  .docs-title-inp:focus { outline:none; border-color:var(--accent); }
  .docs-fields { display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; margin-top:14px; }
  .docs-field { min-width:0; }
  .docs-perm-chk { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text); margin-top:26px; cursor:pointer; }
  .docs-reg-chip { font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-bg);
    border:1px solid var(--accent-bg2); border-radius:999px; padding:3px 9px; }
  .docs-file { display:flex; gap:12px; align-items:flex-start; border:1px solid var(--border); border-radius:11px;
    background:#fff; padding:13px; margin-top:14px; }
  .docs-file-ico { font-size:22px; }
  .docs-file-meta { flex:1; min-width:0; }
  .docs-file-name { font-size:13px; font-weight:700; word-break:break-all; }
  .docs-file-sub { font-size:11.5px; color:var(--text2); margin-top:2px; }
  .docs-file-note { font-size:11.5px; color:var(--text2); margin-top:8px; line-height:1.45; }
  .docs-drop { border:1.5px dashed var(--border); border-radius:11px; background:#fff; padding:22px 16px;
    margin-top:14px; text-align:center; color:var(--text2); font-size:12.5px; }
  .docs-drop.over { border-color:var(--accent); background:var(--accent-bg); }
  .docs-autosave { font-size:11.5px; color:var(--text2); margin-top:12px; }
  .docs-danger { margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
  .docs-stat { text-align:left; cursor:pointer; font:inherit; border:1px solid var(--border); }
  .docs-stat:hover { border-color:var(--accent); }
  .docs-add-ov { position:fixed; inset:0; z-index:120; background:rgba(15,23,42,.26); display:flex;
    align-items:center; justify-content:center; padding:24px; }
  .docs-add-card { width:min(440px,92vw); background:#fff; border:1px solid #cfd7df; border-radius:15px;
    padding:20px; box-shadow:0 18px 44px rgba(15,23,42,.14); }
  @media (max-width:900px){ .docs-wrap { grid-template-columns:1fr; } .docs-fields { grid-template-columns:1fr; } }

  /* ---- plugin host ---- */
  .apps-badge.avail { background:var(--accent-bg); color:var(--accent); }
  .apps-badge.installed { background:rgba(63,157,106,.16); color:var(--green); }
  .apps-badge.disabled { background:var(--hover); color:var(--text2); }
  .apps-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .plugin-host-head { display:flex; gap:15px; align-items:center; margin-bottom:6px; }
  .plugin-mount { margin-top:14px; border:1px solid var(--border); border-radius:13px; padding:18px; background:var(--bg); }

  /* ---- settings (gear) ---- */

<script>
var APP_VERSION = '0.1.0';
var APP_BUILD_SHA = 'unknown';
function buildShortSha(){
  return APP_BUILD_SHA && APP_BUILD_SHA !== 'unknown' ? APP_BUILD_SHA.slice(0,7) : '';
}
function appVersionLabel(){
  var sha = buildShortSha();
  return 'v'+APP_VERSION+(sha?' · '+sha:'');
}
function updateBuildLabels(){
  updateVerTag();
  if(currentModule==='settings') renderSettings();
}
function setBuildInfo(info){
  if(info && info.version) APP_VERSION = String(info.version);
  if(info && info.sha) APP_BUILD_SHA = String(info.sha);
  else if(info && info.short_sha) APP_BUILD_SHA = String(info.short_sha);
  updateBuildLabels();
}
async function loadBuildInfo(){
  for(var i=0;i<30;i++){
    try {
      var core = window.__TAURI__ && window.__TAURI__.core;
      if(core && core.invoke){
        setBuildInfo(await core.invoke('get_build_info'));
        return;
      }
    } catch(e) {
      // Tauri bridge can be injected just after this inline script runs.
    }
    await new Promise(function(resolve){ setTimeout(resolve, 100); });
  }
  updateBuildLabels();
}

// ---------- helpers ----------
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._t); showToast._t=setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

// ---------- launch / first-run fork ----------
function launchBrandHtml(){
  return '<div class="launch-brand-panel">'

    + '<div class="launch-meta">'
    + '<span class="launch-chip">Accent #004564</span>'
    + '<span class="launch-chip">Light desktop shell</span>'
    + '<span class="launch-chip">Local honest UI</span>'
    + '</div>'
    + '</div>';
}
function launchLayout(panelHtml){
  document.body.classList.add('launching');
  setContent('<section class="launch-screen" data-qa="onboard-launch-screen">'
    + launchBrandHtml()
    + '<div class="launch-panel">' + panelHtml + '</div>'

function showLaunch(mode, err){
  if(mode==='use'){
    launchLayout('<div class="launch-panel-title">Начать работу</div>'
      + '<div class="launch-panel-sub">Выберите, с каким судовым контекстом открыть Skipi On Board.</div>'
      + '<div class="launch-actions">'
      + '<button class="launch-option primary" type="button" data-qa="onboard-launch-create-vessel" onclick="launchCreateVessel()">'
      + '<span class="launch-option-title">Создать новое судно</span>'
      + '<span class="launch-option-sub">Новый vessel vault: профиль судна, документы, экипаж и локальный рабочий контекст.</span>'
      + '</button>'
      + '<button class="launch-option" type="button" data-qa="onboard-launch-connect-existing" onclick="showLaunch(\'connect\')">'
      + '<span class="launch-option-title">Подключиться к существующему судну</span>'
      + '<span class="launch-option-sub">Введите код, показанный в действующем судовом On Board пространстве.</span>'
      + '</button>'
      + '</div>'
      + '<button class="launch-back" type="button" data-qa="onboard-launch-back" onclick="showLaunch(\'choice\')">Назад</button>');
    return;
  }
  if(mode==='connect'){
    launchLayout('<div class="launch-panel-title">Подключиться по коду</div>'
      + '<div class="launch-panel-sub">Код связывает этот On Board экран с существующим судовым пространством. Это не device pairing и не миграция устройства.</div>'

      + '<div class="launch-inline-actions">'

      + '<button class="btn btn-outline" type="button" data-qa="onboard-launch-back" onclick="showLaunch(\'use\')">Назад</button>'
      + '</div>'
      + '</form>'
      + '<div class="launch-note">В этой локальной оболочке код сохраняется как pending connection. Проверка кода и выдача доступа должны подключаться отдельным backend/wiring треком.</div>');
    setTimeout(function(){ var el=document.getElementById('launch-code'); if(el) el.focus(); }, 0);

  launchLayout('<div class="launch-panel-title">Открыть Skipi On Board</div>'

}
function launchSaveContext(mode, extra){
  var c = {};
  try { c = crewConfig(); } catch(e){}
  c.vessel_mode = mode;
  if(extra){ for(var k in extra){ if(Object.prototype.hasOwnProperty.call(extra,k)) c[k] = extra[k]; } }
  try {
    saveCrewConfig(c);
    localStorage.setItem('skipi-onboard-launch-mode', mode);
  } catch(e){}
  updateVesselChip();
}
function launchEnterShell(msg){
  document.body.classList.remove('launching');
  showModule('crew');
  if(msg) showToast(msg);
}
function launchShouldEnterExistingShell(){
  return crewLive() && crewConfigMissing().length===0;
}
function launchDemo(){
  launchSaveContext('demo', { vessel_name:'Demo vessel' });
  launchEnterShell('Demo vessel opened');
}
function launchCreateVessel(){
  launchSaveContext('created', { vessel_name:'New vessel' });
  launchEnterShell('New vessel workspace created locally');
}
function launchSubmitCode(){
  var el = document.getElementById('launch-code');
  var code = el ? String(el.value||'').replace(/\s+/g,'').toUpperCase() : '';
  if(code.length < 4){ showLaunch('connect', 'Введите код судна.'); return; }
  launchSaveContext('join-code', { vessel_name:'Existing vessel (pending)', pending_vessel_code:code });
  try { localStorage.setItem('skipi-onboard-pending-vessel-code', code); } catch(e){}
  launchEnterShell('Vessel code saved for connection review');
}

function appsCatLabel(key){ for(var i=0;i<SKIPI_APP_CATEGORIES.length;i++){ if(SKIPI_APP_CATEGORIES[i].key===key) return SKIPI_APP_CATEGORIES[i].label; } return key; }

// ---------- Apps — compact plugin launcher (UI Standard: Compact Plugin Launcher v2) ----------
// Primary Apps surface = compact launcher of INSTALLED plugins as icon tiles +
// search + a plugins-settings gear. The full catalog / install-disable / complex
// states live behind the gear ("manage" view) so the launcher stays minimal
// (Tymur: «только значки, минимализм, ничего лишнего»). Plugin runtime, registry
// and integrity logic are untouched — this is presentation only.
function installedPluginIds(){
  return catalogPluginIds().filter(function(id){ return pluginUiState(id)==='installed'; });
}
function appsShortLabel(id){
  var m = (SkipiPlugins[id] && SkipiPlugins[id].manifest) || {};
  return m.short_name || m.name || id;
}
function pluginManifest(id){ return (SkipiPlugins[id] && SkipiPlugins[id].manifest) || {}; }
function pluginVersion(id){ var m=pluginManifest(id); return m.version ? String(m.version) : ''; }
function pluginVersionLabel(id){ var v=pluginVersion(id); return v ? 'v'+v : ''; }
function pluginToolCount(id){
  var m=pluginManifest(id);
  var n=m.tool_count || m.toolCount || (id==='navigation-calculators' ? 4 : 0);
  n=parseInt(n,10);
  return isNaN(n) || n<=0 ? 0 : n;
}
function pluginToolsLabel(id){ var n=pluginToolCount(id); return n ? (n+' '+(n===1?'tool':'tools')) : ''; }
function pluginMetaParts(id){
  var out=[], v=pluginVersionLabel(id), t=pluginToolsLabel(id);
  if(v) out.push(v);
  if(t) out.push(t);
  return out;
}
function pluginMetaLine(id){ return pluginMetaParts(id).join(' · '); }
function pluginSubLine(id){
  var m=pluginManifest(id), out=[];
  if(m.short) out.push(m.short);
  var meta=pluginMetaLine(id);
  if(meta) out.push(meta);
  return out.join(' · ');
}
function pluginNameMetaLine(id){
  var meta=pluginMetaLine(id);
  return appsShortLabel(id)+(meta?' · '+meta:'');
}
function semverParts(v){
  return String(v||'').split(/[.+-]/).slice(0,3).map(function(x){ var n=parseInt(x,10); return isNaN(n)?0:n; });
}
function semverGt(a,b){
  var x=semverParts(a), y=semverParts(b);
  for(var i=0;i<3;i++){ if((x[i]||0)>(y[i]||0)) return true; if((x[i]||0)<(y[i]||0)) return false; }
  return false;
}
function remoteStagingOn(){ return !!window.FEATURE_REMOTE_PLUGIN_DELIVERY; }
function pluginCatalogVersion(id){
  var c=window.SKIPI_PLUGIN_CATALOG||{}, p=null;
  if(Array.isArray(c.plugins)) p=c.plugins.find(function(x){ return x && (x.slug===id || x.id===id); })||null;
  else p=c[id]||null;
  return p&&p.version ? String(p.version) : '';
}
function pluginUpdateAvailable(id){
  if(!remoteStagingOn()) return false;
  var latest=pluginCatalogVersion(id);
  if(!latest) return false;
  var installed=(pluginStore()[id]||{}).version || pluginVersion(id);
  return semverGt(latest, installed);
}
function pluginUpdateActionHtml(id){
  if(!pluginUpdateAvailable(id)) return '';
  return '<button class="btn btn-accent" type="button" data-qa="plugin-update-'+esc(id)+'" onclick="pluginUpdateNotice(\''+esc(id)+'\')">Обновить</button>';
}
function pluginUpdateNotice(id){ showToast('Plugin update delivery is not enabled yet'); }
function appsLaunchTileHtml(id){
  var m = (SkipiPlugins[id] && SkipiPlugins[id].manifest) || {};
  var name = esc(appsShortLabel(id));
  var sub = m.tagline ? '<span class="apps-launch-sub">'+esc(m.tagline)+'</span>' : '';
  var meta = pluginMetaLine(id) ? '<span class="apps-launch-sub">'+esc(pluginMetaLine(id))+'</span>' : '';
  return '<div class="apps-launch-tile-wrap" data-qa="plugin-tile-'+esc(id)+'">'
    + '<button class="apps-launch-tile" type="button" data-qa="plugin-open-'+esc(id)+'" title="'+esc(pluginNameMetaLine(id))+'" onclick="pluginOpen(\''+esc(id)+'\')">'
    + '<span class="apps-launch-ico">'+(m.icon||'🧩')+'</span>'
    + '<span class="apps-launch-name">'+name+'</span>'+sub+meta
    + '</button></div>';
}
// Only the tiles+states region — re-rendered on search without touching the input.
function appsLauncherBodyHtml(){
  // Honest offline state (real navigator.onLine — no faking).
  if(typeof navigator!=='undefined' && navigator.onLine===false){
    return '<div class="apps-state" data-qa="plugin-offline-state"><div class="apps-state-ico">📡</div>'
      + '<div class="apps-state-t">Нет сети</div>'
      + '<div class="apps-state-s">Установленные плагины открываются офлайн; сетевые функции вернутся при подключении.</div></div>';
  }
  var h = '';
  // Honest integrity-error state for any catalog plugin that failed its checksum.
  var failed = catalogPluginIds().filter(function(id){ return pluginIntegrity[id] && pluginIntegrity[id].ok===false; });
  if(failed.length){
    h += '<div class="apps-state" data-qa="plugin-error-state" style="text-align:left;padding:14px 16px">'
      + '<div class="apps-state-t">⚠ Плагин не загружен</div>'
      + '<div class="apps-state-s">'+failed.length+' плагин(ов) не прошли проверку целостности и отключены. Подробности — в настройках плагинов.</div></div>';
  }
  var q = String(appsState.q||'').trim().toLowerCase();
  var ids = installedPluginIds();
  if(q){ ids = ids.filter(function(id){ return appsShortLabel(id).toLowerCase().indexOf(q)>=0; }); }
  if(!ids.length){
    if(q){
      h += '<div class="apps-state" data-qa="plugin-empty-state"><div class="apps-state-ico">🔍</div>'
        + '<div class="apps-state-t">Ничего не найдено</div>'
        + '<div class="apps-state-s">Поиск ведётся только по установленным плагинам.</div></div>';
    } else {
      h += '<div class="apps-state" data-qa="plugin-empty-state"><div class="apps-state-ico">🧩</div>'
        + '<div class="apps-state-t">Нет установленных плагинов</div>'
        + '<div class="apps-state-s">Откройте настройки плагинов, чтобы посмотреть каталог и установить плагин.</div>'
        + '<button class="btn btn-accent btn-sm" type="button" style="margin-top:14px" onclick="appsSetView(\'manage\')">Настройки плагинов</button></div>';
    }
    return h;
  }
  h += '<div class="apps-sec-title">Установленные плагины · Installed plugins</div>';
  h += '<div class="apps-launch-grid">';
  for(var i=0;i<ids.length;i++){ h += appsLaunchTileHtml(ids[i]); }
  h += '</div>';
  return h;
}
function appsLauncherHtml(){
  var h = '<div class="apps-screen">';
  h += '<div class="apps-launch-bar">'
    + '<div class="apps-search"><span class="apps-search-ico">🔍</span>'
    + '<input id="apps-search-input" data-qa="apps-search-input" type="text" autocomplete="off" spellcheck="false" '
    + 'placeholder="Найти плагин…" value="'+esc(appsState.q||'')+'" oninput="appsFilter(this.value)">'
    + '</div>'
    + '<button class="apps-gear-btn" type="button" data-qa="plugins-settings-open" title="Настройки плагинов · Plugin settings" onclick="appsSetView(\'manage\')">⚙</button>'
    + '</div>';
  h += '<div id="apps-launch-body">'+appsLauncherBodyHtml()+'</div>';
  h += '</div>';
  return h;
}
// Live filter — re-render only the tiles region so the search input keeps focus.
function appsFilter(val){
  appsState.q = val || '';
  var el = document.getElementById('apps-launch-body');
  if(el) el.innerHTML = appsLauncherBodyHtml();
}
function appsSetView(v){
  appsState.view = v;
  appsState.selectedId = null;
  if(v!=='launcher') appsState.q = '';
  renderApps();
}

// Manage view = full catalog + install/disable/state, reached via the launcher
// gear. This is the former primary Apps grid; complex states live here, not on
// the compact launcher.
function appsListHtml(){
  var h = '<div class="apps-screen">';
  h += '<button class="apps-back" type="button" onclick="appsSetView(\'launcher\')">← Plugins</button>';
  h += '<div class="apps-head"><div class="apps-head-title">Plugin settings · Каталог</div>'
     + '<div class="apps-head-sub">Установка, включение и состояние плагинов. Первичный экран Apps — компактный лаунчер; полный каталог и сложные '
     + 'состояния живут здесь. Официальные приложения Skipi, не маркетплейс и без стороннего кода. '
     + '(Crew pairing lives in the <b>Crew</b> module.)</div></div>';
  // Plugins section — bundled first-party plugins with real Install/Open/Disable
  // state. Dev-only self-test fixtures are hidden unless developer mode is on.
  var pluginIds = catalogPluginIds();
  if(pluginIds.length){
    h += '<div class="apps-cat-title">Plugins'+(isDevMode()?' <span class="apps-badge disabled">dev</span>':'')+'</div><div class="apps-grid">';
    for(var pi=0;pi<pluginIds.length;pi++){ h += pluginTileHtml(pluginIds[pi]); }
    h += '</div>';

  for(var c=0;c<SKIPI_APP_CATEGORIES.length;c++){

    if(!apps.length) continue;
    h += '<div class="apps-cat-title">'+esc(cat.label)+'</div><div class="apps-grid">';
    for(var i=0;i<apps.length;i++){ h += appsTileHtml(apps[i]); }

function appsHostsHtml(app){
  if(!app.hosts || !app.hosts.length) return '';
  var h = '<div class="apps-hosts">';
  for(var i=0;i<app.hosts.length;i++){
    var key = app.hosts[i];
    var self = (key==='onboard');
    h += '<span class="apps-host-chip'+(self?' self':'')+'">'+esc(HOST_LABELS[key]||key)+'</span>';
  }
  h += '</div>';
  return h;

function appsDetailHtml(app){
  if(!app) return appsListHtml();
  var soon = app.status==='coming_soon';
  var h = '<div class="apps-screen apps-detail">';
  h += '<button class="apps-back" type="button" onclick="appsBack()">← Apps</button>';
  h += '<div class="apps-detail-head"><span class="apps-tile-icon big">'+(app.icon||'▢')+'</span>'
     + '<div><div class="apps-detail-name">'+esc(app.name)+'</div>'
     + '<div class="apps-detail-cat">'+esc(appsCatLabel(app.category))+(soon?' · Coming soon':'')+'</div></div></div>';

// ===================== Module shell (Crew / Apps / Vessel Documents) =====================
// Three base modules. Crew = people + QR pairing; Apps = onboard tools;
// Vessel Documents = the ship's own local document vault (v0). All local-only.
var currentModule = 'crew'; // 'crew' | 'myvessel' | 'apps' | 'vdocs'
function setActiveTab(mod){
  var tabs = document.querySelectorAll('.mod-tab');
  for(var i=0;i<tabs.length;i++){ tabs[i].classList.toggle('active', tabs[i].getAttribute('data-mod')===mod); }
  var g = document.getElementById('mb-gear'); if(g) g.classList.remove('active');
}
function updateVesselChip(){
  var el = document.getElementById('mb-vessel-name');
  if(!el) return;
  var c = {};
  try { c = crewConfig(); } catch(e){}
  el.textContent = c.vessel_name || c.vessel_imo || 'Vessel';
}
function setContent(html){
  var content = document.getElementById('scr-content');
  if(content) content.innerHTML = html;
  var m = document.querySelector('main'); if(m) m.scrollTop = 0;
}
function showModule(mod){
  var ov=document.getElementById('settings-overlay'); if(ov) ov.classList.remove('open');
  document.body.classList.remove('launching');
  stopPairingTimer();
  if(typeof stopCrewInviteTimer==='function') stopCrewInviteTimer();
  unmountActivePlugin();
  currentModule = mod;
  setActiveTab(mod);
  updateVesselChip();
  if(mod==='apps'){ renderApps(); }
  else if(mod==='vdocs'){ renderVesselDocs(); }
  else if(mod==='myvessel'){ loadMyVessel(); }
  else { renderCrew(); }
}

// ---------- Apps module ----------
function renderApps(){
  if(appsState.selectedId){
    if(isBundledPlugin(appsState.selectedId)) setContent(pluginDetailHtml(appsState.selectedId));
    else setContent(appsDetailHtml(appsById(appsState.selectedId)));
    return;
  }
  if(appsState.view==='manage'){ setContent(appsListHtml()); return; }
  setContent(appsLauncherHtml());
}
function appsSelect(id){ appsState.selectedId = id; renderApps(); }
function appsBack(){ appsState.selectedId = null; renderApps(); }

// ---------- Crew module ----------
function crewStat(k, v, s){
  return '<div class="crew-stat"><div class="crew-stat-k">'+esc(k)+'</div>'
       + '<div class="crew-stat-v">'+esc(v)+'</div><div class="crew-stat-s">'+esc(s)+'</div></div>';
}
function crewSettingsOpen(){
  var ov=document.getElementById('settings-overlay');
  return !!(ov && ov.classList && ov.classList.contains('open'));
}
function crewAfterRosterRender(){
  if(crewSettingsOpen()) renderSettings();
  else if(currentModule==='crew') renderCrew();
}
function crewRosterRows(){
  return Array.isArray(crewState.roster) ? crewState.roster : [];
}
function crewActiveRows(){
  return crewRosterRows().filter(function(r){ return ['left','revoked'].indexOf(String(r.status||''))<0; });
}
function crewRecentRows(){
  var weekAgo=Date.now()-7*24*60*60*1000;
  return crewActiveRows().filter(function(r){
    var ts=Date.parse(r.linked_at||r.created_at||r.updated_at||'');

}
function renderCrew(){
  if(crewLive() && !crewState.roster && !crewState.rosterLoading && !crewState.rosterErr){
    setTimeout(function(){ if(currentModule==='crew') crewLoadRoster(); },0);

  var rows=crewActiveRows();

  var pending=(crewState.invite && crewState.invite.expires_at && Date.parse(crewState.invite.expires_at)>Date.now()) ? 1 : 0;

  h += '<div class="apps-head"><div class="apps-head-row"><div>'

     + '<div class="apps-head-sub">The people linked to this vessel. Crew accept a vessel invite from '
     + '<b>Skipi Seafarer</b> — On&nbsp;Board never receives a seafarer’s whole personal vault, only the onboard workflow they explicitly share.</div>'
     + '</div><button class="pair-cta" type="button" onclick="openPairing()">🔗 Invite crew member</button></div></div>';
  h += '<div class="crew-stats">'
     + crewStat('Total crew', crewLive()?String(rows.length):'0', crewLive()?'active linked seafarers':'backend not connected')
     + crewStat('Linked crew', crewLive()?String(linked.length):'0', 'accepted vessel invites')
     + crewStat('Pending invites', crewLive()?String(pending):'0', 'awaiting scan')
     + crewStat('Recent onboarding', crewLive()?String(crewRecentRows().length):'—', 'last 7 days')
     + '</div>';
  h += '<div class="crew-section-t">Linked crew</div>';
  if(crewLive() && crewState.rosterLoading){
    h += '<div class="set-card set-hint">Loading crew roster…</div>';
  }else if(crewLive() && crewState.rosterErr){
    h += '<div class="set-card"><div class="set-pill warn">Could not load crew roster</div><div class="set-hint" style="margin-top:8px">'+esc(crewState.rosterErr)+'</div>'
      + '<button class="btn btn-outline btn-sm" type="button" style="margin-top:10px" onclick="crewLoadRoster()">Обновить · Refresh</button></div>';
  }else if(crewLive() && rows.length){
    rows.forEach(function(r){ h += crewRosterCardHtml(r, true); });
    h += '<button class="btn btn-outline btn-sm" type="button" style="margin-top:10px" onclick="crewLoadRoster()">Обновить · Refresh</button>';
  }else{
    h += '<div class="crew-empty"><div class="crew-empty-icon">👥</div>'
       + '<div class="crew-empty-t">No linked crew yet</div>'
       + '<div class="crew-empty-s">Invite the first crew member: show the vessel QR/code and have them accept it in Skipi Seafarer. '
       + 'Linked crew and their onboarding status will appear here.</div>'
       + '<button class="pair-cta" type="button" onclick="openPairing()">🔗 Invite crew member</button></div>';
  }
  h += '<div class="apps-note" style="margin-top:18px;"><b>Privacy</b> — On&nbsp;Board does not receive a seafarer’s whole personal vault. '
     + 'Crew linking opens only a scoped, consented channel; documents, CV and personal data stay on the seafarer’s device unless they explicitly share a specific onboard item.</div>';
  h += '</div>';
  setContent(h);
}

// ---------- Vessel Documents module (v0 — vessel-owned local vault) ----------
// =========================================================================
// VDOCS NO-NETWORK BOUNDARY START
// Everything between these markers is statically checked by
// tests/apps_launcher_harness.mjs: the Vessel Documents surface is a
// vessel-owned, local/offline vault (Docs Module Standard v1, On Board
// adapter). Nothing here may talk to a server or reuse the crew/vessel
// HTTP helpers. Records live in localStorage under `skipi-onboard-vdocs`;
// v0 stores document METADATA (incl. the file record) — file bytes are not
// copied yet (durable copy-into-vault storage is a separate src-tauri slice).
// "Stored in this vessel vault — nothing leaves the vessel."
// =========================================================================
var VDOC_CATEGORIES = [
  { slug:'certificates',      icon:'📜', name:'Certificates',        sub:'Class, flag, statutory and trading certificates with validity tracking.' },
  { slug:'manuals',           icon:'📘', name:'Manuals',             sub:'Equipment, machinery and operational manuals for the vessel.' },
  { slug:'safety-management', icon:'🛡️', name:'Safety Management',   sub:'SMS manual, procedures, drills and ISM documentation.' },
  { slug:'checklists-forms',  icon:'🗒️', name:'Checklists / Forms',  sub:'Onboard checklists, permits to work and record forms.' },
  { slug:'cargo-voyage',      icon:'🚢', name:'Cargo / Voyage docs', sub:'Cargo papers, stowage, voyage instructions and port documents.' }
];
var VDOC_FILTERS = [
  ['all','All'], ['required','Required'], ['missing','Missing'],
  ['expiring','Expiring'], ['uploaded','Uploaded'], ['custom','Custom']
];
// Docs Standard v1 §2.3 taxonomy: display status = presence-derived (missing)
// or validity (permanent | no_expiry | valid | expiring_warning |
// expiring_critical | expired). Thresholds 30/90 days; 180/365 only for sort.
var VDOC_STATUS_META = {
  missing:           { label:'Missing',       cls:'st-red'    },
  expired:           { label:'Expired',       cls:'st-red'    },
  expiring_critical: { label:'Expiring soon', cls:'st-orange' },
  expiring_warning:  { label:'Attention',     cls:'st-yellow' },
  valid:             { label:'Valid',         cls:'st-green'  },
  permanent:         { label:'Permanent',     cls:'st-green'  },
  no_expiry:         { label:'No expiry',     cls:'st-muted'  },
  no_file:           { label:'No file',       cls:'st-muted'  }
};
var VDOCS_STORE_KEY = 'skipi-onboard-vdocs';
var vdocsState = { selectedId:null, filter:'all', q:'', collapsed:{}, err:null, addOpen:false };

function vdocsCatBySlug(slug){ for(var i=0;i<VDOC_CATEGORIES.length;i++){ if(VDOC_CATEGORIES[i].slug===slug) return VDOC_CATEGORIES[i]; } return null; }
function vdocsIsDemo(){ try { return crewConfig().vessel_mode==='demo'; } catch(e){ return false; } }

// Fail-closed vault read: throws on corrupt/unreadable data so callers surface
// an honest docs-error state instead of silently rendering an empty vault.
function vdocsRead(){
  var raw = localStorage.getItem(VDOCS_STORE_KEY);
  if(!raw) return { docs: [] };
  var p = JSON.parse(raw);
  if(!p || !Array.isArray(p.docs)) throw new Error('vault record shape invalid');
  return p;
}
function vdocsWrite(v){ localStorage.setItem(VDOCS_STORE_KEY, JSON.stringify(v)); }
// Visible docs for the current mode. Docs created in demo mode carry
// fixture:true and are hidden on a real vessel — demo data never leaks.
function vdocsDocs(){
  var demo = vdocsIsDemo();
  return vdocsRead().docs.filter(function(d){ return demo ? true : !d.fixture; });
}
function vdocsFind(docs, id){ for(var i=0;i<docs.length;i++){ if(docs[i].id===id) return docs[i]; } return null; }
function vdocsById(id){ try { return vdocsFind(vdocsDocs(), id); } catch(e){ return null; } }
// Guarded mutation: never writes over a vault that cannot be read (fail-closed).
function vdocsMutate(fn){
  var v;
  try { v = vdocsRead(); }
  catch(e){ vdocsState.err = ''+((e&&e.message)||e); renderVesselDocs(); showToast('Vault data unreadable — edits are blocked'); return false; }
  fn(v);
  try { vdocsWrite(v); } catch(e){ showToast('Could not save to the vessel vault'); return false; }
  return true;
}

// Demo vessel: seed example documents once (empty vault only). They are
// ordinary editable records flagged fixture:true, scoped to demo mode.
function vdocsMaybeSeedDemo(){
  if(!vdocsIsDemo()) return;
  var v = vdocsRead();
  if(v.docs.length) return;
  var day = 24*60*60*1000, now = Date.now();
  function iso(off){ return new Date(now + off*day).toISOString().slice(0,10); }
  function fx(cat, title, kind, fileName, validTo, perm, reg){
    return { id:'doc_'+randHex(6), title:title, category:cat, kind:kind, template_id:null,
      regulatory_basis:reg||'', doc_number:'', issued_by:'', notes:'',
      file: fileName ? { file_name:fileName, file_size:0, content_type:'application/pdf' } : null,
      has_expiry: !!validTo, is_permanent: !!perm, valid_from:'', valid_to: validTo||'',
      provenance:{ source:'owner' }, fixture:true,
      created_at:new Date(now).toISOString(), updated_at:new Date(now).toISOString() };
  }
  v.docs = [
    fx('certificates','Safety Management Certificate (SMC)','required','smc.pdf', iso(200), false, 'ISM Code'),
    fx('certificates','IOPP Certificate','required','iopp.pdf', iso(45), false, 'MARPOL Annex I'),
    fx('certificates','Cargo Ship Safety Equipment Certificate','required','safety-equipment.pdf', iso(12), false, 'SOLAS'),
    fx('certificates','Minimum Safe Manning Document','required', null, '', false, 'SOLAS V/14'),
    fx('safety-management','SMS Manual — shipboard copy','required','sms-manual.pdf', '', true, 'ISM Code'),
    fx('manuals','Main Engine Operation Manual','custom','me-manual.pdf', '', false, ''),
    fx('cargo-voyage','P&I Certificate of Entry','optional','pni.pdf', iso(-10), false, '')
  ];
  vdocsWrite(v);
}

// ---- classification (Docs Standard v1 §2.3) ----
function vdocDaysLeft(d){
  if(!d.valid_to) return null;
  var today = new Date(); today.setHours(0,0,0,0);
  var vt = new Date(String(d.valid_to)+'T00:00:00');
  if(isNaN(vt.getTime())) return null;
  return Math.floor((vt.getTime()-today.getTime())/86400000);
}
function vdocValidity(d){
  if(d.is_permanent) return 'permanent';
  var days = vdocDaysLeft(d);
  if(days==null) return 'no_expiry';
  if(days<0) return 'expired';
  if(days<30) return 'expiring_critical';
  if(days<90) return 'expiring_warning';
  return 'valid';
}
function vdocStatus(d){
  if(!d.file) return d.kind==='required' ? 'missing' : 'no_file';
  return vdocValidity(d);
}
function vdocUrgency(d){
  var st = vdocStatus(d);
  if(st==='expired') return 7;
  if(st==='missing') return 6;
  if(st==='expiring_critical') return 5;
  if(st==='expiring_warning') return 4;
  if(st==='valid'){ var days=vdocDaysLeft(d); if(days!=null && days<180) return 3; if(days!=null && days<365) return 2; return 1; }
  if(st==='permanent') return 1;
  return 0;
}
function vdocKindRank(d){ return d.kind==='required' ? 0 : (d.kind==='optional' ? 1 : 2); }
function vdocSortCmp(a,b){
  var ka=vdocKindRank(a), kb=vdocKindRank(b);
  if(ka!==kb) return ka-kb;
  var ua=vdocUrgency(a), ub=vdocUrgency(b);
  if(ua!==ub) return ub-ua;
  return String(a.title||'').localeCompare(String(b.title||''));
}
function vdocMatchesFilter(d, f){
  var st = vdocStatus(d);
  if(f==='required') return d.kind==='required';
  if(f==='missing')  return st==='missing';
  if(f==='expiring') return !!d.file && (st==='expired' || st==='expiring_critical' || st==='expiring_warning');
  if(f==='uploaded') return !!d.file;
  if(f==='custom')   return d.kind==='custom';
  return true;
}
function vdocMatchesQuery(d, q){
  if(!q) return true;
  var cat = vdocsCatBySlug(d.category);
  var hay = (String(d.title||'')+' '+String(cat?cat.name:'')+' '+String(d.doc_number||'')+' '
    +String(d.issued_by||'')+' '+String((d.file&&d.file.file_name)||'')).toLowerCase();
  return hay.indexOf(q)>=0;
}
function vdocsFilterCounts(docs, q){
  var scope = docs.filter(function(d){ return vdocMatchesQuery(d, q); });
  var out = {};
  for(var i=0;i<VDOC_FILTERS.length;i++){
    var f = VDOC_FILTERS[i][0];
    out[f] = scope.filter(function(d){ return vdocMatchesFilter(d, f); }).length;
  }
  return out;
}

// ---- rendering ----
function vdocsFmtSize(n){
  n = Number(n)||0;
  if(n<=0) return 'size n/a';
  if(n<1024) return n+' B';
  if(n<1048576) return (n/1024).toFixed(1)+' KB';
  return (n/1048576).toFixed(1)+' MB';
}
function vdocsBadgeHtml(d){
  var st = vdocStatus(d), m = VDOC_STATUS_META[st]||VDOC_STATUS_META.no_file;
  return '<span class="docs-badge '+m.cls+'" data-qa="docs-status-badge">'+m.label+'</span>';
}
function vdocsKindBadgeHtml(kind){
  var lbl = kind==='required' ? 'REQ' : (kind==='optional' ? 'OPT' : 'CUSTOM');
  return '<span class="docs-kind'+(kind==='required'?' req':'')+'">'+lbl+'</span>';
}
function vdocsDaysText(d){
  if(!d.file || d.is_permanent) return '';
  var days = vdocDaysLeft(d);
  if(days==null) return '';
  if(days<0) return 'Expired '+(-days)+' d ago';
  return 'Expires in '+days+' d';
}
function vdocsRowHtml(d){
  var st = vdocStatus(d), m = VDOC_STATUS_META[st]||VDOC_STATUS_META.no_file;
  return '<button class="docs-row'+(vdocsState.selectedId===d.id?' sel':'')+'" type="button" data-qa="docs-item-'+esc(d.id)+'" onclick="vdocsSelect(\''+esc(d.id)+'\')">'
    + '<span class="docs-dot '+m.cls+'"></span>'
    + '<span class="docs-row-title">'+esc(d.title||'Untitled')+'</span>'
    + vdocsKindBadgeHtml(d.kind)
    + '</button>';

function vdocsLeftBodyHtml(docs){
  var q = String(vdocsState.q||'').trim().toLowerCase();
  var counts = vdocsFilterCounts(docs, q);
  var scope = docs.filter(function(d){ return vdocMatchesQuery(d, q); });
  var list = scope.filter(function(d){ return vdocMatchesFilter(d, vdocsState.filter); });
  var h = '<div class="docs-chips">';
  for(var i=0;i<VDOC_FILTERS.length;i++){
    var f = VDOC_FILTERS[i];
    h += '<button class="docs-chip'+(vdocsState.filter===f[0]?' active':'')+'" type="button" data-qa="docs-filter-'+f[0]+'" '
      + 'onclick="vdocsSetFilter(\''+f[0]+'\')">'+f[1]+' <span class="n">'+counts[f[0]]+'</span></button>';
  }
  h += '</div>';
  if(!list.length){
    h += '<div class="crew-empty" data-qa="docs-empty" style="padding:20px 14px;margin-bottom:10px"><div class="crew-empty-icon">🔍</div>'
      + '<div class="crew-empty-t">No documents match</div>'
      + '<div class="crew-empty-s">'+(q ? 'No documents match this search in the vessel vault.' : 'No documents match this filter. Change the filter or add a document.')+'</div></div>';
  }
  h += '<div class="docs-tree" data-qa="docs-tree">';
  for(var c=0;c<VDOC_CATEGORIES.length;c++){
    var cat = VDOC_CATEGORIES[c];
    var rows = list.filter(function(d){ return d.category===cat.slug; }).sort(vdocSortCmp);
    var worst=null, wu=-1;
    for(var r=0;r<rows.length;r++){ var u=vdocUrgency(rows[r]); if(u>wu){ wu=u; worst=rows[r]; } }
    var worstCls = worst ? (VDOC_STATUS_META[vdocStatus(worst)]||{}).cls : '';
    var collapsed = !!vdocsState.collapsed[cat.slug];
    h += '<div class="docs-cat" data-qa="docs-category-'+cat.slug+'">';
    h += '<button class="docs-cat-head" type="button" title="'+esc(cat.sub)+'" onclick="vdocsToggleCat(\''+cat.slug+'\')">'
      + '<span class="docs-cat-ico">'+cat.icon+'</span><span class="docs-cat-name">'+esc(cat.name)+'</span>'
      + (rows.length && worstCls ? '<span class="docs-dot '+worstCls+'"></span>' : '')
      + '<span class="docs-cat-n">'+rows.length+'</span><span class="docs-caret">'+(collapsed?'▸':'▾')+'</span></button>';
    if(!collapsed && rows.length){
      h += '<div class="docs-rows">';
      for(var j=0;j<rows.length;j++){ h += vdocsRowHtml(rows[j]); }
      h += '</div>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function renderVesselDocs(){
  vdocsState.err = null;
  var docs = [];
  try { vdocsMaybeSeedDemo(); docs = vdocsDocs(); }
  catch(e){ vdocsState.err = ''+((e&&e.message)||e); }
  var offline = (typeof navigator!=='undefined' && navigator.onLine===false);
  var h = '<div class="docs-screen">';
  h += '<div class="apps-head"><div class="apps-head-title">Vessel Documents</div>'
    + '<div class="apps-head-sub">The ship’s own document vault — certificates, manuals, SMS and voyage papers, '
    + 'stored in this vessel vault on this computer. Nothing leaves the vessel.</div>';
  var pills = '';
  if(vdocsIsDemo()) pills += '<span class="set-pill">Demo data · example documents</span>';
  if(offline) pills += '<span class="docs-offline" data-qa="docs-offline">📡 Offline — the vessel vault works fully offline</span>';
  if(pills) h += '<div class="docs-pills">'+pills+'</div>';
  h += '</div>';
  if(vdocsState.err){
    h += '<div class="set-card" data-qa="docs-error" style="margin-top:16px"><div class="set-pill warn">Vault data could not be read</div>'
      + '<div class="set-hint" style="margin-top:8px">The vessel vault record (<code>skipi-onboard-vdocs</code>) is unreadable: '+esc(vdocsState.err)+'. '
      + 'Fail-closed: nothing is guessed and edits are blocked so the stored record is not overwritten. The raw record stays untouched for recovery.</div>'
      + '<button class="btn btn-outline btn-sm" type="button" style="margin-top:10px" onclick="renderVesselDocs()">Retry</button></div>';
    h += '</div>';
    setContent(h);
    return;
  }
  if(!docs.length){
    h += '<div class="crew-empty" data-qa="docs-empty" style="margin-top:16px"><div class="crew-empty-icon">📜</div>'
      + '<div class="crew-empty-t">No vessel documents yet</div>'
      + '<div class="crew-empty-s">Start the vessel vault: add the ship’s certificates, manuals, SMS papers and voyage documents. '
      + 'Records are stored in this vessel vault — nothing leaves the vessel, and the vault works fully offline.</div>'
      + '<button class="pair-cta" type="button" data-qa="docs-add" onclick="vdocsOpenAdd()">＋ Add document</button></div>';
  } else {
    h += '<div class="docs-wrap">';
    h += '<div class="docs-left"><div class="docs-left-head">'
      + '<div class="docs-search" data-qa="docs-search"><span class="apps-search-ico">🔍</span>'
      + '<input id="docs-search-input" type="text" autocomplete="off" spellcheck="false" placeholder="Search documents…" '
      + 'value="'+esc(vdocsState.q||'')+'" oninput="vdocsSearch(this.value)"></div>'
      + '<button class="docs-add-btn" type="button" data-qa="docs-add" onclick="vdocsOpenAdd()">＋ Add</button></div>'
      + '<div id="docs-left-body">'+vdocsLeftBodyHtml(docs)+'</div></div>';
    var sel = vdocsState.selectedId ? vdocsFind(docs, vdocsState.selectedId) : null;
    h += '<div class="docs-right" id="docs-right">'+(sel ? vdocsDetailHtml(sel) : vdocsDashboardHtml(docs))+'</div>';
    h += '</div>';
  }
  if(vdocsState.addOpen) h += vdocsAddOverlayHtml();
  h += '</div>';
  setContent(h);
}

// ---- interactions ----
function vdocsSelect(id){ vdocsState.selectedId = id; renderVesselDocs(); }
function vdocsSetFilter(f){ vdocsState.filter = f; renderVesselDocs(); }
function vdocsSearch(v){
  vdocsState.q = v||'';
  var el = document.getElementById('docs-left-body');
  if(!el) return;
  try { el.innerHTML = vdocsLeftBodyHtml(vdocsDocs()); } catch(e){ renderVesselDocs(); }
}
function vdocsToggleCat(slug){
  vdocsState.collapsed[slug] = !vdocsState.collapsed[slug];
  var el = document.getElementById('docs-left-body');
  if(el){ try { el.innerHTML = vdocsLeftBodyHtml(vdocsDocs()); } catch(e){} }
}
function vdocsOpenAdd(){
  vdocsState.addOpen = true;
  renderVesselDocs();
  setTimeout(function(){ var el=document.getElementById('docs-add-title'); if(el) el.focus(); }, 0);
}
function vdocsCloseAdd(){ vdocsState.addOpen = false; renderVesselDocs(); }
function vdocsCreate(){
  var g = function(id){ var el=document.getElementById(id); return el ? String(el.value||'').trim() : ''; };
  var title = g('docs-add-title');
  if(!title){ showToast('Enter a document title'); return; }
  var cat = g('docs-add-cat')||'certificates', kind = g('docs-add-kind')||'custom';
  if(!vdocsCatBySlug(cat)) cat = 'certificates';
  if(['required','optional','custom'].indexOf(kind)<0) kind = 'custom';
  var now = new Date().toISOString();
  var d = { id:'doc_'+randHex(6), title:title, category:cat, kind:kind, template_id:null,
    regulatory_basis:'', doc_number:'', issued_by:'', notes:'',
    file:null, has_expiry:false, is_permanent:false, valid_from:'', valid_to:'',
    provenance:{ source:'owner' }, fixture: vdocsIsDemo(),
    created_at:now, updated_at:now };
  if(!vdocsMutate(function(v){ v.docs.push(d); })) return;
  vdocsState.addOpen = false;
  vdocsState.selectedId = d.id;
  renderVesselDocs();
  showToast('Document added to the vessel vault');
}
function vdocsField(id, field, value){
  var ALLOWED = ['title','category','kind','doc_number','issued_by','valid_from','valid_to','notes','regulatory_basis','is_permanent'];
  if(ALLOWED.indexOf(field)<0) return;
  if(!vdocsMutate(function(v){
    var d = vdocsFind(v.docs, id); if(!d) return;
    if(field==='is_permanent') d.is_permanent = !!value;
    else d[field] = String(value==null?'':value);
    d.has_expiry = !!d.valid_to && !d.is_permanent;
    d.updated_at = new Date().toISOString();
  })) return;
  var structural = (field==='category'||field==='kind'||field==='valid_to'||field==='valid_from'||field==='is_permanent'||field==='title'||field==='regulatory_basis');
  if(structural){ renderVesselDocs(); }
  else {
    var lb = document.getElementById('docs-left-body');
    if(lb){ try { lb.innerHTML = vdocsLeftBodyHtml(vdocsDocs()); } catch(e){} }
    var bw = document.getElementById('docs-badge-wrap'), d2 = vdocsById(id);
    if(bw && d2) bw.innerHTML = vdocsBadgeHtml(d2);
  }
  vdocsAutosaveFlash();
}
function vdocsAutosaveFlash(){
  var el = document.getElementById('docs-autosave'); if(!el) return;
  el.textContent = 'Saving…';
  clearTimeout(vdocsAutosaveFlash._t1); clearTimeout(vdocsAutosaveFlash._t2);
  vdocsAutosaveFlash._t1 = setTimeout(function(){ var e2=document.getElementById('docs-autosave'); if(e2) e2.textContent='Saved ✓'; }, 350);
  vdocsAutosaveFlash._t2 = setTimeout(function(){ var e2=document.getElementById('docs-autosave'); if(e2) e2.textContent='Changes save automatically'; }, 2600);
}
function vdocsAcceptFile(f){ return /\.(pdf|jpe?g|png|docx?)$/i.test(String((f && f.name)||'')); }
function vdocsAttach(replace){
  var inp = document.getElementById('docs-file-input');
  if(inp){ inp.value=''; inp.click(); }
}
function vdocsFileChosen(files){
  if(!files || !files.length || !vdocsState.selectedId) return;
  var f = files[0];
  if(!vdocsAcceptFile(f)){ showToast('Supported: PDF, JPG, PNG, DOC, DOCX'); return; }
  vdocsApplyFileMeta(vdocsState.selectedId, { file_name:f.name, file_size:f.size||0, content_type:f.type||'' });
}
function vdocsApplyFileMeta(id, meta){
  if(!meta || !meta.file_name) return;
  if(!vdocsMutate(function(v){
    var d = vdocsFind(v.docs, id); if(!d) return;
    d.file = { file_name:String(meta.file_name), file_size:Number(meta.file_size)||0, content_type:String(meta.content_type||'') };
    d.attached_at = new Date().toISOString();
    d.updated_at = d.attached_at;
  })) return;
  renderVesselDocs();
  vdocsAutosaveFlash();
  showToast('File record saved to the vessel vault');
}
function vdocsDragOver(ev){ ev.preventDefault(); if(ev.currentTarget && ev.currentTarget.classList) ev.currentTarget.classList.add('over'); }
function vdocsDragLeave(ev){ if(ev.currentTarget && ev.currentTarget.classList) ev.currentTarget.classList.remove('over'); }
function vdocsDrop(ev){
  ev.preventDefault(); ev.stopPropagation();
  if(ev.currentTarget && ev.currentTarget.classList) ev.currentTarget.classList.remove('over');
  var fs = ev.dataTransfer && ev.dataTransfer.files;
  vdocsFileChosen(fs);
}
function vdocsDelete(id){
  var d = vdocsById(id); if(!d) return;
  // Standard §2.3 guard: an active required document cannot be deleted.
  if(d.kind==='required'){ showToast('Required document cannot be deleted — change its kind first'); return; }
  if(!window.confirm('Delete "'+(d.title||'document')+'" from the vessel vault?')) return;
  if(!vdocsMutate(function(v){ v.docs = v.docs.filter(function(x){ return x.id!==id; }); })) return;
  if(vdocsState.selectedId===id) vdocsState.selectedId = null;
  renderVesselDocs();
  showToast('Document deleted');
}
// Vault-owned docs work fully offline; the offline pill is informational only.
function vdocsOnlineFlip(){ if(currentModule==='vdocs') renderVesselDocs(); }
if(typeof window!=='undefined' && window.addEventListener){
  window.addEventListener('online', vdocsOnlineFlip);
  window.addEventListener('offline', vdocsOnlineFlip);
}

// A Settings surface for LINKING SEAFARERS to this vessel — distinct from device
// pairing. This is a local UI shell: there is NO crew backend yet, so nothing is

var settingsState = { inviteShown:false, returnTo:'crew', tab:'vessel' };
// Whether a crew backend is wired. Hard-false in this UI shell — On Board makes
// no crew API calls. Flip only when the crew API actually exists.

// On Board makes NO calls yet — this is the contract to wire when CREW_API_CONNECTED.
// Refs: handoff "2026-06-26 — On Board Crew Onboarding v1" + "2026-06-25 — Backend
// design — On Board Crew Linking v1". Crew invite namespace: skipi-crew:1:onboard:<code>.
var ONBOARD_CREW_API = {
  invite: 'POST /api/onboard/crew/invite',       // create short-lived invite -> { code, expires_at }
  accept: 'POST /api/onboard/crew/accept',       // seafarer accepts (signed identity) — Seafarer side

};

// =========================================================================
// Live crew wiring — DORMANT by default. The committed master flag
// CREW_API_CONNECTED stays false; a dev-only runtime override lets us exercise
// the live path against a deployed backend WITHOUT flipping that constant, and
// only when API base + ONBOARD_TOKEN + vessel_imo are all configured. If any
// config is missing or the backend is unreachable the UI stays an honest shell
// (no fake crew rows, no fake codes). Endpoints: /api/onboard/crew/*.
// =========================================================================
var crewState = { invite:null, inviteErr:null, inviteLoading:false, timer:null, roster:null, rosterErr:null, rosterLoading:false };

function crewConfig(){ try { return JSON.parse(localStorage.getItem('skipi-onboard-crew-config')||'{}'); } catch(e){ return {}; } }
function saveCrewConfig(c){ try { localStorage.setItem('skipi-onboard-crew-config', JSON.stringify(c)); } catch(e){} }
function crewConfigMissing(){ var c=crewConfig(); var m=[]; if(!c.api_base)m.push('API base'); if(!c.onboard_token)m.push('ONBOARD_TOKEN'); if(!c.vessel_imo)m.push('vessel_imo'); return m; }
function crewConfigReady(){ return crewConfigMissing().length===0; }
function crewLiveOverride(){ try { return localStorage.getItem('skipi-onboard-crew-live')==='1'; } catch(e){ return false; } }
// Backend considered ON only via the committed master flag, or — for testing —
// a dev-mode runtime override. Never on by default for normal users.
function crewBackendOn(){ return CREW_API_CONNECTED || (isDevMode() && crewLiveOverride()); }
function crewLive(){ return crewBackendOn() && crewConfigReady(); }

function crewApiUrl(path){ return String(crewConfig().api_base||'').replace(/\/+$/,'') + path; }
function crewFetch(method, path, body){
  var c = crewConfig();
  var opt = { method:method, headers:{ 'Authorization':'Bearer '+(c.onboard_token||''), 'Content-Type':'application/json' } };
  if(body!=null) opt.body = JSON.stringify(body);
  return fetch(crewApiUrl(path), opt).then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error('HTTP '+r.status+(t?(' '+t.slice(0,120)):'')); });
    return r.status===204 ? null : r.json();
  });
}
function copyText(txt){
  if(!txt) return;
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(function(){ showToast('Скопировано'); }, function(){ fallbackCopy(txt); }); }
  else fallbackCopy(txt);
}

function saveCrewConfigFromForm(){
  var g=function(id){ var el=document.getElementById(id); return el? String(el.value||'').trim() : ''; };
  var prev=crewConfig();
  saveCrewConfig({ api_base:g('crew-cfg-base'), onboard_token:g('crew-cfg-token'), vessel_imo:g('crew-cfg-imo'), vessel_name:prev.vessel_name, vessel_mode:prev.vessel_mode, pending_vessel_code:prev.pending_vessel_code });
  updateVesselChip();
  showToast(crewConfigReady()?'Config saved':'Config saved (incomplete)');
  if(crewLive()) crewLoadRoster(); else renderSettings();
}
function toggleCrewLiveOverride(){ // dev only
  try { localStorage.setItem('skipi-onboard-crew-live', crewLiveOverride()?'0':'1'); } catch(e){}
  showToast('Crew live override '+(crewLiveOverride()?'on':'off')+' (dev)');
  crewState.invite=null; crewState.inviteErr=null; stopCrewInviteTimer();
  if(crewLive()) crewLoadRoster(); else renderSettings();
}

// --- live invite ---
function crewRequestInvite(){
  if(!crewLive()) return;
  crewState.inviteLoading=true; crewState.inviteErr=null; renderSettings();
  crewFetch('POST', '/api/onboard/crew/invite', { vessel_imo: crewConfig().vessel_imo })
    .then(function(res){ crewState.invite=res||{}; crewState.inviteLoading=false; renderSettings(); startCrewInviteTimer(); })
    .catch(function(e){ crewState.invite=null; crewState.inviteErr=''+e; crewState.inviteLoading=false; stopCrewInviteTimer(); renderSettings(); });
}
function crewInvitePayload(){ var inv=crewState.invite; if(!inv) return ''; return inv.qr_payload || ('skipi-crew:1:onboard:'+(inv.code||'')); }
function crewInviteManualCode(){ var inv=crewState.invite; if(!inv) return ''; return inv.code || crewInvitePayload(); }
function startCrewInviteTimer(){ stopCrewInviteTimer(); updateCrewCountdown(); crewState.timer=setInterval(updateCrewCountdown,1000); }
function stopCrewInviteTimer(){ if(crewState.timer){ clearInterval(crewState.timer); crewState.timer=null; } }
function updateCrewCountdown(){
  var el=document.getElementById('crew-countdown'); var inv=crewState.invite;
  if(!el || !inv || !inv.expires_at){ stopCrewInviteTimer(); return; }
  var ms=new Date(inv.expires_at).getTime()-Date.now();
  if(ms<=0){ el.innerHTML='<span class="pair-expired">Код истёк — обновите</span>'; stopCrewInviteTimer(); return; }
  var t=Math.floor(ms/1000), m=Math.floor(t/60), s=t%60; el.textContent='Истекает через '+m+':'+('0'+s).slice(-2);
}
function copyCrewCode(){ var inv=crewState.invite; if(inv) copyText(crewInviteManualCode()); }

// --- live roster ---
function crewLoadRoster(){
  if(!crewLive()){ crewState.roster=null; crewAfterRosterRender(); return; }
  crewState.rosterLoading=true; crewState.rosterErr=null; crewAfterRosterRender();
  crewFetch('GET', '/api/onboard/crew?vessel_imo='+encodeURIComponent(crewConfig().vessel_imo), null)
    .then(function(res){ crewState.roster = (res && res.items) ? res.items : (Array.isArray(res)?res:[]); crewState.rosterLoading=false; crewAfterRosterRender(); })
    .catch(function(e){ crewState.roster=null; crewState.rosterErr=''+e; crewState.rosterLoading=false; crewAfterRosterRender(); });
}
function crewRevoke(id){
  if(!crewLive() || !id) return;
  if(!window.confirm('Отвязать моряка от судна? Это отзывает доступ.')) return;
  crewFetch('DELETE', '/api/onboard/crew/'+encodeURIComponent(id), null)
    .then(function(){ showToast('Отвязан'); crewLoadRoster(); })
    .catch(function(e){ showToast('Ошибка: '+e); });
}

// =========================================================================
// My Vessel — read the Skipi vessel-database record for the selected vessel.
//
// Onboarding intent: when On Board is installed, you choose a vessel. Selection
// is by IMO from the Skipi database (the whole family looks vessels up by IMO;
// there is no name search endpoint). GET /api/vessels/{imo} is a PUBLIC read,
// so this works once an API base is configured — it does NOT need the dormant
// crew backend flag. The onboard_token is attached only if present and never
// leaves host scope / is never shown. Editing the vessel record is NOT offered
// yet (read-only); the user will get that later.
// =========================================================================
var myVesselState   = { loading:false, data:null, err:null, imo:null }; // module fetch
var vesselLookupState = { loading:false, result:null, err:null, imo:null }; // settings picker

function vesselApiBase(){ return String(crewConfig().api_base||'').replace(/\/+$/,''); }
function vesselConfigReady(){ return !!vesselApiBase(); }
function normalizeImo(s){ return String(s==null?'':s).replace(/[^0-9]/g,'').slice(0,7); }
function joinNC(name, country){ if(!name) return ''; return country ? (name+' ('+country+')') : name; }

// Public vessel read. Bearer attached only if a token exists; it is used here
// and never returned to a caller. Normalized envelope -> honest states.
function vesselFetch(imo){
  var c = crewConfig();
  var headers = {};
  if(c.onboard_token) headers['Authorization'] = 'Bearer '+c.onboard_token;
  return fetch(vesselApiBase()+'/api/vessels/'+encodeURIComponent(imo), { headers:headers }).then(function(r){
    if(r.status===404) return { ok:false, state:'not_found' };
    if(!r.ok) return r.text().then(function(t){ return { ok:false, state:'unavailable', message:'HTTP '+r.status+(t?(' '+t.slice(0,120)):'') }; });
    return r.json().then(function(j){ return { ok:true, state:'ok', vessel:j }; });
  }).catch(function(e){ return { ok:false, state:'unavailable', message:''+e }; });
}

// ---- settings picker actions ----
function vesselLookup(){
  var el = document.getElementById('mv-imo-input');
  var imo = el ? normalizeImo(el.value) : '';
  if(imo.length!==7){ showToast('Введите 7-значный IMO'); return; }
  if(!vesselConfigReady()){ vesselLookupState={loading:false,result:null,err:'no_config',imo:imo}; renderSettings(); return; }
  vesselLookupState={loading:true,result:null,err:null,imo:imo}; renderSettings();
  vesselFetch(imo).then(function(r){
    vesselLookupState = r.ok
      ? {loading:false,result:r.vessel,err:null,imo:imo}
      : {loading:false,result:null,err:(r.state||'unavailable'),imo:imo};
    renderSettings();
  });
}
function vesselSelect(){
  var v = vesselLookupState.result; if(!v) return;
  var c = crewConfig();
  c.vessel_imo  = String(v.imo);
  c.vessel_name = v.name_current || ('IMO '+v.imo);
  c.vessel_type = v.vessel_type || '';
  c.vessel_flag = v.flag_current || '';
  c.vessel_mode = 'selected';
  saveCrewConfig(c);
  updateVesselChip();
  vesselLookupState = {loading:false,result:null,err:null,imo:null};
  myVesselState = {loading:false,data:null,err:null,imo:null}; // force module refresh next open
  showToast('Судно выбрано: '+c.vessel_name);
  renderSettings();
}
function vesselClearSelection(){
  if(!window.confirm('Убрать выбранное судно?')) return;
  var c = crewConfig();
  delete c.vessel_imo; delete c.vessel_type; delete c.vessel_flag;
  c.vessel_name=''; c.vessel_mode='local';
  saveCrewConfig(c); updateVesselChip();
  myVesselState = {loading:false,data:null,err:null,imo:null};
  renderSettings();
}

// ---- My Vessel module ----
function loadMyVessel(force){
  var imo = crewConfig().vessel_imo;
  if(!imo){ myVesselState={loading:false,data:null,err:null,imo:null}; renderMyVessel(); return; }
  if(!vesselConfigReady()){ myVesselState={loading:false,data:null,err:'no_config',imo:String(imo)}; renderMyVessel(); return; }
  if(!force && myVesselState.data && myVesselState.imo===String(imo)){ renderMyVessel(); return; }
  myVesselState={loading:true,data:null,err:null,imo:String(imo)}; renderMyVessel();
  vesselFetch(imo).then(function(r){
    myVesselState = r.ok
      ? {loading:false,data:r.vessel,err:null,imo:String(imo)}
      : {loading:false,data:null,err:(r.state||'unavailable'),imo:String(imo)};
    renderMyVessel();
  });
}

// ===================== QR pairing (Stage 1 — On Board is the QR issuer) =====================
// On Board shows a one-time, expiring pairing invite as a QR. Crew scan it from
// Skipi Seafarer to connect to this vessel's onboard node. Stage 1 is local-only:
// no backend, no relay, no real handshake, no paired-device DB. The invite is a
// real structured payload v1 (forward-compatible with future keys/signatures).
// QR is rendered fully offline via the vendored encoder (dist/vendor/).
// Refs (Obsidian): "Skipi Device Pairing — QR sync and Onboard exchange",
//   "2026-06-23 — Skipi Onboard ↔ Seafarer QR pairing — coordination protocol".

var PAIRING_SCOPES = [
  'vessel_profile.read', 'watch_schedule.read', 'announcements.read',
  'checklists.read', 'familiarization.read', 'reports.submit', 'signals.submit'
];
var INVITE_TTL_MS = 10 * 60 * 1000; // 10 minutes
var pairing = { invite:null, timer:null };

function randHex(nbytes){
  var a = new Uint8Array(nbytes);
  (window.crypto || window.msCrypto).getRandomValues(a);
  var s = '';
  for(var i=0;i<a.length;i++){ s += ('0'+a[i].toString(16)).slice(-2); }
  return s;
}
// Stable per-install node id (no PII). Persists in localStorage for the MVP.
function onboardNodeId(){
  var k = 'skipi-onboard-node-id', v = null;
  try { v = localStorage.getItem(k); } catch(e){}
  if(!v){ v = 'onb_' + randHex(8); try { localStorage.setItem(k, v); } catch(e){} }
  return v;
}
function buildInvite(){
  var created = new Date();
  var expires = new Date(created.getTime() + INVITE_TTL_MS);
  return {
    v: 1,
    type: 'skipi.onboard.pairing.invite',
    product: 'skipi-onboard',
    node_type: 'onboard_node',
    node_id: onboardNodeId(),
    node_name: 'Skipi On Board',
    vessel: { name: null, imo: null, callsign: null },
    invite_id: 'inv_' + randHex(8),
    challenge: randHex(16),
    created_at: created.toISOString(),
    expires_at: expires.toISOString(),
    allowed_scopes: PAIRING_SCOPES.slice(),
    transport: { kind: 'local-preview', url: null }
  };
}
function qrDataUrl(text){
  if(typeof qrcode === 'undefined') return null;
  try {
    var q = qrcode(0, 'M'); // type 0 = auto-fit, EC level M
    q.addData(text);
    q.make();
    return q.createDataURL(6, 4); // cellSize, margin (rendered at high-res, scaled via CSS)
  } catch(e){ return null; }
}

// Pairing is a sub-view of the Crew module (opened from the Crew CTA).
function openPairing(){
  currentModule = 'crew';
  setActiveTab('crew');
  stopPairingTimer();
  stopCrewInviteTimer();
  if(crewLive()){
    crewPairingRequestInvite();
    return;
  }
  pairing.invite = buildInvite();
  renderPairing();
}
function regenerateInvite(){
  if(crewLive()){
    crewPairingRequestInvite();
    return;
  }
  pairing.invite = buildInvite();
  renderPairing();
}
function closePairing(){
  stopPairingTimer();
  stopCrewInviteTimer();
  if(crewLive()) crewLoadRoster();
  else renderCrew();
}

function crewPairingRequestInvite(){
  crewState.inviteLoading=true; crewState.inviteErr=null; crewState.invite=null;

    .then(function(res){ crewState.invite=res||{}; crewState.inviteLoading=false; renderCrewLivePairing(); startCrewInviteTimer(); })
    .catch(function(e){ crewState.invite=null; crewState.inviteErr=''+e; crewState.inviteLoading=false; stopCrewInviteTimer(); renderCrewLivePairing(); });

function startPairingTimer(){
  stopPairingTimer();
  updateCountdown();
  pairing.timer = setInterval(updateCountdown, 1000);
}
function stopPairingTimer(){
  if(pairing && pairing.timer){ clearInterval(pairing.timer); pairing.timer = null; }
}
function updateCountdown(){
  var el = document.getElementById('pair-countdown');
  if(!el || !pairing.invite){ stopPairingTimer(); return; }
  var ms = new Date(pairing.invite.expires_at).getTime() - Date.now();
  if(ms <= 0){ el.innerHTML = '<span class="pair-expired">Invite expired — regenerate</span>'; stopPairingTimer(); return; }
  var total = Math.floor(ms/1000), m = Math.floor(total/60), s = total % 60;
  el.textContent = 'Expires in ' + m + ':' + ('0'+s).slice(-2);
}
function copyPayload(){
  if(!pairing.invite) return;
  var txt = JSON.stringify(pairing.invite, null, 2);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){ showToast('Payload copied'); }, function(){ fallbackCopy(txt); });
  } else { fallbackCopy(txt); }
}
function fallbackCopy(txt){
  try {
    var ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    showToast('Payload copied');
  } catch(e){ showToast('Copy not available'); }
}

// ---- integrity gate: verify checksums.json before executing a bundled plugin.
// Lightweight (corruption / partial-bundle guard), NOT a substitute for the
// Stage-2 signed-pack model. We hash exactly what we fetch and only run/register
// a plugin whose index.js / index.css / plugin.json all match checksums.json.
function fetchText(u){ return fetch(u).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status+' '+u); return r.text(); }); }

function checksumExpected(checks, name){

  if(checks.files && checks.files[name] && checks.files[name].sha256) return 'sha256:' + checks.files[name].sha256;
  return null;
}
function verifyChecksum(text, expected){ return sha256Hex(text).then(function(h){ return ('sha256:'+h) === expected; }); }

function loadBundledPlugins(){
  var ids = Object.keys(BUNDLED_PLUGIN_DIRS);
  var chain = Promise.resolve();
  ids.forEach(function(id){ chain = chain.then(function(){ return loadOneBundledPlugin(id); }); });
  chain.then(function(){ if(currentModule==='apps' && !activePlugin && !appsState.selectedId) renderApps(); });

function loadOneBundledPlugin(id){

      verifyChecksum(jsonText, checksumExpected(checks, 'plugin.json'))
