<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Skipi On Board — United Seafarers</title>
<style>
  /* Skipi On Board — desktop Apps-only shell.
     Visual family with Skipi Seafarer: light theme by default, petrol accent
     (#004564), top modules-bar, calm cards. This first slice is intentionally
     local/static — no server, no account, no personal data, no marketplace. */
  :root, [data-theme="light"] {
    --bg:#ffffff; --surface:#f6f6f6; --surface2:#eeeeee;
    --text:#1e1e1e; --text2:#6b7280; --border:#e2e4e8; --hover:#f0f1f3;
    --accent:#004564; --accent-rgb:0,69,100; --accent-strong:#00384f;
    --accent-bg:rgba(var(--accent-rgb),0.10); --accent-bg2:rgba(var(--accent-rgb),0.22);
    --green:#3f9d6a; --orange:#c9852f;
    --font-ui:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-ui);
    font-size:14px; display:flex; flex-direction:column; overflow:hidden; }
  ::selection { background:var(--accent-bg2); }

  /* ---- top modules bar (shell) ---- */
  .modules-bar { display:flex; align-items:center; height:34px; background:var(--surface);
    border-bottom:1px solid var(--border); padding:0 8px; gap:2px; flex-shrink:0; }
  .brand { display:none; }
  .mod-tabs { display:flex; align-items:center; gap:2px; min-width:0; }
  .mod-tab { height:26px; min-width:90px; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:0 12px; border-radius:5px; font-size:12px; font-weight:500; color:var(--text2);
    background:transparent; border:1px solid transparent; cursor:pointer; white-space:nowrap; }
  .mod-tab:hover { color:var(--text); background:var(--hover); }
  .mod-tab.active { color:#fff; background:var(--accent); border-color:var(--accent); font-weight:600; box-shadow:0 1px 0 var(--accent); }
  .mod-tab.locked { color:var(--text2); background:transparent; border:1px dashed var(--border); cursor:pointer; }
  .mod-tab.locked:hover { color:var(--text); border-color:var(--accent); }
  .mod-tab.locked .lock { font-size:11px; opacity:.8; margin-right:1px; }
  .bar-spacer { flex:1; }
  .bar-note { font-size:11.5px; color:var(--text2); white-space:nowrap; margin-right:6px; }
  .mb-vessel { display:flex; align-items:center; gap:6px; height:26px; padding:0 10px; border-radius:5px;
    cursor:default; color:var(--text); font-size:12px; background:var(--bg); border:1px solid var(--border);
    max-width:240px; overflow:hidden; }
  .mb-vessel-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mb-caret { opacity:.6; font-size:10px; }

  /* ---- scroll body ---- */
  main { flex:1; overflow-y:auto; }
  .apps-screen { padding:24px 28px 48px; max-width:940px; }

  .apps-head-title { font-size:24px; font-weight:800; color:var(--text); }
  .apps-head-sub { font-size:12.5px; color:var(--text2); margin-top:6px; line-height:1.5; max-width:660px; }

  .apps-cat-title { font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
    color:var(--text2); margin:26px 0 11px; }
  .apps-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(252px,1fr)); gap:13px; }
  .apps-tile { display:flex; gap:13px; text-align:left; align-items:flex-start; padding:15px;
    border:1px solid var(--border); border-radius:13px; background:var(--surface); color:var(--text);
    cursor:pointer; transition:border-color .12s, transform .05s, box-shadow .12s; }
  .apps-tile:hover { border-color:var(--accent); box-shadow:0 1px 6px rgba(0,0,0,.04); }
  .apps-tile:active { transform:translateY(1px); }
  .apps-tile.soon { opacity:.82; }
  .apps-tile-icon { width:48px; height:48px; flex:0 0 auto; border-radius:12px; background:var(--accent-bg);
    color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:25px; }
  .apps-tile-icon.big { width:60px; height:60px; font-size:32px; border-radius:15px; }
  .apps-tile-body { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .apps-tile-name { font-size:15px; font-weight:800; line-height:1.2; }
  .apps-tile-sub { font-size:12px; color:var(--text2); line-height:1.4; }
  .apps-badge { display:inline-block; align-self:flex-start; margin-top:6px; font-size:10px; font-weight:800;
    text-transform:uppercase; letter-spacing:.04em; padding:2px 8px; border-radius:999px; }
  .apps-badge.live { background:var(--accent-bg); color:var(--accent); }
  .apps-badge.soon { background:var(--hover); color:var(--text2); }

  /* ---- detail ---- */
  .apps-detail { max-width:660px; }
  .apps-back { background:transparent; border:none; color:var(--accent); font-size:13px; font-weight:700;
    cursor:pointer; padding:4px 0; margin-bottom:10px; }
  .apps-detail-head { display:flex; gap:15px; align-items:center; margin-bottom:8px; }
  .apps-detail-name { font-size:21px; font-weight:800; color:var(--text); }
  .apps-detail-cat { font-size:12px; color:var(--text2); margin-top:3px; }
  .apps-detail-desc { font-size:13.5px; color:var(--text); line-height:1.55; }
  .apps-note { font-size:12.5px; color:var(--text2); background:var(--surface); border:1px solid var(--border);
    border-radius:9px; padding:11px 13px; margin:12px 0; line-height:1.45; }
  .apps-safety { font-size:12.5px; color:var(--text); background:var(--accent-bg); border:1px solid var(--accent-bg2);
    border-radius:9px; padding:11px 13px; margin:12px 0; line-height:1.5; }
  .apps-hosts { display:flex; flex-wrap:wrap; gap:6px; margin:14px 0 4px; }
  .apps-host-chip { font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-bg);
    border:1px solid var(--accent-bg2); border-radius:999px; padding:3px 10px; }
  .apps-host-chip.self { color:#fff; background:var(--accent); border-color:var(--accent); }
  .apps-perm { border:1px solid var(--border); border-radius:11px; padding:13px 15px; margin:16px 0; background:var(--surface); }
  .apps-perm-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); margin-bottom:9px; }
  .apps-perm-row { display:flex; align-items:center; gap:9px; font-size:13px; padding:3px 0; color:var(--text); }
  .apps-perm-dot { width:18px; height:18px; flex:0 0 auto; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; line-height:1; }
  .apps-perm-row.clear .apps-perm-dot { background:rgba(63,157,106,.16); color:var(--green); }
  .apps-perm-row.used .apps-perm-dot { background:rgba(201,133,47,.18); color:var(--orange); }
  .apps-actions { margin-top:20px; }
  /* ---- Apps compact plugin launcher v2 (UI Standard) ---- */
  .apps-launch-bar { display:flex; align-items:center; gap:10px; margin:2px 0 16px; }
  .apps-search { flex:1; display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border);
    border-radius:9px; padding:0 12px; height:38px; }
  .apps-search:focus-within { border-color:var(--accent); background:#fff; }
  .apps-search-ico { color:var(--text2); font-size:14px; }
  .apps-search input { flex:1; border:0; outline:0; background:transparent; font-size:14px; color:var(--text); font-family:var(--font-ui); }
  .apps-gear-btn { width:38px; height:38px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; border-radius:9px;
    border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; font-size:17px; }
  .apps-gear-btn:hover { color:var(--accent); border-color:var(--accent); background:var(--accent-bg); }
  .apps-sec-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); margin:4px 0 10px; }
  .apps-launch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:14px; }
  .apps-launch-tile-wrap { display:flex; }
  .apps-launch-tile { flex:1; display:flex; flex-direction:column; align-items:center; gap:9px; padding:15px 8px; border:1px solid var(--border);
    border-radius:12px; background:var(--surface); cursor:pointer; text-align:center; transition:border-color .12s, background .12s; }
  .apps-launch-tile:hover { border-color:var(--accent); background:var(--accent-bg); }
  .apps-launch-ico { width:50px; height:50px; display:flex; align-items:center; justify-content:center; font-size:27px;
    border-radius:13px; background:var(--accent-bg); color:var(--accent); }
  .apps-launch-name { font-size:12.5px; font-weight:700; color:var(--text); line-height:1.2; }
  .apps-launch-sub { font-size:10.5px; color:var(--text2); line-height:1.2; }
  .apps-state { text-align:center; padding:34px 16px; color:var(--text2); }
  .apps-state-ico { font-size:32px; opacity:.65; }
  .apps-state-t { font-weight:700; color:var(--text); margin-top:9px; font-size:14px; }
  .apps-state-s { font-size:13px; margin-top:5px; line-height:1.45; }
  .btn { font-size:14px; font-weight:700; border-radius:9px; padding:11px 18px; border:1px solid var(--border); cursor:pointer; }
  .btn-outline { background:var(--surface); color:var(--text2); }
  .btn-outline[disabled] { cursor:not-allowed; opacity:.7; }
  .btn-accent { background:var(--accent); color:#fff; border:1px solid var(--accent); }
  .btn-accent:hover { background:var(--accent-strong); }
  .btn-sm { padding:5px 11px; font-size:12px; }

  /* ---- pairing panel ---- */
  .apps-head-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .pair-cta { font-size:13px; font-weight:700; color:#fff; background:var(--accent); border:1px solid var(--accent);
    border-radius:9px; padding:9px 14px; cursor:pointer; white-space:nowrap; }
  .pair-cta:hover { background:var(--accent-strong); }
  .pair-screen { max-width:900px; }
  .pair-grid { display:grid; grid-template-columns:300px 1fr; gap:26px; margin-top:18px; align-items:start; }
  .pair-qr-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px;
    display:flex; flex-direction:column; align-items:center; gap:13px; }
  .pair-qr-img { width:248px; height:248px; image-rendering:pixelated; border-radius:6px; background:#fff; }
  .pair-qr-missing { width:248px; height:248px; display:flex; align-items:center; justify-content:center;
    color:var(--text2); font-size:13px; text-align:center; border:1px dashed var(--border); border-radius:6px; padding:14px; }
  .pair-countdown { font-size:13px; font-weight:700; color:var(--text2); font-variant-numeric:tabular-nums; }
  .pair-expired { color:#b3402a; }
  .pair-side { min-width:0; }
  .pair-meta { display:flex; gap:10px; font-size:12.5px; padding:3px 0; }
  .pair-meta-k { color:var(--text2); width:56px; flex:0 0 auto; }
  .pair-meta-v { color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace; word-break:break-all; }
  .pair-scopes { margin:13px 0 4px; }
  .pair-scopes-t { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); margin-bottom:8px; }
  .pair-scope { display:inline-block; font-size:11.5px; color:var(--accent); background:var(--accent-bg);
    border:1px solid var(--accent-bg2); border-radius:999px; padding:3px 9px; margin:0 5px 5px 0; }
  .pair-payload-head { display:flex; align-items:center; justify-content:space-between; margin:16px 0 6px;
    font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text2); }
  .pair-payload { background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:12px;
    font-size:11.5px; line-height:1.45; color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace;
    white-space:pre-wrap; word-break:break-word; max-height:280px; overflow:auto; margin:0; }
  @media (max-width:780px){ .pair-grid { grid-template-columns:1fr; } }

  /* ---- crew module ---- */
  .crew-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:13px; margin:18px 0 26px; }
  .crew-stat { background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:15px 16px; }
  .crew-stat-k { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.04em; }
  .crew-stat-v { font-size:28px; font-weight:800; color:var(--text); line-height:1.1; margin-top:7px; }
  .crew-stat-s { font-size:11.5px; color:var(--text2); margin-top:3px; }
  .crew-section-t { font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--text2); margin:8px 0 12px; }
  .crew-empty { background:var(--surface); border:1px dashed var(--border); border-radius:13px; padding:34px 22px; text-align:center; }
  .crew-empty-icon { font-size:30px; }
  .crew-empty-t { font-size:15px; font-weight:800; color:var(--text); margin-top:8px; }
  .crew-empty-s { font-size:12.5px; color:var(--text2); margin-top:6px; line-height:1.5; max-width:440px; margin-left:auto; margin-right:auto; }
  .crew-empty .pair-cta { margin-top:16px; }

  /* ---- vessel documents module ---- */
  .vdoc-card { display:flex; gap:13px; align-items:flex-start; padding:15px; border:1px solid var(--border);
    border-radius:13px; background:var(--surface); }
  .vdoc-icon { width:48px; height:48px; flex:0 0 auto; border-radius:12px; background:var(--accent-bg); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:24px; }
  .vdoc-body { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .vdoc-name { font-size:15px; font-weight:800; line-height:1.2; }
  .vdoc-sub { font-size:12px; color:var(--text2); line-height:1.4; }

  /* ---- plugin host ---- */
  .apps-badge.avail { background:var(--accent-bg); color:var(--accent); }
  .apps-badge.installed { background:rgba(63,157,106,.16); color:var(--green); }
  .apps-badge.disabled { background:var(--hover); color:var(--text2); }
  .apps-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .plugin-host-head { display:flex; gap:15px; align-items:center; margin-bottom:6px; }
  .plugin-mount { margin-top:14px; border:1px solid var(--border); border-radius:13px; padding:18px; background:var(--bg); }

  /* ---- settings (gear) ---- */
  .mb-gear { width:36px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:6px;
    cursor:pointer; color:var(--text); font-size:21px; margin-left:6px; background:var(--bg); border:1px solid var(--border); line-height:1; }
  .mb-gear:hover { color:var(--accent); background:var(--accent-bg); border-color:var(--accent); }
  .mb-gear.active { color:var(--accent); background:var(--accent-bg); border-color:var(--accent); }
  .settings-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(15,23,42,.26);
    align-items:center; justify-content:center; padding:24px; }
  .settings-overlay.open { display:flex; }
  .settings-modal { position:relative; width:min(980px,92vw); height:min(720px,88vh); background:#fff;
    border-radius:18px; display:grid; grid-template-columns:286px minmax(0,1fr); overflow:hidden;
    box-shadow:0 18px 44px rgba(15,23,42,.14); border:1px solid #cfd7df; }
  .settings-nav { min-width:0; background:#f1f3f5; border-right:1px solid var(--border);
    padding:18px 14px; overflow-y:auto; }
  .settings-sidebar-head { padding:0 8px 16px; }
  .settings-traffic { display:flex; gap:8px; margin-bottom:22px; }
  .settings-traffic span { width:12px; height:12px; border-radius:50%; background:#d7dce2; }
  .settings-sidebar-head h2 { margin:0 0 6px; font-size:20px; line-height:1.2; font-weight:800; }
  .settings-sidebar-head p { margin:0; color:var(--text2); font-size:12px; line-height:1.4; }
  .settings-nav-list { display:grid; gap:4px; }
  .settings-nav-item { width:100%; min-height:44px; display:grid; grid-template-columns:28px minmax(0,1fr);
    align-items:center; gap:9px; border:0; border-radius:10px; background:transparent; color:var(--text);
    padding:7px 10px; cursor:pointer; text-align:left; font:inherit; }
  .settings-nav-item:hover { background:#fff; }
  .settings-nav-item.active { background:#fff; box-shadow:inset 0 0 0 1px var(--border); color:var(--text); }
  .settings-nav-item .nav-icon { width:26px; height:26px; border-radius:8px; display:grid; place-items:center;
    color:var(--accent); background:#fff; border:1px solid var(--border); font-size:12px; font-weight:800; }
  .settings-nav-item.active .nav-icon { background:var(--accent); color:#fff; border-color:var(--accent); }
  .settings-nav-item .nav-label { min-width:0; font-size:13px; line-height:1.25; font-weight:650; overflow-wrap:anywhere; }
  .settings-body { min-width:0; overflow-y:auto; padding:30px 34px; background:#fff; }
  .settings-close { position:absolute; top:16px; right:18px; width:32px; height:32px; display:flex; align-items:center;
    justify-content:center; cursor:pointer; border:1px solid var(--border); border-radius:9px; color:var(--text2); background:#fff; font-size:18px; z-index:101; }
  .settings-close:hover { background:var(--hover); color:var(--text); }
  .set-screen { max-width:680px; }
  .set-sec { margin:0 0 28px; }
  .set-sec-title { font-size:12px; line-height:1.2; font-weight:800; color:var(--text2); text-transform:uppercase; margin:24px 0 8px; }
  .set-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:16px; }
  .settings-section { margin-bottom:28px; }
  .settings-section h3 { font-size:26px; line-height:1.15; font-weight:800; margin:0 0 8px; padding-right:44px; }
  .settings-section .section-desc { font-size:14px; color:var(--text2); line-height:1.45; margin-bottom:22px; max-width:620px; }
  .setting-row { min-height:68px; display:grid; grid-template-columns:minmax(0,1fr) auto; align-items:center;
    gap:18px; padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .setting-row:first-of-type { border-radius:14px 14px 0 0; }
  .setting-row:last-of-type { border-bottom:none; border-radius:0 0 14px 14px; }
  .setting-row:only-of-type { border-radius:14px; }
  .setting-info { flex:1; min-width:0; }
  .setting-label { font-size:14px; line-height:1.25; font-weight:700; color:var(--text); }
  .setting-desc { font-size:13px; color:var(--text2); margin-top:4px; line-height:1.4; word-break:break-word; }
  .setting-control { flex:0 0 auto; display:flex; align-items:center; gap:8px; }
  .set-pill { display:inline-block; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; padding:3px 9px; border-radius:999px; background:var(--hover); color:var(--text2); }
  .set-pill.warn { background:rgba(201,133,47,.16); color:var(--orange); }
  .set-hint { font-size:12.5px; color:var(--text2); line-height:1.5; }
  .set-mono { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; color:var(--text); background:var(--bg);
    border:1px solid var(--border); border-radius:8px; padding:9px 11px; word-break:break-all; margin:8px 0; }
  .set-qr-ph { width:200px; height:200px; display:flex; align-items:center; justify-content:center; text-align:center;
    color:var(--text2); font-size:12px; border:1px dashed var(--border); border-radius:10px; padding:16px; margin-top:12px; }
  .set-disabled { opacity:.6; }
  .set-lbl { display:block; font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.04em; margin:12px 0 5px; }
  .set-inp { width:100%; font-size:13px; color:var(--text); background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:9px 11px; }
  .set-inp:focus { outline:none; border-color:var(--accent); }

  /* ---- footer strip ---- */
  .plat-strip { flex-shrink:0; border-top:1px solid var(--border); background:var(--surface);
    padding:8px 16px; font-size:11px; color:var(--text2); display:flex; align-items:center; gap:8px; }
  .plat-strip b { color:var(--text); font-weight:700; }
  .plat-dot { opacity:.5; }

  /* ---- toast ---- */
  .toast { position:fixed; left:50%; bottom:46px; transform:translateX(-50%); background:var(--text); color:#fff;
    border-radius:9px; padding:10px 16px; font-size:13px; max-width:90%; opacity:0; pointer-events:none;
    transition:opacity .18s; z-index:50; }
  .toast.show { opacity:.96; }

  /* ---- launch / first-run fork ---- */
  body.launching { background:#f8fbfc; }
  body.launching .modules-bar,
  body.launching .plat-strip { display:none; }
  body.launching main { display:flex; align-items:center; justify-content:center; padding:32px; overflow:auto; }
  .launch-screen { width:min(940px,100%); display:grid; grid-template-columns:minmax(0,360px) minmax(0,470px);
    gap:34px; align-items:center; }
  .launch-brand-panel { min-width:0; }
  .launch-kicker { display:inline-flex; align-items:center; min-height:28px; padding:5px 11px; border-radius:999px;
    color:var(--accent); background:var(--accent-bg); border:1px solid var(--accent-bg2);
    font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; }

// ---------- helpers ----------
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._t); showToast._t=setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

// ---------- launch / first-run fork ----------
function launchBrandHtml(){
  return '<div class="launch-brand-panel">'
    + '<div class="launch-kicker">Skipi On Board</div>'
    + '<h1 class="launch-title">Судовой рабочий стол</h1>'
    + '<div class="launch-subtitle">Первый экран наследует общий desktop launch pattern Skipi: сначала выбираем демонстрацию или реальную работу, затем создаём судно или подключаемся по коду.</div>'

    + '<span class="launch-chip">Light desktop shell</span>'
    + '<span class="launch-chip">Local honest UI</span>'
    + '</div>'
    + '</div>';
}
function launchLayout(panelHtml){
  document.body.classList.add('launching');

    + launchBrandHtml()

}

    launchLayout('<div class="launch-panel-title">Начать работу</div>'

      + '<div class="launch-actions">'
      + '<button class="launch-option primary" type="button" data-qa="onboard-launch-create-vessel" onclick="launchCreateVessel()">'
      + '<span class="launch-option-title">Создать новое судно</span>'
      + '<span class="launch-option-sub">Новый vessel vault: профиль судна, документы, экипаж и локальный рабочий контекст.</span>'
      + '</button>'
      + '<button class="launch-option" type="button" data-qa="onboard-launch-connect-existing" onclick="showLaunch(\'connect\')">'
      + '<span class="launch-option-title">Подключиться к существующему судну</span>'
      + '<span class="launch-option-sub">Введите код, показанный в действующем судовом On Board пространстве.</span>'
      + '</button>'
      + '</div>'
      + '<button class="launch-back" type="button" data-qa="onboard-launch-back" onclick="showLaunch(\'choice\')">Назад</button>');
    return;
  }
  if(mode==='connect'){
    launchLayout('<div class="launch-panel-title">Подключиться по коду</div>'

      + '<div class="launch-inline-actions">'
      + '<button class="btn btn-accent" type="submit" data-qa="onboard-launch-submit-code">Подключиться</button>'
      + '<button class="btn btn-outline" type="button" data-qa="onboard-launch-back" onclick="showLaunch(\'use\')">Назад</button>'
      + '</div>'
      + '</form>'
      + '<div class="launch-note">В этой локальной оболочке код сохраняется как pending connection. Проверка кода и выдача доступа должны подключаться отдельным backend/wiring треком.</div>');
    setTimeout(function(){ var el=document.getElementById('launch-code'); if(el) el.focus(); }, 0);
    return;
  }
  launchLayout('<div class="launch-panel-title">Открыть Skipi On Board</div>'
    + '<div class="launch-panel-sub">Единая логика входа для desktop-приложений Skipi: сначала демонстрация или работа, без смешивания с настройками и pairing-flow.</div>'
    + '<div class="launch-actions">'

    + '<span class="launch-option-title">Пользоваться</span>'
    + '<span class="launch-option-sub">Создать новое судно или подключиться к существующему судовому пространству.</span>'
    + '</button>'
    + '<button class="launch-option" type="button" data-qa="onboard-launch-demo" onclick="launchDemo()">'
    + '<span class="launch-option-title">Показать демонстрацию</span>'
    + '<span class="launch-option-sub">Открыть демо-оболочку без сервера, аккаунта и реального crew access.</span>'
    + '</button>'
    + '</div>'

}
function launchSaveContext(mode, extra){
  var c = {};
  try { c = crewConfig(); } catch(e){}
  c.vessel_mode = mode;
  if(extra){ for(var k in extra){ if(Object.prototype.hasOwnProperty.call(extra,k)) c[k] = extra[k]; } }
  try {
    saveCrewConfig(c);
    localStorage.setItem('skipi-onboard-launch-mode', mode);
  } catch(e){}
  updateVesselChip();
}
function launchEnterShell(msg){
  document.body.classList.remove('launching');
  showModule('crew');
  if(msg) showToast(msg);
}
function launchDemo(){
  launchSaveContext('demo', { vessel_name:'Demo vessel' });
  launchEnterShell('Demo vessel opened');
}
function launchCreateVessel(){
  launchSaveContext('created', { vessel_name:'New vessel' });
  launchEnterShell('New vessel workspace created locally');
}
function launchSubmitCode(){
  var el = document.getElementById('launch-code');
  var code = el ? String(el.value||'').replace(/\s+/g,'').toUpperCase() : '';
  if(code.length < 4){ showLaunch('connect', 'Введите код судна.'); return; }
  launchSaveContext('join-code', { vessel_name:'Existing vessel (pending)', pending_vessel_code:code });
  try { localStorage.setItem('skipi-onboard-pending-vessel-code', code); } catch(e){}
  launchEnterShell('Vessel code saved for connection review');
}

// Primary Apps surface = compact launcher of INSTALLED plugins as icon tiles +

// (Tymur: «только значки, минимализм, ничего лишнего»). Plugin runtime, registry

function installedPluginIds(){
  return catalogPluginIds().filter(function(id){ return pluginUiState(id)==='installed'; });

function appsShortLabel(id){
  var m = (SkipiPlugins[id] && SkipiPlugins[id].manifest) || {};

  return '<div class="apps-launch-tile-wrap" data-qa="plugin-tile-'+esc(id)+'">'

// Only the tiles+states region — re-rendered on search without touching the input.
function appsLauncherBodyHtml(){
  // Honest offline state (real navigator.onLine — no faking).
  if(typeof navigator!=='undefined' && navigator.onLine===false){
    return '<div class="apps-state" data-qa="plugin-offline-state"><div class="apps-state-ico">📡</div>'
      + '<div class="apps-state-t">Нет сети</div>'
      + '<div class="apps-state-s">Установленные плагины открываются офлайн; сетевые функции вернутся при подключении.</div></div>';
  }
  var h = '';
  // Honest integrity-error state for any catalog plugin that failed its checksum.
  var failed = catalogPluginIds().filter(function(id){ return pluginIntegrity[id] && pluginIntegrity[id].ok===false; });
  if(failed.length){
    h += '<div class="apps-state" data-qa="plugin-error-state" style="text-align:left;padding:14px 16px">'
      + '<div class="apps-state-t">⚠ Плагин не загружен</div>'
      + '<div class="apps-state-s">'+failed.length+' плагин(ов) не прошли проверку целостности и отключены. Подробности — в настройках плагинов.</div></div>';
  }
  var q = String(appsState.q||'').trim().toLowerCase();
  var ids = installedPluginIds();
  if(q){ ids = ids.filter(function(id){ return appsShortLabel(id).toLowerCase().indexOf(q)>=0; }); }
  if(!ids.length){
    if(q){
      h += '<div class="apps-state" data-qa="plugin-empty-state"><div class="apps-state-ico">🔍</div>'
        + '<div class="apps-state-t">Ничего не найдено</div>'
        + '<div class="apps-state-s">Поиск ведётся только по установленным плагинам.</div></div>';
    } else {

// =========================================================================
// Live crew wiring — DORMANT by default. The committed master flag
// CREW_API_CONNECTED stays false; a dev-only runtime override lets us exercise
// the live path against a deployed backend WITHOUT flipping that constant, and
// only when API base + ONBOARD_TOKEN + vessel_imo are all configured. If any
// config is missing or the backend is unreachable the UI stays an honest shell
// (no fake crew rows, no fake codes). Endpoints: /api/onboard/crew/*.
// =========================================================================
var crewState = { invite:null, inviteErr:null, inviteLoading:false, timer:null, roster:null, rosterErr:null, rosterLoading:false };

function crewConfig(){ try { return JSON.parse(localStorage.getItem('skipi-onboard-crew-config')||'{}'); } catch(e){ return {}; } }
function saveCrewConfig(c){ try { localStorage.setItem('skipi-onboard-crew-config', JSON.stringify(c)); } catch(e){} }
function crewConfigMissing(){ var c=crewConfig(); var m=[]; if(!c.api_base)m.push('API base'); if(!c.onboard_token)m.push('ONBOARD_TOKEN'); if(!c.vessel_imo)m.push('vessel_imo'); return m; }
function crewConfigReady(){ return crewConfigMissing().length===0; }
function crewLiveOverride(){ try { return localStorage.getItem('skipi-onboard-crew-live')==='1'; } catch(e){ return false; } }
// Backend considered ON only via the committed master flag, or — for testing —
// a dev-mode runtime override. Never on by default for normal users.
function crewBackendOn(){ return CREW_API_CONNECTED || (isDevMode() && crewLiveOverride()); }
function crewLive(){ return crewBackendOn() && crewConfigReady(); }

function crewApiUrl(path){ return String(crewConfig().api_base||'').replace(/\/+$/,'') + path; }
function crewFetch(method, path, body){
  var c = crewConfig();
  var opt = { method:method, headers:{ 'Authorization':'Bearer '+(c.onboard_token||''), 'Content-Type':'application/json' } };
  if(body!=null) opt.body = JSON.stringify(body);
  return fetch(crewApiUrl(path), opt).then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error('HTTP '+r.status+(t?(' '+t.slice(0,120)):'')); });
    return r.status===204 ? null : r.json();
  });
}
function copyText(txt){
  if(!txt) return;
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(function(){ showToast('Скопировано'); }, function(){ fallbackCopy(txt); }); }
  else fallbackCopy(txt);
}

function saveCrewConfigFromForm(){
  var g=function(id){ var el=document.getElementById(id); return el? String(el.value||'').trim() : ''; };
  var prev=crewConfig();
  saveCrewConfig({ api_base:g('crew-cfg-base'), onboard_token:g('crew-cfg-token'), vessel_imo:g('crew-cfg-imo'), vessel_name:prev.vessel_name, vessel_mode:prev.vessel_mode, pending_vessel_code:prev.pending_vessel_code });
  updateVesselChip();
  showToast(crewConfigReady()?'Config saved':'Config saved (incomplete)');
  if(crewLive()) crewLoadRoster(); else renderSettings();
}
function toggleCrewLiveOverride(){ // dev only
  try { localStorage.setItem('skipi-onboard-crew-live', crewLiveOverride()?'0':'1'); } catch(e){}
  showToast('Crew live override '+(crewLiveOverride()?'on':'off')+' (dev)');
  crewState.invite=null; crewState.inviteErr=null; stopCrewInviteTimer();
  if(crewLive()) crewLoadRoster(); else renderSettings();
}

// --- live invite ---
function crewRequestInvite(){
  if(!crewLive()) return;
  crewState.inviteLoading=true; crewState.inviteErr=null; renderSettings();
  crewFetch('POST', '/api/onboard/crew/invite', { vessel_imo: crewConfig().vessel_imo })
    .then(function(res){ crewState.invite=res||{}; crewState.inviteLoading=false; renderSettings(); startCrewInviteTimer(); })
    .catch(function(e){ crewState.invite=null; crewState.inviteErr=''+e; crewState.inviteLoading=false; stopCrewInviteTimer(); renderSettings(); });
}
function crewInvitePayload(){ var inv=crewState.invite; if(!inv) return ''; return inv.qr_payload || ('skipi-crew:1:onboard:'+(inv.code||'')); }
function startCrewInviteTimer(){ stopCrewInviteTimer(); updateCrewCountdown(); crewState.timer=setInterval(updateCrewCountdown,1000); }
function stopCrewInviteTimer(){ if(crewState.timer){ clearInterval(crewState.timer); crewState.timer=null; } }
function updateCrewCountdown(){
  var el=document.getElementById('crew-countdown'); var inv=crewState.invite;
  if(!el || !inv || !inv.expires_at){ stopCrewInviteTimer(); return; }

  if(ms<=0){ el.innerHTML='<span class="pair-expired">Код истёк — обновите</span>'; stopCrewInviteTimer(); return; }
  var t=Math.floor(ms/1000), m=Math.floor(t/60), s=t%60; el.textContent='Истекает через '+m+':'+('0'+s).slice(-2);
}

// --- live roster ---
function crewLoadRoster(){
  if(!crewLive()){ crewState.roster=null; renderSettings(); return; }
  crewState.rosterLoading=true; crewState.rosterErr=null; renderSettings();
  crewFetch('GET', '/api/onboard/crew?vessel_imo='+encodeURIComponent(crewConfig().vessel_imo), null)
    .then(function(res){ crewState.roster = (res && res.items) ? res.items : (Array.isArray(res)?res:[]); crewState.rosterLoading=false; renderSettings(); })
    .catch(function(e){ crewState.roster=null; crewState.rosterErr=''+e; crewState.rosterLoading=false; renderSettings(); });

function crewRevoke(id){

    .then(function(){ showToast('Отвязан'); crewLoadRoster(); })
    .catch(function(e){ showToast('Ошибка: '+e); });

// =========================================================================
// My Vessel — read the Skipi vessel-database record for the selected vessel.
//
// Onboarding intent: when On Board is installed, you choose a vessel. Selection
// is by IMO from the Skipi database (the whole family looks vessels up by IMO;
// there is no name search endpoint). GET /api/vessels/{imo} is a PUBLIC read,
// so this works once an API base is configured — it does NOT need the dormant
// crew backend flag. The onboard_token is attached only if present and never
// leaves host scope / is never shown. Editing the vessel record is NOT offered
// yet (read-only); the user will get that later.
// =========================================================================
var myVesselState   = { loading:false, data:null, err:null, imo:null }; // module fetch
var vesselLookupState = { loading:false, result:null, err:null, imo:null }; // settings picker

function vesselApiBase(){ return String(crewConfig().api_base||'').replace(/\/+$/,''); }
function vesselConfigReady(){ return !!vesselApiBase(); }
function normalizeImo(s){ return String(s==null?'':s).replace(/[^0-9]/g,'').slice(0,7); }
function joinNC(name, country){ if(!name) return ''; return country ? (name+' ('+country+')') : name; }

// Public vessel read. Bearer attached only if a token exists; it is used here
// and never returned to a caller. Normalized envelope -> honest states.
function vesselFetch(imo){
  var c = crewConfig();
  var headers = {};
  if(c.onboard_token) headers['Authorization'] = 'Bearer '+c.onboard_token;
  return fetch(vesselApiBase()+'/api/vessels/'+encodeURIComponent(imo), { headers:headers }).then(function(r){
    if(r.status===404) return { ok:false, state:'not_found' };
    if(!r.ok) return r.text().then(function(t){ return { ok:false, state:'unavailable', message:'HTTP '+r.status+(t?(' '+t.slice(0,120)):'') }; });
    return r.json().then(function(j){ return { ok:true, state:'ok', vessel:j }; });
  }).catch(function(e){ return { ok:false, state:'unavailable', message:''+e }; });
}

// ---- settings picker actions ----
function vesselLookup(){
  var el = document.getElementById('mv-imo-input');
  var imo = el ? normalizeImo(el.value) : '';
  if(imo.length!==7){ showToast('Введите 7-значный IMO'); return; }
  if(!vesselConfigReady()){ vesselLookupState={loading:false,result:null,err:'no_config',imo:imo}; renderSettings(); return; }
  vesselLookupState={loading:true,result:null,err:null,imo:imo}; renderSettings();
  vesselFetch(imo).then(function(r){
    vesselLookupState = r.ok
      ? {loading:false,result:r.vessel,err:null,imo:imo}
      : {loading:false,result:null,err:(r.state||'unavailable'),imo:imo};
    renderSettings();
  });
}
function vesselSelect(){
  var v = vesselLookupState.result; if(!v) return;
  var c = crewConfig();
  c.vessel_imo  = String(v.imo);
  c.vessel_name = v.name_current || ('IMO '+v.imo);
  c.vessel_type = v.vessel_type || '';
  c.vessel_flag = v.flag_current || '';
  c.vessel_mode = 'selected';
  saveCrewConfig(c);
  updateVesselChip();
  vesselLookupState = {loading:false,result:null,err:null,imo:null};
  myVesselState = {loading:false,data:null,err:null,imo:null}; // force module refresh next open
  showToast('Судно выбрано: '+c.vessel_name);
  renderSettings();
}
function vesselClearSelection(){
  if(!window.confirm('Убрать выбранное судно?')) return;
  var c = crewConfig();
  delete c.vessel_imo; delete c.vessel_type; delete c.vessel_flag;
  c.vessel_name=''; c.vessel_mode='local';
  saveCrewConfig(c); updateVesselChip();
  myVesselState = {loading:false,data:null,err:null,imo:null};
  renderSettings();
}

  var h = '';
  // current selection
  h += '<div class="set-sec"><div class="set-sec-title">Текущее судно · Current vessel</div><div class="set-card">';
  if(c.vessel_imo){

// ---- My Vessel module ----
function loadMyVessel(force){
  var imo = crewConfig().vessel_imo;
  if(!imo){ myVesselState={loading:false,data:null,err:null,imo:null}; renderMyVessel(); return; }
  if(!vesselConfigReady()){ myVesselState={loading:false,data:null,err:'no_config',imo:String(imo)}; renderMyVessel(); return; }
  if(!force && myVesselState.data && myVesselState.imo===String(imo)){ renderMyVessel(); return; }
  myVesselState={loading:true,data:null,err:null,imo:String(imo)}; renderMyVessel();
  vesselFetch(imo).then(function(r){
    myVesselState = r.ok
      ? {loading:false,data:r.vessel,err:null,imo:String(imo)}
      : {loading:false,data:null,err:(r.state||'unavailable'),imo:String(imo)};
    renderMyVessel();
  });
}

  var nr = v.review_count||0, nf=(v.facts||[]).length, ne=(v.events||[]).length, ns=(v.sanctions||[]).length;

// ===================== QR pairing (Stage 1 — On Board is the QR issuer) =====================
// On Board shows a one-time, expiring pairing invite as a QR. Crew scan it from
// Skipi Seafarer to connect to this vessel's onboard node. Stage 1 is local-only:
// no backend, no relay, no real handshake, no paired-device DB. The invite is a
// real structured payload v1 (forward-compatible with future keys/signatures).
// QR is rendered fully offline via the vendored encoder (dist/vendor/).
// Refs (Obsidian): "Skipi Device Pairing — QR sync and Onboard exchange",
//   "2026-06-23 — Skipi Onboard ↔ Seafarer QR pairing — coordination protocol".

var PAIRING_SCOPES = [
  'vessel_profile.read', 'watch_schedule.read', 'announcements.read',
  'checklists.read', 'familiarization.read', 'reports.submit', 'signals.submit'
];
var INVITE_TTL_MS = 10 * 60 * 1000; // 10 minutes
var pairing = { invite:null, timer:null };

function randHex(nbytes){
  var a = new Uint8Array(nbytes);
  (window.crypto || window.msCrypto).getRandomValues(a);
  var s = '';
  for(var i=0;i<a.length;i++){ s += ('0'+a[i].toString(16)).slice(-2); }
  return s;
}
// Stable per-install node id (no PII). Persists in localStorage for the MVP.
function onboardNodeId(){
  var k = 'skipi-onboard-node-id', v = null;
  try { v = localStorage.getItem(k); } catch(e){}
  if(!v){ v = 'onb_' + randHex(8); try { localStorage.setItem(k, v); } catch(e){} }
  return v;
}
function buildInvite(){
  var created = new Date();
  var expires = new Date(created.getTime() + INVITE_TTL_MS);
  return {
    v: 1,
    type: 'skipi.onboard.pairing.invite',
    product: 'skipi-onboard',
    node_type: 'onboard_node',
    node_id: onboardNodeId(),
    node_name: 'Skipi On Board',
    vessel: { name: null, imo: null, callsign: null },
    invite_id: 'inv_' + randHex(8),
    challenge: randHex(16),
    created_at: created.toISOString(),
    expires_at: expires.toISOString(),
    allowed_scopes: PAIRING_SCOPES.slice(),
    transport: { kind: 'local-preview', url: null }
  };
}
function qrDataUrl(text){
  if(typeof qrcode === 'undefined') return null;
  try {
    var q = qrcode(0, 'M'); // type 0 = auto-fit, EC level M
    q.addData(text);
    q.make();
    return q.createDataURL(6, 4); // cellSize, margin (rendered at high-res, scaled via CSS)
  } catch(e){ return null; }
}

  currentModule = 'crew';

function startPairingTimer(){

function updateCountdown(){
  var el = document.getElementById('pair-countdown');

  var ms = new Date(pairing.invite.expires_at).getTime() - Date.now();
  if(ms <= 0){ el.innerHTML = '<span class="pair-expired">Invite expired — regenerate</span>'; stopPairingTimer(); return; }
  var total = Math.floor(ms/1000), m = Math.floor(total/60), s = total % 60;

}
function copyPayload(){
  if(!pairing.invite) return;
  var txt = JSON.stringify(pairing.invite, null, 2);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){ showToast('Payload copied'); }, function(){ fallbackCopy(txt); });
  } else { fallbackCopy(txt); }
}
function fallbackCopy(txt){
  try {
    var ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    showToast('Payload copied');
  } catch(e){ showToast('Copy not available'); }
}

// ===================== Plugin host (Apps → bundled first-party plugins) =====================
// On Board is a HOST for reviewed, bundled first-party plugins (no marketplace,
// no remote code, no unsigned auto-update). Plugin internals live in the plugin
// lab; here we only register a tile, manage local Install/Open/Disable state,
// mount/unmount the plugin, and hand it a NARROW host API. Guardrail: plugins
// get NO access by default to crew, paired-device identities, vessel documents,
// certificates, QR pairing secrets, admin/owner data or the network.
// Refs (Obsidian): "Skipi Plugin Update Mechanism — bundled first-party MVP",
//   "Skipi Plugin Lab", handoff "On Board plugin host readiness".

var SkipiPlugins = (window.SkipiPlugins = window.SkipiPlugins || {});
// Reviewed bundled artifacts shipped in dist/plugins/<id>/ (loaded at boot).
var BUNDLED_PLUGIN_DIRS = {
  'onboard-host-check': './plugins/onboard-host-check',
  'ship-photo-collection': './plugins/ship-photo-collection'
};
var activePlugin = null;   // { id, instance } while a plugin is mounted
var pluginCssEl = null;    // injected <style>/<link> for the active plugin's stylesheet
var pluginIntegrity = {};  // id -> { ok:bool, cssText:string, reason:string }

function bundledPluginIds(){ return Object.keys(BUNDLED_PLUGIN_DIRS).filter(function(id){ return !!SkipiPlugins[id]; }); }
function isBundledPlugin(id){ return !!(BUNDLED_PLUGIN_DIRS[id] && SkipiPlugins[id]); }
// Catalog = installable plugins shown to the user. Dev-only fixtures stay
// bundled (internal self-test) but are hidden unless developer mode is on.
function catalogPluginIds(){
  return bundledPluginIds().filter(function(id){
    var m = SkipiPlugins[id] && SkipiPlugins[id].manifest;
    return !(m && m.dev_only) || isDevMode();
  });
}

// ---- integrity gate: verify checksums.json before executing a bundled plugin.
// Lightweight (corruption / partial-bundle guard), NOT a substitute for the
// Stage-2 signed-pack model. We hash exactly what we fetch and only run/register
// a plugin whose index.js / index.css / plugin.json all match checksums.json.
function fetchText(u){ return fetch(u).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status+' '+u); return r.text(); }); }
function fetchJson(u){ return fetch(u).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status+' '+u); return r.json(); }); }
function sha256Hex(text){
  var enc = new TextEncoder().encode(text);
  return crypto.subtle.digest('SHA-256', enc).then(function(buf){
    var a = Array.prototype.slice.call(new Uint8Array(buf));
    return a.map(function(b){ return ('0'+b.toString(16)).slice(-2); }).join('');
  });
}
function verifyChecksum(text, expected){ return sha256Hex(text).then(function(h){ return ('sha256:'+h) === expected; }); }

function loadBundledPlugins(){
  var ids = Object.keys(BUNDLED_PLUGIN_DIRS);
  var chain = Promise.resolve();
  ids.forEach(function(id){ chain = chain.then(function(){ return loadOneBundledPlugin(id); }); });
  chain.then(function(){ if(currentModule==='apps' && !activePlugin && !appsState.selectedId) renderApps(); });
}
function loadOneBundledPlugin(id){
  var dir = BUNDLED_PLUGIN_DIRS[id];
  return Promise.all([
    fetchJson(dir+'/checksums.json'), fetchText(dir+'/index.js'),
    fetchText(dir+'/index.css'), fetchText(dir+'/plugin.json')
  ]).then(function(res){
    var checks=res[0], jsText=res[1], cssText=res[2], jsonText=res[3];
    return Promise.all([
      verifyChecksum(jsText, checks['index.js']),
      verifyChecksum(cssText, checks['index.css']),
      verifyChecksum(jsonText, checks['plugin.json'])
    ]).then(function(oks){
      if(!(oks[0] && oks[1] && oks[2])){
        pluginIntegrity[id] = { ok:false, reason:'checksum mismatch' };
        if(typeof console!=='undefined') console.warn('[plugin] integrity check FAILED for '+id+' — not loaded');
        return;
      }
      pluginIntegrity[id] = { ok:true, cssText:cssText };
      // Execute exactly the verified bytes (inline, not src) so a tampered file
      // cannot be substituted between hashing and execution.
      var s = document.createElement('script'); s.setAttribute('data-plugin-js', id); s.textContent = jsText;
      document.head.appendChild(s);
    });
  }).catch(function(e){
    pluginIntegrity[id] = { ok:false, reason:''+e };
    if(typeof console!=='undefined') console.warn('[plugin] failed to load '+id+': '+e);
  });
}

// Local install state (per install, not synced anywhere).
function pluginStore(){ try { return JSON.parse(localStorage.getItem('skipi-onboard-plugins')||'{}'); } catch(e){ return {}; } }
function pluginStoreSave(s){ try { localStorage.setItem('skipi-onboard-plugins', JSON.stringify(s)); } catch(e){} }
function pluginInfo(id){ var s=pluginStore(); return s[id]||{ installed:false, enabled:false }; }
function pluginUiState(id){ var i=pluginInfo(id); if(!i.installed) return 'available'; return i.enabled ? 'installed' : 'disabled'; }
function pluginName(id){ var p=SkipiPlugins[id]; return (p && p.manifest && p.manifest.name) || id; }

function pluginTileHtml(id){
  var p = SkipiPlugins[id]; if(!p) return '';
  var m = p.manifest || {};
  var st = pluginUiState(id);
  var badge = st==='installed' ? '<span class="apps-badge installed">Installed</span>'
            : st==='disabled'  ? '<span class="apps-badge disabled">Disabled</span>'
            :                    '<span class="apps-badge avail">Available</span>';
  var devTag = m.dev_only ? ' <span class="apps-badge disabled">dev</span>' : '';
  return '<button class="apps-tile" type="button" data-qa="plugin-settings-'+esc(id)+'" onclick="appsSelect(\''+id+'\')">'
    + '<span class="apps-tile-icon">'+(m.icon||'🧩')+'</span>'
    + '<span class="apps-tile-body"><span class="apps-tile-name">'+esc(m.name||id)+devTag+'</span>'
    + '<span class="apps-tile-sub">'+esc(m.short||'')+'</span>'+badge+'</span></button>';
}

function pluginPermsHtml(m){
  var caps = m.capabilities || {}; var perms = m.permissions || [];
  var rows = [
    ['Local storage (sandboxed)', perms.indexOf('local_storage')>=0],
    ['Vessel context (imo / name)', perms.indexOf('vessel.context')>=0],
    ['Reports inbox — read (host-mediated)', perms.indexOf('inbox.read')>=0],
    ['Reports inbox — manage status (host-mediated)', perms.indexOf('inbox.manage')>=0],
    ['Network', !!(caps.network && caps.network!=='none')],
    ['Documents', !!(caps.documents && caps.documents!=='none')],
    ['Account', !!(caps.account && caps.account!=='none')],
    ['Analytics', !!(caps.analytics && caps.analytics!=='none')],
    ['Server upload', !!caps.server_upload]
  ];
  var h = '<div class="apps-perm"><div class="apps-perm-title">Permissions &amp; capabilities</div>';
  rows.forEach(function(r){
    var used=!!r[1];
    h += '<div class="apps-perm-row '+(used?'used':'clear')+'"><span class="apps-perm-dot">'+(used?'●':'✓')+'</span>'
       + '<span>'+(used ? esc(r[0])+' — granted' : 'No '+esc(String(r[0]).toLowerCase()))+'</span></div>';
  });
  h += '</div>';
  return h;
}

function pluginActionsHtml(id, st){
  if(st==='available') return '<button class="btn btn-accent" type="button" onclick="pluginInstall(\''+id+'\')">Install</button>';
  if(st==='installed') return '<button class="btn btn-accent" type="button" onclick="pluginOpen(\''+id+'\')">Open</button>'
                            + '<button class="btn btn-outline" type="button" onclick="pluginDisable(\''+id+'\')">Disable</button>';
  return '<button class="btn btn-accent" type="button" onclick="pluginOpen(\''+id+'\')">Open</button>'
       + '<button class="btn btn-outline" type="button" onclick="pluginEnable(\''+id+'\')">Enable</button>';
}

function pluginDetailHtml(id){
  var p = SkipiPlugins[id]; if(!p) return appsListHtml();
  var m = p.manifest || {}; var st = pluginUiState(id);
  var stLabel = st==='installed' ? 'Installed' : st==='disabled' ? 'Disabled' : 'Available';
  var h = '<div class="apps-screen apps-detail">';
  h += '<button class="apps-back" type="button" onclick="appsBack()">← Apps</button>';
  h += '<div class="apps-detail-head"><span class="apps-tile-icon big">'+(m.icon||'🧩')+'</span>'
     + '<div><div class="apps-detail-name">'+esc(m.name||id)+'</div>'
     + '<div class="apps-detail-cat">Plugin · v'+esc(m.version||'0')+' · '+esc(stLabel)+'</div></div></div>';
  if(m.description) h += '<p class="apps-detail-desc">'+esc(m.description)+'</p>';
  h += pluginPermsHtml(m);
  h += '<div class="apps-note"><b>Sandbox</b> — this plugin runs in an isolated container with a narrow host API '
     + '(theme, its own scoped storage, navigation). It has <b>no access</b> to crew links, vessel documents, '
     + 'certificates or pairing secrets. Any vessel context or reports-inbox access is host-mediated and appears '
     + '<b>only</b> when this plugin\'s manifest declares the matching permission — the vessel access token is '
     + 'never exposed to the plugin. QR pairing is a trust bootstrap, not a plugin authorization layer.</div>';
  if(m.safety && m.safety.requires_disclaimer){
    h += '<div class="apps-safety"><b>Disclaimer</b> — '+esc(m.safety.disclaimer||'This plugin is not certified equipment.')+'</div>';
  }
  h += '<div class="apps-actions">'+pluginActionsHtml(id, st)+'</div>';
  h += '</div>';

function pluginInstall(id){
  var p = SkipiPlugins[id]; if(!p) return;
  var s = pluginStore();
  s[id] = { installed:true, enabled:true, version:(p.manifest&&p.manifest.version)||null, installed_at:new Date().toISOString() };
  pluginStoreSave(s);
  showToast(pluginName(id)+' installed');
  renderApps(); // selectedId stays = id → detail now shows Open / Disable
}
function pluginEnable(id){ var s=pluginStore(); if(!s[id]) s[id]={installed:true}; s[id].enabled=true; pluginStoreSave(s); renderApps(); }
function pluginDisable(id){
  if(activePlugin && activePlugin.id===id) unmountActivePlugin();
  var s = pluginStore(); if(s[id]) s[id].enabled=false; pluginStoreSave(s);
  showToast(pluginName(id)+' disabled');
  appsState.selectedId = id; renderApps();
}
function pluginOpen(id){
  var p = SkipiPlugins[id];
  if(!p || typeof p.mount!=='function'){ showToast('Plugin unavailable'); return; }
  var s = pluginStore(); if(!s[id]) s[id]={installed:true};
  s[id].enabled=true; s[id].last_opened_at=new Date().toISOString(); pluginStoreSave(s);
  appsState.selectedId = id;
  renderPluginHost(id);
}

function injectPluginCss(id){
  removePluginCss();
  var integ = pluginIntegrity[id];
  var el;
  if(integ && integ.ok && integ.cssText != null){
    // use the verified stylesheet bytes
    el = document.createElement('style'); el.setAttribute('data-plugin-css', id); el.textContent = integ.cssText;
  } else {
    el = document.createElement('link'); el.rel='stylesheet'; el.href = BUNDLED_PLUGIN_DIRS[id] + '/index.css'; el.setAttribute('data-plugin-css', id);
  }
  document.head.appendChild(el); pluginCssEl = el;
}
function removePluginCss(){ if(pluginCssEl){ try { pluginCssEl.remove(); } catch(e){} pluginCssEl=null; } }

function renderPluginHost(id){
  var p = SkipiPlugins[id]; var m = p.manifest || {};
  injectPluginCss(id);
  var h = '<div class="apps-screen plugin-host">';
  h += '<button class="apps-back" type="button" onclick="pluginClose()">← Apps</button>';
  h += '<div class="plugin-host-head"><span class="apps-tile-icon big">'+(m.icon||'🧩')+'</span>'
     + '<div><div class="apps-detail-name" id="plugin-title">'+esc(m.name||id)+'</div>'
     + '<div class="apps-detail-cat">Plugin · v'+esc(m.version||'0')+' · sandboxed</div></div></div>';
  h += '<div class="plugin-mount" id="plugin-mount"></div>';
  h += '</div>';
  setContent(h);
  var container = document.getElementById('plugin-mount');
  try {
    activePlugin = { id:id, instance:p };
    p.mount(container, makeHostApi(id));
  } catch(e){
    container.innerHTML = '<div class="apps-note">Plugin failed to mount: '+esc(''+e)+'</div>';
    activePlugin = null;
  }
}
function unmountActivePlugin(){
  if(activePlugin && activePlugin.instance && typeof activePlugin.instance.unmount==='function'){
    try { activePlugin.instance.unmount(); } catch(e){}
  }
  activePlugin = null; removePluginCss();
}
function pluginClose(){
  var id = activePlugin && activePlugin.id;
  unmountActivePlugin();
  appsState.selectedId = id || null; // back to the plugin's detail screen
  renderApps();
}

// =========================================================================
// Receiver host bridge (ship-photo-collection inbox) — host-mediated access to
// the work-completion photo reports backend, which already exists:
//   GET   /api/reports?imo=...        (the inbox)
//   GET   /api/reports/{id}           (report + photos[])
//   PATCH /api/reports/{id}/status    (received | reviewed | archived)
//   photos served static under /media/reports/...
//
// Guardrails (non-negotiable):
//  - The ONBOARD_TOKEN never leaves host scope. The bearer is injected here;
//    it is never placed in any object handed back to a plugin.
//  - imo is FORCED from crewConfig().vessel_imo on every call, so a plugin
//    cannot read or mutate another vessel's reports.
//  - Same dormant gating as crew: nothing happens unless crewBackendOn()
//    (committed CREW_API_CONNECTED, or a dev-mode override) AND a full config
//    (api_base + onboard_token + vessel_imo) is present — otherwise the plugin
//    gets an honest state, never fake reports/photos.
//  - Each surface needs an explicit manifest permission:
//      vessel.context -> vessel.getContext()
//      inbox.read     -> inbox.list / inbox.get / inbox.photoUrl
//      inbox.manage   -> inbox.setStatus
// =========================================================================
var INBOX_FORWARD_STATUSES = ['received','reviewed','archived']; // office never reverts to "submitted"

function inboxApiBase(){ return String(crewConfig().api_base||'').replace(/\/+$/,''); }
function pluginHasPerm(pluginId, perm){
  var p = SkipiPlugins[pluginId]; var perms = (p && p.manifest && p.manifest.permissions) || [];
  return perms.indexOf(perm) >= 0;
}
// Shared precondition for every inbox call: an honest-state string, or null when
// it is safe to hit the live backend.
function inboxGateState(){
  if(!crewBackendOn()) return 'backend_off';   // dormant: flag off & no dev override
  if(!crewConfigReady()) return 'no_config';   // missing api_base / token / vessel_imo
  return null;
}
// Host-internal fetch. Reads the bearer from crewConfig, injects it, and
// normalizes the response into an envelope so callers can map honest states.
// The token is used here only — it is never returned.
function hostReportsFetch(method, path, body){
  var c = crewConfig();
  var opt = { method:method, headers:{ 'Authorization':'Bearer '+(c.onboard_token||'') } };
  if(body!=null){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  return fetch(inboxApiBase()+path, opt).then(function(r){
    if(r.status===401 || r.status===403) return { ok:false, status:r.status, state:'unauthorized' };
    if(r.status===404) return { ok:false, status:404, state:'not_found' };
    if(!r.ok) return r.text().then(function(t){ return { ok:false, status:r.status, state:'unavailable', message:'HTTP '+r.status+(t?(' '+t.slice(0,120)):'') }; });
    if(r.status===204) return { ok:true, status:204, data:null };
    return r.json().then(function(j){ return { ok:true, status:r.status, data:j }; });
  }).catch(function(e){ return { ok:false, status:0, state:'unavailable', message:''+e }; });
}
// Only /media/... paths are absolutized/handed out — never an API path, so a
// plugin cannot coax the host into building an authenticated-looking URL.
function inboxMediaUrl(u){
  if(!u) return null;
  u = String(u);
  if(/^https?:\/\//i.test(u)) return u;
  if(u.charAt(0)!=='/') u = '/'+u;
  if(u.indexOf('/media/')!==0) return null;
  return inboxApiBase()+u;
}
function inboxAbsolutizeReport(rep){
  if(!rep || typeof rep!=='object') return rep;
  if(rep.thumbnail_url){ var t=inboxMediaUrl(rep.thumbnail_url); if(t) rep.thumbnail_url=t; }
  if(Array.isArray(rep.photos)) rep.photos.forEach(function(p){ if(p && p.storage_url){ var u=inboxMediaUrl(p.storage_url); if(u) p.storage_url=u; } });
  return rep;
}
function inboxResolve(v){ return Promise.resolve(v); }

function hostInboxList(pluginId, opts){
  if(!pluginHasPerm(pluginId,'inbox.read')) return inboxResolve({ ok:false, state:'permission_denied', permission:'inbox.read' });
  var gate = inboxGateState(); if(gate) return inboxResolve({ ok:false, state:gate });
  opts = opts || {};
  var c = crewConfig();
  var qs = 'imo='+encodeURIComponent(c.vessel_imo); // FORCED — plugin cannot target another vessel
  if(opts.status) qs += '&status='+encodeURIComponent(opts.status);
  if(opts.q) qs += '&q='+encodeURIComponent(opts.q);
  var limit = Math.min(Math.max(parseInt(opts.limit,10)||50,1),200);
  var offset = Math.max(parseInt(opts.offset,10)||0,0);
  qs += '&limit='+limit+'&offset='+offset;
  return hostReportsFetch('GET','/api/reports?'+qs, null).then(function(r){
    if(!r.ok) return { ok:false, state:r.state||'unavailable', message:r.message };
    var d = r.data || {}; var items = (d.items||[]).map(inboxAbsolutizeReport);
    return { ok:true, state: items.length ? 'ok' : 'empty', items:items,
             total: (d.total!=null?d.total:items.length), limit:(d.limit||limit), offset:(d.offset||offset) };
  });
}
function hostInboxGet(pluginId, id){
  if(!pluginHasPerm(pluginId,'inbox.read')) return inboxResolve({ ok:false, state:'permission_denied', permission:'inbox.read' });
  var gate = inboxGateState(); if(gate) return inboxResolve({ ok:false, state:gate });
  if(!id) return inboxResolve({ ok:false, state:'bad_request', message:'missing report id' });
  return hostReportsFetch('GET','/api/reports/'+encodeURIComponent(id), null).then(function(r){
    if(!r.ok) return { ok:false, state:r.state||'unavailable', message:r.message };
    var rep = r.data || {};
    // defense in depth: get() is not imo-filtered server-side, so reject a
    // report that does not belong to the configured vessel.
    var imo = crewConfig().vessel_imo;
    if(rep.imo!=null && String(rep.imo)!==String(imo)) return { ok:false, state:'forbidden_vessel' };
    return { ok:true, state:'ok', report: inboxAbsolutizeReport(rep) };
  });
}
function hostInboxSetStatus(pluginId, id, status){
  if(!pluginHasPerm(pluginId,'inbox.manage')) return inboxResolve({ ok:false, state:'permission_denied', permission:'inbox.manage' });
  var gate = inboxGateState(); if(gate) return inboxResolve({ ok:false, state:gate });
  if(!id) return inboxResolve({ ok:false, state:'bad_request', message:'missing report id' });
  if(INBOX_FORWARD_STATUSES.indexOf(status)<0) return inboxResolve({ ok:false, state:'bad_request', message:'invalid status (allowed: '+INBOX_FORWARD_STATUSES.join(', ')+')' });
  return hostReportsFetch('PATCH','/api/reports/'+encodeURIComponent(id)+'/status', { status:status }).then(function(r){
    if(!r.ok) return { ok:false, state:r.state||'unavailable', message:r.message };
    return { ok:true, state:'ok', report: inboxAbsolutizeReport(r.data||{}) };
  });
}
function hostInboxPhotoUrl(pluginId, photo){
  if(!pluginHasPerm(pluginId,'inbox.read')) return null;
  var u = (photo && typeof photo==='object') ? (photo.storage_url || photo.thumbnail_url || photo.url) : photo;
  return inboxMediaUrl(u);
}

// Narrow host API handed to a mounted plugin. Storage is namespaced per plugin
// so a plugin cannot read host/crew/pairing keys. The receiver surfaces
// (vessel/inbox) appear ONLY when the manifest declares the matching permission
// and are host-mediated: the ONBOARD_TOKEN is never handed to the plugin.
function makeHostApi(pluginId){
  var ns = 'skipi-plugin:'+pluginId+':';
  var subs = [];
  return {
    theme: {
      get: function(){ return document.documentElement.getAttribute('data-theme') || 'light'; },
      subscribe: function(cb){ if(typeof cb==='function') subs.push(cb); return function(){ var i=subs.indexOf(cb); if(i>=0) subs.splice(i,1); }; }
    },
    storage: {
      get: function(k){ try { var v=localStorage.getItem(ns+k); return v==null?null:JSON.parse(v); } catch(e){ return null; } },
      set: function(k, val){ try { localStorage.setItem(ns+k, JSON.stringify(val)); } catch(e){} },
      remove: function(k){ try { localStorage.removeItem(ns+k); } catch(e){} }
    },
    audio: { playLoop: function(){}, stop: function(){} }, // no native audio bridge in the On Board host yet
    navigation: {
      closePlugin: function(){ pluginClose(); },
      setTitle: function(t){ var el=document.getElementById('plugin-title'); if(el) el.textContent = String(t); }
    },
    // Vessel context — only with the vessel.context permission. No token, no
    // crew roster, no documents; just which vessel this On Board represents.
    vessel: {
      getContext: function(){
        if(!pluginHasPerm(pluginId,'vessel.context')) return { ok:false, state:'permission_denied', permission:'vessel.context' };
        var c = crewConfig();
        return { ok:true, state:'ok',
                 vessel_imo: c.vessel_imo || null,
                 vessel_name: c.vessel_name || null,
                 configured: crewConfigReady(),
                 live: crewLive() };
      }
    },
    // Receiver inbox — host-mediated reports access (see bridge above). Every
    // method resolves to an envelope { ok, state, ... }; honest states:
    // permission_denied | backend_off | no_config | unauthorized | unavailable
    // | not_found | forbidden_vessel | bad_request | empty | ok.
    inbox: {
      list:      function(opts){ return hostInboxList(pluginId, opts); },
      get:       function(id){ return hostInboxGet(pluginId, id); },
      setStatus: function(id, status){ return hostInboxSetStatus(pluginId, id, status); },
      photoUrl:  function(photo){ return hostInboxPhotoUrl(pluginId, photo); }
    },
    permissions: { listGranted: function(){ var p=SkipiPlugins[pluginId]; return (p&&p.manifest&&p.manifest.permissions)||[]; } }
  };
}

// ---------- developer mode (hidden toggle: 5 clicks on the version tag) ----------
// Dev mode reveals dev-only host fixtures (e.g. onboard-host-check) in the Apps
// catalog. Off by default for normal users; no effect on real plugins.
function isDevMode(){ try { return localStorage.getItem('skipi-onboard-dev')==='1'; } catch(e){ return false; } }
function setDevMode(on){
  try { if(on) localStorage.setItem('skipi-onboard-dev','1'); else localStorage.removeItem('skipi-onboard-dev'); } catch(e){}
  updateVerTag();
  showToast('Developer mode '+(on?'on':'off'));
  if(currentModule==='apps' && !activePlugin){ appsState.selectedId=null; renderApps(); }
  else if(currentModule==='settings'){ renderSettings(); }
}
function updateVerTag(){ var el=document.getElementById('ver-tag'); if(el) el.textContent='v'+APP_VERSION+(isDevMode()?' · dev':''); }
var _verClicks=0, _verTimer=null;
function verTagClick(){
  _verClicks++;
  if(_verTimer) clearTimeout(_verTimer);
  _verTimer=setTimeout(function(){ _verClicks=0; }, 2500);
  if(_verClicks>=5){ _verClicks=0; setDevMode(!isDevMode()); }
}

// ---------- boot ----------
// Guarded so a headless harness can load the shipped host code (makeHostApi,
// inbox bridge, crew config) without a DOM. Never set in production.
if(!(typeof window!=='undefined' && window.__ONBOARD_NO_BOOT__)){
  updateVerTag();
  (function(){ var v=document.getElementById('ver-tag'); if(v){ v.style.cursor='default'; v.addEventListener('click', verTagClick); } })();
  loadBundledPlugins();
  showLaunch('choice');
}
</script>
