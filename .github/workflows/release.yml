# Skipi On Board — Release workflow (Linux-first)
#
# Trigger: push a git tag like `v0.1.0`.
#   bump versions in src-tauri/Cargo.toml + src-tauri/tauri.conf.json +
#   dist/index.html APP_VERSION → commit → tag → push
#
# Scope: this first public release is **Linux only** (.deb + .AppImage).
# Windows/macOS jobs are intentionally omitted until those targets are ready.
#
# Updater minisign signatures are produced via the TAURI_SIGNING_PRIVATE_KEY
# repo secret — the dedicated On Board key whose pubkey is baked into
# src-tauri/tauri.conf.json plugins.updater.pubkey. The desktop app's
# auto-updater reads
# https://github.com/CaptTymur/skipi-onboard/releases/latest/download/latest.json
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    name: JS syntax check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check inline JS in dist/index.html
        run: |
          node -e '
            const fs = require("fs");
            const html = fs.readFileSync("dist/index.html", "utf8");
            const blocks = [...html.matchAll(/<script>([\s\S]*?)<\/script>/g)].map(m => m[1]);
            if (!blocks.length) { console.error("no <script> blocks"); process.exit(1); }
            const main = blocks.reduce((a,b) => a.length > b.length ? a : b, "");
            try { new Function(main); console.log("JS syntax OK (" + main.length + " chars)"); }
            catch (e) { console.error("SYNTAX ERROR: " + e.message); process.exit(1); }
          '

  version-check:
    name: Version match (tag vs files)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Compare tag against version files
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME#v}"
          CARGO=$(grep -m1 -E '^version = "' src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          CONF=$(grep -m1 -E '"version"' src-tauri/tauri.conf.json | sed -E 's/.*"version"[^"]*"([^"]+)".*/\1/')
          HTML=$(grep -m1 -E "APP_VERSION *= *'" dist/index.html | sed -E "s/.*APP_VERSION *= *'([^']+)'.*/\1/")
          echo "tag=$TAG Cargo=$CARGO conf=$CONF html=$HTML"
          fail=0
          [ "$TAG" = "$CARGO" ] || { echo "::error::tag $TAG != Cargo.toml $CARGO"; fail=1; }
          [ "$TAG" = "$CONF"  ] || { echo "::error::tag $TAG != tauri.conf.json $CONF"; fail=1; }
          [ "$TAG" = "$HTML"  ] || { echo "::error::tag $TAG != APP_VERSION $HTML"; fail=1; }
          exit "$fail"

  build-linux:
    name: Build (Linux)
    needs: [syntax-check, version-check]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-
      - name: Build (Linux, signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Skipi On Board ${{ github.ref_name }}"
          releaseBody: |
            ## Skipi On Board ${{ github.ref_name }} — Linux

            Vessel-side On Board desktop app of the Skipi family (early shell).

            | Platform | File | Notes |
            |----------|------|-------|
            | Linux (.AppImage / .deb) | see assets | minisign signed; auto-update enabled |

            Windows/macOS: not in this release (Linux-first).

            **Auto-update:** existing installs see this version on next launch.
          releaseDraft: false
          prerelease: false
          args: --bundles deb,appimage

  publish-latest-json:
    name: Publish latest.json
    needs: [build-linux]
    if: needs.build-linux.result == 'success'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build latest.json from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          mkdir -p sigs && cd sigs
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir . || true
          cd ..
          APPIMAGE_FILE="$(ls sigs | grep -E '\.AppImage\.sig$' | head -1)"
          DEB_FILE="$(ls sigs | grep -E '\.deb\.sig$' | head -1 || true)"
          [ -n "$APPIMAGE_FILE" ] || { echo "::error::no AppImage signature in release"; exit 1; }
          APPIMAGE_SIG="$(cat "sigs/$APPIMAGE_FILE")"; APPIMAGE_NAME="${APPIMAGE_FILE%.sig}"
          PLATFORMS='"linux-x86_64": { "signature": "'"$APPIMAGE_SIG"'", "url": "'"$BASE_URL/$APPIMAGE_NAME"'" }'
          if [ -n "$DEB_FILE" ]; then
            DEB_SIG="$(cat "sigs/$DEB_FILE")"; DEB_NAME="${DEB_FILE%.sig}"
            PLATFORMS="$PLATFORMS, \"linux-x86_64-deb\": { \"signature\": \"$DEB_SIG\", \"url\": \"$BASE_URL/$DEB_NAME\" }"
          fi
          cat > latest.json <<JSON
          {
            "version": "$VERSION",
            "pub_date": "$PUB_DATE",
            "notes": "Skipi On Board $VERSION",
            "platforms": { $PLATFORMS }
          }
          JSON
          echo "--- latest.json ---"; cat latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber

  verify-release:
    name: Verify published release
    needs: [publish-latest-json]
    runs-on: ubuntu-22.04
    steps:
      - name: Curl latest.json and assert
        env:
          REPO: ${{ github.repository }}
          TAG:  ${{ github.ref_name }}
        run: |
          set -eu
          URL="https://github.com/${REPO}/releases/download/${TAG}/latest.json"
          for i in 1 2 3 4 5; do
            BODY="$(curl -fsSL --retry 3 --retry-delay 2 "$URL" || true)"
            [ -n "$BODY" ] && break; sleep 5
          done
          [ -n "$BODY" ] || { echo "::error::latest.json missing at $URL"; exit 1; }
          echo "$BODY"
          echo "$BODY" | grep -q "\"version\": \"${TAG#v}\"" || { echo "::error::version mismatch"; exit 1; }
